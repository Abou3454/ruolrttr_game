<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>كنوز الأولمب</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Tahoma,sans-serif;
    background:#07000d;
    color:white;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:min(100vw,430px);
    height:100dvh;
    max-height:920px;
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 18%,rgba(255,204,88,.45),transparent 24%),
        radial-gradient(circle at 20% 72%,rgba(129,54,255,.35),transparent 34%),
        linear-gradient(180deg,#101a62 0%,#3d1468 34%,#170022 72%,#08000e 100%);
}

.app:before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px),
        linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:56px 56px;
    opacity:.35;
}

.sky{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:315px;
    background:
        radial-gradient(circle at 50% 90%,rgba(255,247,207,.8),transparent 34%),
        linear-gradient(180deg,#173eb0 0%,#7b42ba 55%,#f4a15f 100%);
}

.palace{
    position:absolute;
    top:88px;
    left:50%;
    transform:translateX(-50%);
    width:96%;
    height:190px;
    opacity:.9;
    filter:drop-shadow(0 18px 22px rgba(0,0,0,.45));
}

.palace .roof{
    position:absolute;
    top:0;
    left:7%;
    right:7%;
    height:64px;
    background:linear-gradient(180deg,#fff1b5,#c88c35);
    clip-path:polygon(50% 0,100% 70%,94% 100%,6% 100%,0 70%);
    border-bottom:5px solid #6b330a;
}

.palace .base{
    position:absolute;
    top:58px;
    left:3%;
    right:3%;
    height:130px;
    border-radius:12px 12px 0 0;
    background:
        repeating-linear-gradient(90deg,transparent 0 30px,rgba(255,255,255,.34) 31px 43px,transparent 44px 72px),
        linear-gradient(180deg,#ffe8a7,#a96a2d);
    border:3px solid rgba(255,224,119,.9);
}

.zeus{
    position:absolute;
    top:124px;
    left:50%;
    transform:translateX(-50%);
    width:176px;
    height:176px;
    z-index:4;
    border-radius:50% 50% 34% 34%;
    background:
        radial-gradient(circle at 50% 16%,#ffffff 0 24%,transparent 25%),
        radial-gradient(circle at 35% 32%,#fff 0 8%,transparent 9%),
        radial-gradient(circle at 65% 32%,#fff 0 8%,transparent 9%),
        linear-gradient(180deg,#f2c49f 0 44%,#a35c37 45% 100%);
    border:5px solid #ffd76d;
    box-shadow:0 0 24px #ffd76d,0 18px 30px rgba(0,0,0,.45);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:74px;
}

.zeus:after{
    content:"⚡";
    position:absolute;
    bottom:-20px;
    color:#44dfff;
    font-size:36px;
    text-shadow:0 0 14px #44dfff;
}

.top{
    position:absolute;
    top:8px;
    left:10px;
    right:10px;
    height:50px;
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    width:132px;
    height:48px;
    border-radius:14px;
    border:2px solid #ffd86b;
    background:linear-gradient(180deg,#5f1689,#1e052f);
    color:#ffe38a;
    font-size:16px;
    font-weight:900;
    line-height:1.08;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    text-shadow:0 2px #4d1700;
    box-shadow:0 0 16px rgba(255,217,96,.65);
}

.round-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:2px solid #ffdf83;
    background:linear-gradient(180deg,#fff2b0,#d88225);
    color:#371400;
    font-size:23px;
    font-weight:900;
    box-shadow:0 3px 0 #713109,0 0 12px rgba(255,219,103,.6);
}

.side{
    display:flex;
    gap:8px;
}

.player{
    position:absolute;
    top:63px;
    left:50%;
    transform:translateX(-50%);
    z-index:18;
    width:74%;
    height:48px;
    padding:5px 10px;
    border-radius:14px;
    border:2px solid #5d270b;
    background:linear-gradient(180deg,#fff0b7,#c9792d);
    color:#2e1100;
    font-size:13px;
    font-weight:900;
    text-align:center;
    box-shadow:0 4px 0 #5d270b;
    overflow:hidden;
}

.net{
    position:absolute;
    top:116px;
    right:16px;
    z-index:20;
    color:#4aff5f;
    font-size:14px;
    font-weight:900;
    text-shadow:0 2px #003b08;
}

.notice{
    position:absolute;
    top:304px;
    left:14px;
    right:14px;
    height:42px;
    z-index:10;
    border-radius:12px;
    border:3px solid #ffcf57;
    background:linear-gradient(180deg,#7c240f,#260007);
    color:#ffe38b;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-weight:900;
    box-shadow:0 5px 0 #270006,0 0 18px rgba(255,213,83,.5);
}

.multi{
    font-size:25px;
    color:#ffd232;
}

.board{
    position:absolute;
    top:356px;
    left:10px;
    right:10px;
    height:330px;
    z-index:11;
    padding:10px;
    border-radius:12px;
    border:4px solid #ffd767;
    background:
        linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px),
        linear-gradient(180deg,#35124d,#15051f);
    background-size:16.66% 100%,100% 100%;
    box-shadow:0 7px 0 #5b2708,0 0 24px rgba(255,220,91,.55);
}

.grid{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:5px;
}

.cell{
    border-radius:10px;
    border:1px solid rgba(255,221,106,.35);
    background:radial-gradient(circle at 50% 35%,#53226a,#21042d 76%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:33px;
    box-shadow:inset 0 0 15px rgba(0,0,0,.55);
}

.cell.drop{animation:drop .34s cubic-bezier(.14,.78,.25,1.2)}
.cell.win{border-color:#fff06a;box-shadow:0 0 18px #fff06a,inset 0 0 15px rgba(255,240,106,.7)}
.cell.break{animation:break .34s ease forwards}

@keyframes drop{
    from{transform:translateY(-115px) scale(.75);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
}

@keyframes break{
    0%{transform:scale(1);opacity:1}
    45%{transform:scale(1.28);filter:brightness(2.2)}
    100%{transform:scale(.05) rotate(25deg);opacity:0}
}

.message{
    position:absolute;
    top:694px;
    left:16px;
    right:16px;
    height:42px;
    z-index:12;
    border-radius:12px;
    border:3px solid #ffd767;
    background:linear-gradient(180deg,#fff0bd,#bd7131);
    color:#5a1e00;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:21px;
    font-weight:900;
    box-shadow:0 4px 0 #5b2708;
}

.bottom{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:176px;
    z-index:15;
    padding:10px 14px 12px;
    background:linear-gradient(180deg,#665987,#302147);
    border-top:4px solid #ffd767;
    box-shadow:0 -8px 24px rgba(0,0,0,.42);
}

.stats{
    height:34px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:7px;
    margin-bottom:8px;
}

.stat{
    border-radius:8px;
    border:2px solid #d7ad4e;
    background:linear-gradient(180deg,#4e365c,#24142c);
    color:#ffe89b;
    font-size:13px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    overflow:hidden;
}

.controls{
    display:grid;
    grid-template-columns:58px 58px 1fr 58px 58px;
    gap:8px;
    align-items:center;
}

.small{
    width:58px;
    height:58px;
    border-radius:50%;
    border:3px solid #ced9e8;
    background:linear-gradient(180deg,#f2fbff,#70778d);
    color:#2c233f;
    font-size:28px;
    font-weight:900;
    box-shadow:inset 0 0 10px rgba(255,255,255,.55),0 4px 0 #1e1d30;
}

.spin{
    height:92px;
    border-radius:50%;
    border:5px solid #ffdc72;
    background:
        radial-gradient(circle,#fff7a6 0 13%,#ffc12a 14% 55%,#a95200 56% 100%);
    color:#702200;
    font-size:42px;
    font-weight:900;
    box-shadow:0 0 28px rgba(255,221,98,.95),0 7px 0 #632b00;
}

.spin:disabled{opacity:.65;filter:grayscale(.55)}

.chips{
    margin-top:9px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:7px;
}

.chip{
    height:38px;
    border-radius:11px;
    border:2px solid #633214;
    background:linear-gradient(180deg,#fff9cd,#eca13a);
    color:#311200;
    font-size:16px;
    font-weight:900;
    box-shadow:0 3px 0 #5b2708;
}

.chip.active{
    border-color:#fff45d;
    box-shadow:0 0 15px #fff45d,0 3px 0 #5b2708;
}

.popup{
    position:absolute;
    inset:0;
    z-index:99;
    background:rgba(0,0,0,.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:22px;
}

.popup-box{
    width:100%;
    max-width:330px;
    border-radius:18px;
    border:4px solid #ffe16d;
    background:linear-gradient(180deg,#68188c,#260032);
    padding:20px;
    text-align:center;
    box-shadow:0 0 32px rgba(255,226,100,.78);
}

.popup-box h2{
    margin:0 0 10px;
    color:#ffe16d;
    font-size:28px;
}

.popup-icon{font-size:72px;margin:8px 0}
.popup-text{font-size:21px;font-weight:900;line-height:1.7}

.close{
    margin-top:16px;
    width:100%;
    height:44px;
    border-radius:12px;
    border:2px solid #ffe16d;
    background:linear-gradient(180deg,#eff9ff,#748193);
    color:white;
    font-size:18px;
    font-weight:900;
}

@media(max-height:760px){
    .sky{height:275px}
    .palace{top:70px;height:150px}
    .zeus{top:92px;width:142px;height:142px;font-size:58px}
    .notice{top:250px}
    .board{top:296px;height:286px}
    .message{top:588px;height:38px;font-size:18px}
    .bottom{height:164px}
    .spin{height:78px;font-size:35px}
    .cell{font-size:28px}
}

@media(max-width:360px){
    .cell{font-size:27px}
    .player{font-size:12px;width:76%}
    .controls{grid-template-columns:50px 50px 1fr 50px 50px}
    .small{width:50px;height:50px}
}
</style>
</head>

<body>

<div class="app">
    <div class="sky"></div>

    <div class="palace">
        <div class="roof"></div>
        <div class="base"></div>
    </div>

    <div class="zeus">👑</div>

    <div class="top">
        <div class="side">
            <button class="round-btn" onclick="location.href='games.html'">↩</button>
            <button class="round-btn" onclick="toggleSound()">🔊</button>
        </div>

        <div class="logo">كنوز<br>الأولمب</div>

        <div class="side">
            <button class="round-btn" onclick="showHelp()">؟</button>
            <button class="round-btn" onclick="location.href='games.html'">☰</button>
        </div>
    </div>

    <div class="player">
        ID: <span id="playerId">...</span><br>
        رصيدك: <span id="balance">0</span>
    </div>

    <div class="net">225ms</div>

    <div class="notice">
        <span class="multi" id="multiText">1X</span>
        <span id="noticeText">اضغط الدوران وابدأ الجولة</span>
    </div>

    <div class="board">
        <div class="grid" id="grid"></div>
    </div>

    <div class="message" id="message">حظا سعيدا</div>

    <div class="bottom">
        <div class="stats">
            <div class="stat">المحفظة: <span id="walletText">0</span></div>
            <div class="stat">الرهان: <span id="betText">100</span></div>
            <div class="stat">فوز: <span id="winText">0</span></div>
        </div>

        <div class="controls">
            <button class="small" onclick="toggleAuto()">⏵</button>
            <button class="small" onclick="changeBet(-1)">−</button>
            <button class="spin" id="spinBtn" onclick="startSpin()">↻</button>
            <button class="small" onclick="changeBet(1)">+</button>
            <button class="small" onclick="toggleSound()">⚡</button>
        </div>

        <div class="chips">
            <button class="chip active" onclick="selectBet(100,this)">100</button>
            <button class="chip" onclick="selectBet(1000,this)">1K</button>
            <button class="chip" onclick="selectBet(10000,this)">10K</button>
            <button class="chip" onclick="selectBet(100000,this)">100K</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-box">
            <h2 id="popupTitle">النتيجة</h2>
            <div class="popup-icon" id="popupIcon">⚡</div>
            <div class="popup-text" id="popupText"></div>
            <button class="close" onclick="closePopup()">حسنا</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const tg = window.Telegram?.WebApp;
if(tg){
    tg.ready();
    tg.expand();
}

let playerId = "guest_" + localStorage.getItem("guest_id");

if(!localStorage.getItem("guest_id")){
    localStorage.setItem("guest_id", Math.floor(Math.random() * 999999999));
    playerId = "guest_" + localStorage.getItem("guest_id");
}

if(tg?.initDataUnsafe?.user?.id){
    playerId = String(tg.initDataUnsafe.user.id);
}

document.getElementById("playerId").innerText = playerId;

const playerRef = db.ref("players/" + playerId);

let balance = 0;
let bet = 100;
let currentWin = 0;
let spinning = false;
let soundOn = true;
let autoMode = false;

const rows = 5;
const cols = 6;
const WIN_MIN = 10;

const symbols = [
    {icon:"💎",pay:7},
    {icon:"👑",pay:6},
    {icon:"🔺",pay:5},
    {icon:"🟡",pay:4},
    {icon:"🔮",pay:3},
    {icon:"💍",pay:3},
    {icon:"🟣",pay:2},
    {icon:"🟢",pay:2},
    {icon:"🔴",pay:2}
];

let gridData = [];

const grid = document.getElementById("grid");
const spinBtn = document.getElementById("spinBtn");

function formatNumber(num){
    num = Number(num || 0);
    if(num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
    if(num >= 1000000) return (num / 1000000).toFixed(1) + "M";
    if(num >= 1000) return (num / 1000).toFixed(1) + "K";
    return String(num);
}

function updateTexts(){
    document.getElementById("balance").innerText = formatNumber(balance);
    document.getElementById("walletText").innerText = formatNumber(balance);
    document.getElementById("betText").innerText = formatNumber(bet);
    document.getElementById("winText").innerText = formatNumber(currentWin);
}

playerRef.once("value").then(snap=>{
    if(!snap.exists()){
        playerRef.set({balance:0,createdAt:Date.now()});
    }
});

playerRef.on("value",snap=>{
    const data = snap.val() || {};
    balance = Number(data.balance || 0);
    updateTexts();
});

function setBalance(value){
    balance = Math.max(0,Math.floor(Number(value || 0)));
    playerRef.update({balance});
    updateTexts();
}

function randomSymbol(){
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function createGrid(){
    grid.innerHTML = "";
    gridData = [];

    for(let r=0;r<rows;r++){
        const row = [];

        for(let c=0;c<cols;c++){
            const s = randomSymbol();
            row.push(s);

            const cell = document.createElement("div");
            cell.className = "cell drop";
            cell.innerText = s.icon;
            grid.appendChild(cell);
        }

        gridData.push(row);
    }
}

function renderGrid(drop=false){
    const cells = grid.querySelectorAll(".cell");

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const index = r * cols + c;
            cells[index].className = drop ? "cell drop" : "cell";
            cells[index].innerText = gridData[r][c].icon;
        }
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

function playTone(freq,duration,type="sine"){
    if(!soundOn) return;

    try{
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = .08;

        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();

        setTimeout(()=>{
            osc.stop();
            audio.close();
        },duration);
    }catch(e){}
}

function findMatches(){
    const counts = {};
    const positions = {};

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const icon = gridData[r][c].icon;
            counts[icon] = (counts[icon] || 0) + 1;

            if(!positions[icon]) positions[icon] = [];
            positions[icon].push({r,c});
        }
    }

    let matched = [];
    let bestSymbol = null;
    let bestCount = 0;

    Object.keys(counts).forEach(icon=>{
        if(counts[icon] >= WIN_MIN){
            matched = matched.concat(positions[icon]);

            if(counts[icon] > bestCount){
                bestCount = counts[icon];
                bestSymbol = icon;
            }
        }
    });

    return {matched,bestSymbol,bestCount};
}

function getPay(icon){
    const item = symbols.find(s=>s.icon === icon);
    return item ? item.pay : 1;
}

function randomMultiplier(){
    const x = Math.random();
    if(x < .02) return 10;
    if(x < .07) return 5;
    if(x < .17) return 2;
    return 1;
}

async function breakMatches(matched){
    const cells = grid.querySelectorAll(".cell");

    matched.forEach(pos=>{
        cells[pos.r * cols + pos.c].classList.add("win");
    });

    playTone(820,120,"triangle");
    await sleep(230);

    matched.forEach(pos=>{
        const cell = cells[pos.r * cols + pos.c];
        cell.classList.remove("win");
        cell.classList.add("break");
    });

    await sleep(360);
}

function collapseGrid(matched){
    const removeMap = new Set(matched.map(p=>p.r + "-" + p.c));

    for(let c=0;c<cols;c++){
        const remaining = [];

        for(let r=rows-1;r>=0;r--){
            if(!removeMap.has(r + "-" + c)){
                remaining.push(gridData[r][c]);
            }
        }

        for(let r=rows-1;r>=0;r--){
            if(remaining.length){
                gridData[r][c] = remaining.shift();
            }else{
                gridData[r][c] = randomSymbol();
            }
        }
    }
}

async function startSpin(){
    if(spinning) return;

    if(balance < bet){
        showPopup("لا يوجد رصيد","💰","رصيدك غير كاف للرهان.");
        return;
    }

    spinning = true;
    spinBtn.disabled = true;
    currentWin = 0;
    updateTexts();

    setBalance(balance - bet);

    document.getElementById("message").innerText = "الرموز تنزل...";
    document.getElementById("noticeText").innerText = "انتظر النتيجة";
    document.getElementById("multiText").innerText = "1X";

    createGrid();
    playTone(420,120,"square");
    await sleep(700);

    let tumble = 0;
    let totalWin = 0;

    while(tumble < 5){
        const result = findMatches();

        if(result.matched.length === 0) break;

        tumble++;

        const multi = randomMultiplier();
        const pay = getPay(result.bestSymbol);
        const countBonus = Math.max(1,result.bestCount - 9);
        const roundWin = Math.floor(bet * pay * countBonus * multi);

        totalWin += roundWin;
        currentWin = totalWin;

        document.getElementById("multiText").innerText = multi + "X";
        document.getElementById("noticeText").innerText = "تطابق " + result.bestSymbol + " وانكسار";
        document.getElementById("message").innerText = "انكسار الكنوز " + tumble;

        updateTexts();

        await breakMatches(result.matched);
        collapseGrid(result.matched);
        renderGrid(true);
        await sleep(540);
    }

    if(totalWin > 0){
        setBalance(balance + totalWin);
        document.getElementById("message").innerText = "فوز جميل";
        playTone(900,130,"triangle");
        await sleep(120);
        playTone(1150,160,"triangle");
        showPopup("مبروك","🏆","ربحت " + formatNumber(totalWin) + " نقطة");
    }else{
        document.getElementById("message").innerText = "حظا أوفر";
        playTone(180,180,"sawtooth");
        showPopup("لم تربح","💎","لم تظهر 10 رموز متشابهة هذه الجولة.");
    }

    spinning = false;
    spinBtn.disabled = false;

    if(autoMode){
        setTimeout(()=>{
            if(autoMode) startSpin();
        },1300);
    }
}

function selectBet(value,btn){
    if(spinning) return;

    bet = value;

    document.querySelectorAll(".chip").forEach(chip=>chip.classList.remove("active"));
    btn.classList.add("active");

    updateTexts();
}

function changeBet(dir){
    const bets = [100,1000,10000,100000];
    let index = bets.indexOf(bet);

    if(index === -1) index = 0;

    index += dir;

    if(index < 0) index = 0;
    if(index >= bets.length) index = bets.length - 1;

    bet = bets[index];

    document.querySelectorAll(".chip").forEach((chip,i)=>{
        chip.classList.toggle("active",i === index);
    });

    updateTexts();
}

function toggleSound(){
    soundOn = !soundOn;
    showPopup("الصوت",soundOn ? "🔊" : "🔇",soundOn ? "تم تشغيل الصوت." : "تم إيقاف الصوت.");
}

function toggleAuto(){
    autoMode = !autoMode;
    showPopup("اللعب التلقائي","⏵",autoMode ? "تم تشغيل اللعب التلقائي." : "تم إيقاف اللعب التلقائي.");
}

function showHelp(){
    showPopup(
        "شرح اللعبة",
        "💎",
        "اختر قيمة الرهان ثم اضغط زر الدوران. الربح يحدث إذا ظهر 10 رموز أو أكثر من نفس النوع، ثم تنكسر الرموز وتنزل رموز جديدة."
    );
}

function showPopup(title,icon,text){
    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupIcon").innerText = icon;
    document.getElementById("popupText").innerText = text;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

createGrid();
updateTexts();
</script>

</body>
</html>
