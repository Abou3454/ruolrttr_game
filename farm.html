<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>كنوز البرق</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Tahoma, sans-serif;
    color:#fff;
    background:#160025;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.game{
    width:min(100vw,430px);
    height:100dvh;
    max-height:920px;
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 12%, rgba(255,190,90,.35), transparent 26%),
        linear-gradient(180deg,#22126f 0%,#4c1575 34%,#22002e 72%,#120017 100%);
}

.sky{
    position:absolute;
    inset:0 0 auto 0;
    height:42%;
    background:
        radial-gradient(circle at 50% 65%, rgba(255,255,255,.45), transparent 22%),
        linear-gradient(180deg,#2442a6,#9e4fbc 58%,#f2a65a);
    opacity:.95;
}

.temple{
    position:absolute;
    top:86px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    height:190px;
    border-radius:30px 30px 0 0;
    background:
        linear-gradient(90deg, transparent 0 7%, rgba(255,235,178,.75) 7% 12%, transparent 12% 22%, rgba(255,235,178,.75) 22% 27%, transparent 27% 73%, rgba(255,235,178,.75) 73% 78%, transparent 78% 88%, rgba(255,235,178,.75) 88% 93%, transparent 93%),
        linear-gradient(180deg,rgba(255,226,160,.9),rgba(180,91,70,.05));
    filter:drop-shadow(0 14px 25px rgba(0,0,0,.35));
    opacity:.78;
}

.zeus{
    position:absolute;
    top:108px;
    left:50%;
    transform:translateX(-50%);
    width:178px;
    height:178px;
    border-radius:45% 45% 22% 22%;
    background:
        radial-gradient(circle at 35% 28%,#fff 0 12%,transparent 13%),
        radial-gradient(circle at 64% 28%,#fff 0 12%,transparent 13%),
        linear-gradient(180deg,#f5d2b3 0 42%,#c88a5b 43% 100%);
    border:5px solid #f8d56b;
    box-shadow:0 0 25px rgba(255,224,116,.75);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:74px;
    z-index:2;
}

.zeus:before{
    content:"☁️";
    position:absolute;
    top:-35px;
    font-size:72px;
    filter:drop-shadow(0 4px 3px rgba(0,0,0,.25));
}

.topbar{
    position:absolute;
    top:8px;
    left:10px;
    right:10px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:10;
}

.logo{
    height:44px;
    min-width:122px;
    padding:4px 12px;
    border-radius:14px;
    background:linear-gradient(180deg,#6d1d9d,#28003f);
    border:2px solid #f5c94f;
    color:#ffe070;
    font-weight:900;
    line-height:1.05;
    text-shadow:0 2px #5d2600;
    box-shadow:0 0 12px rgba(255,213,74,.45);
}

.icon-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid #f8d56b;
    background:linear-gradient(180deg,#ffe9a2,#c56a20);
    color:#441700;
    font-size:24px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 3px 0 #773612,0 0 10px rgba(255,218,90,.65);
}

.menu-group{
    display:flex;
    gap:8px;
}

.info-card{
    position:absolute;
    top:62px;
    left:50%;
    transform:translateX(-50%);
    z-index:9;
    width:70%;
    min-height:44px;
    padding:5px 10px;
    border-radius:12px;
    border:2px solid #5c2a12;
    background:linear-gradient(180deg,#fff0b7,#d98537);
    color:#361300;
    font-weight:900;
    font-size:13px;
    box-shadow:0 4px 0 #5c2a12;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.net{
    position:absolute;
    top:118px;
    right:16px;
    z-index:9;
    color:#4cff64;
    font-weight:900;
    font-size:14px;
    text-shadow:0 2px 3px #003b08;
}

.banner{
    position:absolute;
    top:294px;
    left:14px;
    right:14px;
    height:42px;
    z-index:4;
    border-radius:12px;
    border:3px solid #f8c64d;
    background:linear-gradient(180deg,#6c190e,#30000d);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:#ffe37a;
    font-weight:900;
    box-shadow:0 5px 0 #200006,0 0 12px rgba(255,210,82,.4);
}

.multiplier{
    color:#ffd34c;
    font-size:24px;
    min-width:54px;
}

.board-wrap{
    position:absolute;
    top:344px;
    left:10px;
    right:10px;
    height:344px;
    z-index:5;
    padding:10px;
    border-radius:10px;
    border:4px solid #f6c84d;
    background:
        linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px),
        linear-gradient(180deg,#3d0d55,#1d092c);
    background-size:16.66% 100%,100% 100%;
    box-shadow:0 6px 0 #5c2607,0 0 20px rgba(255,220,84,.45);
}

.grid{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:5px;
}

.cell{
    border-radius:10px;
    background:radial-gradient(circle at 50% 35%,#64236f,#260430 70%);
    border:1px solid rgba(255,210,95,.28);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    position:relative;
    box-shadow:inset 0 0 14px rgba(0,0,0,.45);
}

.cell.drop{
    animation:drop .34s cubic-bezier(.15,.75,.24,1.15);
}

.cell.break{
    animation:break .34s ease forwards;
}

.cell.win{
    box-shadow:0 0 18px #fff06a,inset 0 0 16px rgba(255,235,110,.6);
    border-color:#fff06a;
}

@keyframes drop{
    from{transform:translateY(-95px) scale(.78);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
}

@keyframes break{
    0%{transform:scale(1);opacity:1;filter:brightness(1)}
    45%{transform:scale(1.25);opacity:1;filter:brightness(2)}
    100%{transform:scale(.1) rotate(20deg);opacity:0}
}

.status{
    position:absolute;
    top:694px;
    left:16px;
    right:16px;
    height:46px;
    z-index:6;
    border-radius:12px;
    border:3px solid #f8c64d;
    background:linear-gradient(180deg,#fff2c4,#c67a38);
    color:#682200;
    font-weight:900;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 0 #5c2607;
}

.bottom{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:178px;
    z-index:7;
    padding:10px 14px 12px;
    background:linear-gradient(180deg,#6b5d93,#352352);
    border-top:4px solid #f8c64d;
    box-shadow:0 -8px 22px rgba(0,0,0,.35);
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:7px;
    height:34px;
    margin-bottom:8px;
}

.stat{
    border-radius:8px;
    border:2px solid #d6aa48;
    background:linear-gradient(180deg,#4d345e,#271530);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    color:#ffe89a;
    font-weight:900;
    font-size:14px;
    overflow:hidden;
}

.controls{
    display:grid;
    grid-template-columns:58px 58px 1fr 58px 58px;
    align-items:center;
    gap:8px;
}

.small-control{
    width:58px;
    height:58px;
    border-radius:50%;
    border:3px solid #c7d4e5;
    background:linear-gradient(180deg,#eaf7ff,#6e7287);
    color:#2d2340;
    font-size:28px;
    font-weight:900;
    box-shadow:inset 0 0 10px rgba(255,255,255,.5),0 4px 0 #202033;
}

.spin{
    height:92px;
    border-radius:50%;
    border:5px solid #ffd96a;
    background:
        radial-gradient(circle,#fff39d 0 12%,#ffbe28 13% 55%,#b45d00 56% 100%);
    color:#7b2400;
    font-size:42px;
    font-weight:900;
    box-shadow:0 0 24px rgba(255,220,90,.9),0 7px 0 #6e2f00;
}

.spin:disabled{
    filter:grayscale(.6);
    opacity:.7;
}

.chips{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:7px;
    margin-top:9px;
}

.chip{
    height:38px;
    border-radius:11px;
    border:2px solid #633214;
    background:linear-gradient(180deg,#fff9cd,#f0a93b);
    color:#321302;
    font-size:16px;
    font-weight:900;
    box-shadow:0 3px 0 #5c2607;
}

.chip.active{
    border-color:#fff45a;
    box-shadow:0 0 14px #fff45a,0 3px 0 #5c2607;
}

.popup{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    padding:22px;
}

.popup-box{
    width:100%;
    max-width:330px;
    border-radius:18px;
    border:4px solid #ffe06a;
    background:linear-gradient(180deg,#6d1689,#26002f);
    box-shadow:0 0 28px rgba(255,225,98,.75);
    padding:20px;
    text-align:center;
}

.popup-box h2{
    margin:0 0 12px;
    color:#ffe36f;
    font-size:28px;
}

.popup-icon{
    font-size:72px;
    margin:8px 0;
}

.popup-text{
    font-size:22px;
    font-weight:900;
    line-height:1.6;
}

.close{
    margin-top:16px;
    width:100%;
    height:44px;
    border-radius:12px;
    border:2px solid #ffe06a;
    background:linear-gradient(180deg,#edf8ff,#748294);
    color:#fff;
    font-weight:900;
    font-size:18px;
}

@media (max-height:760px){
    .temple{top:70px;height:150px}
    .zeus{top:92px;width:145px;height:145px;font-size:58px}
    .banner{top:250px}
    .board-wrap{top:296px;height:286px}
    .status{top:588px;height:38px;font-size:18px}
    .bottom{height:164px}
    .spin{height:78px;font-size:35px}
    .cell{font-size:28px}
}

@media (max-width:360px){
    .cell{font-size:27px}
    .info-card{font-size:12px;width:74%}
    .controls{grid-template-columns:50px 50px 1fr 50px 50px}
    .small-control{width:50px;height:50px}
}
</style>
</head>

<body>

<div class="game">

    <div class="sky"></div>
    <div class="temple"></div>
    <div class="zeus">⚡</div>

    <div class="topbar">
        <div class="menu-group">
            <button class="icon-btn" onclick="location.href='games.html'">↩</button>
            <button class="icon-btn" onclick="toggleSound()">🔊</button>
        </div>

        <div class="logo">
            كنوز<br>البرق
        </div>

        <div class="menu-group">
            <button class="icon-btn" onclick="showHelp()">؟</button>
            <button class="icon-btn" onclick="location.href='games.html'">☰</button>
        </div>
    </div>

    <div class="info-card">
        ID: <span id="playerId">...</span><br>
        رصيدك: <span id="balance">0</span>
    </div>

    <div class="net">225ms</div>

    <div class="banner">
        <span class="multiplier" id="multiText">1X</span>
        <span id="bannerText">اضغط ابدأ وانظر إلى الكنوز</span>
    </div>

    <div class="board-wrap">
        <div class="grid" id="grid"></div>
    </div>

    <div class="status" id="status">حظا سعيدا</div>

    <div class="bottom">
        <div class="stats">
            <div class="stat">المحفظة: <span id="walletText">0</span></div>
            <div class="stat">الرهان: <span id="betText">100</span></div>
            <div class="stat">فوز: <span id="winText">0</span></div>
        </div>

        <div class="controls">
            <button class="small-control" onclick="toggleAuto()">⏵</button>
            <button class="small-control" onclick="changeBet(-1)">−</button>
            <button class="spin" id="spinBtn" onclick="startSpin()">↻</button>
            <button class="small-control" onclick="changeBet(1)">+</button>
            <button class="small-control" onclick="toggleSound()">⚡</button>
        </div>

        <div class="chips">
            <button class="chip active" onclick="selectBet(100,this)">100</button>
            <button class="chip" onclick="selectBet(1000,this)">1K</button>
            <button class="chip" onclick="selectBet(10000,this)">10K</button>
            <button class="chip" onclick="selectBet(100000,this)">100K</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-box">
            <h2 id="popupTitle">النتيجة</h2>
            <div class="popup-icon" id="popupIcon">⚡</div>
            <div class="popup-text" id="popupText"></div>
            <button class="close" onclick="closePopup()">حسنا</button>
        </div>
    </div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const tg = window.Telegram?.WebApp;
if(tg){
    tg.ready();
    tg.expand();
}

let playerId = "guest_" + localStorage.getItem("guest_id");
if(!localStorage.getItem("guest_id")){
    localStorage.setItem("guest_id", Math.floor(Math.random() * 999999999));
    playerId = "guest_" + localStorage.getItem("guest_id");
}

if(tg?.initDataUnsafe?.user?.id){
    playerId = String(tg.initDataUnsafe.user.id);
}

document.getElementById("playerId").innerText = playerId;

const playerRef = db.ref("players/" + playerId);

let balance = 0;
let bet = 100;
let currentWin = 0;
let spinning = false;
let soundOn = true;
let autoMode = false;

const rows = 5;
const cols = 6;

const symbols = [
    { icon:"⚡", pay:6 },
    { icon:"👑", pay:5 },
    { icon:"💎", pay:4 },
    { icon:"🏺", pay:3 },
    { icon:"🦅", pay:3 },
    { icon:"🔱", pay:2 },
    { icon:"🟣", pay:2 },
    { icon:"🟢", pay:2 }
];

let gridData = [];

const grid = document.getElementById("grid");
const spinBtn = document.getElementById("spinBtn");

function formatNumber(num){
    num = Number(num || 0);
    if(num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
    if(num >= 1000000) return (num / 1000000).toFixed(1) + "M";
    if(num >= 1000) return (num / 1000).toFixed(1) + "K";
    return String(num);
}

function updateTexts(){
    document.getElementById("balance").innerText = formatNumber(balance);
    document.getElementById("walletText").innerText = formatNumber(balance);
    document.getElementById("betText").innerText = formatNumber(bet);
    document.getElementById("winText").innerText = formatNumber(currentWin);
}

playerRef.once("value").then(snap=>{
    if(!snap.exists()){
        playerRef.set({
            balance:0,
            createdAt:Date.now()
        });
    }
});

playerRef.on("value", snap=>{
    const data = snap.val() || {};
    balance = Number(data.balance || 0);
    updateTexts();
});

function setBalance(value){
    balance = Math.max(0, Math.floor(Number(value || 0)));
    playerRef.update({ balance: balance });
    updateTexts();
}

function randomSymbol(){
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function createGrid(){
    grid.innerHTML = "";
    gridData = [];

    for(let r=0;r<rows;r++){
        const row = [];
        for(let c=0;c<cols;c++){
            const s = randomSymbol();
            row.push(s);

            const cell = document.createElement("div");
            cell.className = "cell drop";
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.innerText = s.icon;
            grid.appendChild(cell);
        }
        gridData.push(row);
    }
}

function renderGrid(drop=false){
    const cells = grid.querySelectorAll(".cell");

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const index = r * cols + c;
            const cell = cells[index];
            cell.className = drop ? "cell drop" : "cell";
            cell.innerText = gridData[r][c].icon;
        }
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

function playTone(freq, duration, type="sine"){
    if(!soundOn) return;

    try{
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = .08;

        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();

        setTimeout(()=>{
            osc.stop();
            audio.close();
        }, duration);
    }catch(e){}
}

function findMatches(){
    const counts = {};
    const positions = {};

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const icon = gridData[r][c].icon;
            counts[icon] = (counts[icon] || 0) + 1;
            if(!positions[icon]) positions[icon] = [];
            positions[icon].push({r,c});
        }
    }

    let matched = [];
    let bestSymbol = null;
    let bestCount = 0;

    Object.keys(counts).forEach(icon=>{
        if(counts[icon] >= 8){
            matched = matched.concat(positions[icon]);

            if(counts[icon] > bestCount){
                bestCount = counts[icon];
                bestSymbol = icon;
            }
        }
    });

    return { matched, bestSymbol, bestCount };
}

function getPayByIcon(icon){
    const item = symbols.find(s=>s.icon === icon);
    return item ? item.pay : 1;
}

function randomMultiplier(){
    const x = Math.random();

    if(x < .04) return 10;
    if(x < .10) return 5;
    if(x < .24) return 2;
    return 1;
}

async function breakMatches(matched){
    const cells = grid.querySelectorAll(".cell");

    matched.forEach(pos=>{
        const index = pos.r * cols + pos.c;
        cells[index].classList.add("win");
    });

    playTone(760,120,"triangle");
    await sleep(220);

    matched.forEach(pos=>{
        const index = pos.r * cols + pos.c;
        cells[index].classList.remove("win");
        cells[index].classList.add("break");
    });

    await sleep(360);
}

function collapseGrid(matched){
    const removeMap = new Set(matched.map(p=>p.r + "-" + p.c));

    for(let c=0;c<cols;c++){
        const remaining = [];

        for(let r=rows-1;r>=0;r--){
            if(!removeMap.has(r + "-" + c)){
                remaining.push(gridData[r][c]);
            }
        }

        for(let r=rows-1;r>=0;r--){
            if(remaining.length){
                gridData[r][c] = remaining.shift();
            }else{
                gridData[r][c] = randomSymbol();
            }
        }
    }
}

async function startSpin(){
    if(spinning) return;

    if(balance < bet){
        showPopup("لا يوجد رصيد", "💰", "رصيدك غير كاف للرهان.");
        return;
    }

    spinning = true;
    spinBtn.disabled = true;
    currentWin = 0;
    updateTexts();

    setBalance(balance - bet);

    document.getElementById("status").innerText = "الرموز تنزل...";
    document.getElementById("bannerText").innerText = "انتظر النتيجة";
    document.getElementById("multiText").innerText = "1X";

    createGrid();
    playTone(430,120,"square");
    await sleep(650);

    let tumble = 0;
    let totalWin = 0;

    while(tumble < 6){
        const result = findMatches();

        if(result.matched.length === 0){
            break;
        }

        tumble++;

        const multi = randomMultiplier();
        const pay = getPayByIcon(result.bestSymbol);
        const countBonus = Math.max(1, result.bestCount - 7);
        const roundWin = bet * pay * countBonus * multi;

        totalWin += roundWin;
        currentWin = totalWin;

        document.getElementById("multiText").innerText = multi + "X";
        document.getElementById("bannerText").innerText = "تطابق " + result.bestSymbol + " وفزت";
        document.getElementById("status").innerText = "انكسار الكنوز " + tumble;
        updateTexts();

        await breakMatches(result.matched);
        collapseGrid(result.matched);
        renderGrid(true);
        await sleep(520);
    }

    if(totalWin > 0){
        setBalance(balance + totalWin);
        document.getElementById("status").innerText = "فوز جميل";
        playTone(880,130,"triangle");
        await sleep(120);
        playTone(1100,160,"triangle");
        showPopup("مبروك", "🏆", "ربحت " + formatNumber(totalWin) + " نقطة");
    }else{
        document.getElementById("status").innerText = "حظا أوفر";
        playTone(180,180,"sawtooth");
        showPopup("لم تربح", "⚡", "لم تظهر مجموعة كافية هذه الجولة.");
    }

    spinning = false;
    spinBtn.disabled = false;

    if(autoMode){
        setTimeout(()=>{
            if(autoMode) startSpin();
        },1200);
    }
}

function selectBet(value, btn){
    if(spinning) return;
    bet = value;

    document.querySelectorAll(".chip").forEach(chip=>chip.classList.remove("active"));
    btn.classList.add("active");

    updateTexts();
}

function changeBet(dir){
    const bets = [100,1000,10000,100000];
    let index = bets.indexOf(bet);
    if(index === -1) index = 0;

    index += dir;
    if(index < 0) index = 0;
    if(index >= bets.length) index = bets.length - 1;

    bet = bets[index];

    document.querySelectorAll(".chip").forEach((chip,i)=>{
        chip.classList.toggle("active", i === index);
    });

    updateTexts();
}

function toggleSound(){
    soundOn = !soundOn;
    showPopup("الصوت", soundOn ? "🔊" : "🔇", soundOn ? "تم تشغيل الصوت." : "تم إيقاف الصوت.");
}

function toggleAuto(){
    autoMode = !autoMode;
    showPopup("اللعب التلقائي", "⏵", autoMode ? "تم تشغيل اللعب التلقائي." : "تم إيقاف اللعب التلقائي.");
}

function showHelp(){
    showPopup(
        "شرح اللعبة",
        "⚡",
        "اختر قيمة الرهان ثم اضغط زر الدوران. إذا ظهر 8 رموز أو أكثر من نفس النوع ستنكسر وتربح، ثم تنزل رموز جديدة مكانها وقد تربح مرة أخرى."
    );
}

function showPopup(title, icon, text){
    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupIcon").innerText = icon;
    document.getElementById("popupText").innerText = text;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

createGrid();
updateTexts();
</script>
