<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Royale</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}

:root{
    --ink:#4f2a16;
    --brown:#7a3e1f;
    --cream:#fff4cf;
    --gold:#ffd84d;
    --orange:#ff935f;
}

body{
    margin:0;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:var(--ink);
    background:
        radial-gradient(circle at 18% 18%,rgba(255,255,255,.42),transparent 13%),
        radial-gradient(circle at 80% 25%,rgba(255,255,255,.30),transparent 14%),
        linear-gradient(180deg,#55d8f3 0%,#5bdcf4 60%,#ff9a6b 60%,#f47b50 100%);
}

.app{
    width:min(100vw,430px);
    height:100dvh;
    margin:0 auto;
    padding:8px;
    display:flex;
    flex-direction:column;
    position:relative;
}

.topbar{
    height:58px;
    display:grid;
    grid-template-columns:84px 1fr 84px;
    gap:6px;
    align-items:center;
    flex-shrink:0;
}

.icon-row{
    display:flex;
    gap:7px;
    align-items:center;
}

.icon-row.left{justify-content:flex-start}
.icon-row.right{justify-content:flex-end}

.icon-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:3px solid var(--cream);
    background:linear-gradient(180deg,#ffd28f,#ff9a5b);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:900;
    box-shadow:0 4px 0 #8e4725,0 0 10px rgba(255,255,255,.45);
    cursor:pointer;
}

.player-panel{
    min-width:0;
    height:50px;
    border-radius:17px;
    border:3px solid var(--ink);
    background:linear-gradient(180deg,#fff8c9,#f6d767);
    box-shadow:0 4px 0 #8e4725;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:4px 8px;
    overflow:hidden;
}

.player-id{
    width:100%;
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.25;
}

.balance{
    width:100%;
    font-size:14px;
    font-weight:900;
    color:#231700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.25;
}

.ping{
    position:absolute;
    top:68px;
    right:18px;
    color:#04a837;
    font-size:13px;
    font-weight:900;
    text-shadow:0 0 5px white;
}

.playfield{
    flex:0 0 420px;
    min-height:0;
    position:relative;
}

.board{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:min(88vw,350px);
    height:min(88vw,350px);
}

.wood-stand{
    position:absolute;
    left:50%;
    bottom:0;
    width:140px;
    height:145px;
    transform:translateX(-50%);
    background:linear-gradient(90deg,#c98c51,#f5cd91,#c98c51);
    clip-path:polygon(30% 0,70% 0,98% 100%,2% 100%);
    border:4px solid var(--brown);
    z-index:0;
}

.spin-hand{
    position:absolute;
    top:47%;
    left:50%;
    width:34px;
    height:128px;
    transform-origin:center bottom;
    transform:translate(-50%,-100%) rotate(0deg);
    z-index:8;
    pointer-events:none;
    animation:handSpin 20s linear infinite;
}

.spin-hand::before{
    content:"👇";
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:34px;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,.35));
}

.spin-hand.fast{
    animation:handSpin .65s linear infinite;
}

.spin-hand.paused{
    animation-play-state:paused;
}

@keyframes handSpin{
    from{transform:translate(-50%,-100%) rotate(0deg)}
    to{transform:translate(-50%,-100%) rotate(360deg)}
}

.center-choice{
    position:absolute;
    top:47%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid var(--ink);
    background:radial-gradient(circle at 50% 35%,#fff,#ffe3bf);
    box-shadow:0 6px 0 #a8653a,0 0 16px rgba(255,255,255,.9);
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

.center-face{
    font-size:54px;
    line-height:1;
}

.center-label{
    margin-top:2px;
    font-size:18px;
    font-weight:900;
}

.timer{
    position:absolute;
    right:-8px;
    bottom:13px;
    width:43px;
    height:43px;
    border-radius:50%;
    border:3px solid var(--ink);
    background:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:14px;
    box-shadow:0 3px 0 #9a5a24;
}

.slot{
    position:absolute;
    width:82px;
    height:82px;
    border-radius:50%;
    border:4px solid var(--ink);
    background:#fff6dd;
    box-shadow:0 5px 0 #a8653a,0 0 8px rgba(0,0,0,.16);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
    overflow:visible;
}

.slot::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:29px;
    background:var(--orange);
    border-radius:0 0 42px 42px;
    border-top:2px solid rgba(79,42,22,.25);
}

.slot .emoji{
    position:relative;
    z-index:1;
    font-size:33px;
    line-height:1;
    margin-bottom:8px;
}

.slot .multi{
    position:relative;
    z-index:1;
    font-size:18px;
    font-weight:900;
}

.bet-badge{
    position:absolute;
    top:-10px;
    right:-8px;
    min-width:42px;
    height:24px;
    padding:0 6px;
    border-radius:999px;
    background:#ffe748;
    border:2px solid var(--ink);
    color:var(--ink);
    font-size:12px;
    font-weight:900;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:6;
    box-shadow:0 2px 0 #9a5a24;
}

.slot.has-bet .bet-badge{
    display:flex;
}

.slot.active{
    outline:5px solid var(--gold);
    box-shadow:0 0 20px var(--gold),0 5px 0 #a8653a;
}

.slot.winner{
    outline:6px solid #19ff69;
    box-shadow:0 0 24px #19ff69,0 5px 0 #a8653a;
}

.slot.s1{top:0;left:50%;transform:translateX(-50%)}
.slot.s2{top:48px;right:18px}
.slot.s3{top:146px;right:8px}
.slot.s4{bottom:34px;right:66px}
.slot.s5{bottom:0;left:50%;transform:translateX(-50%)}
.slot.s6{bottom:34px;left:66px}
.slot.s7{top:146px;left:8px}
.slot.s8{top:48px;left:18px}

.panel{
    flex-shrink:0;
    border:4px solid var(--ink);
    border-radius:20px 20px 12px 12px;
    background:linear-gradient(180deg,#ffd09a,#f48c5d);
    box-shadow:0 -4px 0 rgba(0,0,0,.16);
    padding:8px;
    margin-top:0;
}

.history{
    height:38px;
    border-radius:13px;
    border:3px solid var(--ink);
    background:#fff1cf;
    display:flex;
    align-items:center;
    justify-content:space-around;
    margin-bottom:8px;
    overflow:hidden;
}

.history div{
    width:31px;
    height:31px;
    border-radius:50%;
    background:#ffe0c3;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:21px;
}

.chips{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.chip{
    height:62px;
    border-radius:14px;
    border:3px solid var(--ink);
    background:linear-gradient(180deg,#fff9dc,#f8c95f);
    box-shadow:0 4px 0 #9d4e2c;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-weight:900;
    cursor:pointer;
    user-select:none;
}

.chip-icon{
    font-size:24px;
    line-height:1;
}

.chip.active{
    outline:4px solid var(--gold);
    background:linear-gradient(180deg,#fffadd,#fff06b);
}

.status{
    margin-top:8px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.status-box{
    height:42px;
    border-radius:13px;
    border:3px solid var(--ink);
    background:#fff4d8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.modal{
    position:fixed;
    inset:0;
    z-index:99;
    background:rgba(0,0,0,.62);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
}

.modal-card{
    width:min(88vw,380px);
    border-radius:22px;
    border:5px solid var(--ink);
    background:linear-gradient(180deg,#ffe6ba,#f5b17d);
    box-shadow:0 0 30px rgba(255,255,255,.85);
    overflow:hidden;
}

.modal-icon{
    height:90px;
    background:var(--gold);
    border-bottom:5px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
}

.modal-title{
    padding-top:20px;
    font-size:36px;
    font-weight:900;
}

.modal-stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:14px 18px 10px;
    font-size:22px;
    font-weight:900;
}

.reward-row{
    margin:6px 20px 16px;
    height:70px;
    border:3px solid var(--ink);
    border-radius:14px;
    background:#c98a5b;
    display:flex;
    align-items:center;
    justify-content:space-around;
}

.coin-medal{
    width:50px;
    height:50px;
    border-radius:50%;
    border:3px solid var(--ink);
    background:linear-gradient(180deg,#fff06a,#d77b2e);
}

.help{
    padding:18px;
    font-size:18px;
    line-height:1.8;
    text-align:right;
    font-weight:800;
}

.close-btn{
    width:calc(100% - 36px);
    height:42px;
    margin:0 18px 18px;
    border-radius:13px;
    border:3px solid var(--ink);
    background:var(--gold);
    color:var(--ink);
    font-size:20px;
    font-weight:900;
    cursor:pointer;
}

@media(max-height:720px){
    .app{padding:6px}
    .topbar{height:50px;grid-template-columns:76px 1fr 76px}
    .icon-btn{width:34px;height:34px;font-size:20px;border-width:2px}
    .player-panel{height:43px}
    .player-id{font-size:10px}
    .balance{font-size:12px}
    .ping{top:58px}
    .playfield{flex:0 0 360px}
    .board{width:300px;height:300px;top:0}
    .center-choice{width:102px;height:102px}
    .center-face{font-size:46px}
    .center-label{font-size:16px}
    .timer{width:38px;height:38px;font-size:12px}
    .spin-hand{height:112px}
    .spin-hand::before{font-size:30px}
    .slot{width:72px;height:72px}
    .slot .emoji{font-size:29px}
    .slot .multi{font-size:16px}
    .slot.s2{top:42px;right:16px}
    .slot.s3{top:126px;right:6px}
    .slot.s4{bottom:30px;right:54px}
    .slot.s6{bottom:30px;left:54px}
    .slot.s7{top:126px;left:6px}
    .slot.s8{top:42px;left:16px}
    .wood-stand{height:120px;width:120px}
    .panel{padding:6px}
    .history{height:34px;margin-bottom:6px}
    .history div{width:28px;height:28px;font-size:19px}
    .chips{gap:6px}
    .chip{height:52px}
    .chip-icon{font-size:21px}
    .status{margin-top:6px}
    .status-box{height:37px;font-size:14px}
}

@media(max-width:360px){
    .topbar{grid-template-columns:68px 1fr 68px}
    .icon-btn{width:31px;height:31px;font-size:18px}
    .board{width:292px;height:292px}
}
</style>
</head>

<body>

<div class="app">
    <div class="topbar">
        <div class="icon-row left">
            <button class="icon-btn" id="backBtn">↩</button>
            <button class="icon-btn" id="helpBtn">?</button>
        </div>

        <div class="player-panel">
            <div class="player-id" id="playerIdBox">ID: ...</div>
            <div class="balance" id="balance">رصيدك: 0</div>
        </div>

        <div class="icon-row right">
            <button class="icon-btn">🔇</button>
            <button class="icon-btn">☰</button>
        </div>
    </div>

    <div class="ping">225ms</div>

    <main class="playfield">
        <div class="board">
            <div class="wood-stand"></div>
            <div class="spin-hand" id="spinHand"></div>

            <button class="slot s1" data-emoji="🐔" data-multi="45"><span class="bet-badge">0</span><span class="emoji">🐔</span><span class="multi">x45</span></button>
            <button class="slot s2" data-emoji="🐮" data-multi="25"><span class="bet-badge">0</span><span class="emoji">🐮</span><span class="multi">x25</span></button>
            <button class="slot s3" data-emoji="🦀" data-multi="15"><span class="bet-badge">0</span><span class="emoji">🦀</span><span class="multi">x15</span></button>
            <button class="slot s4" data-emoji="🐟" data-multi="10"><span class="bet-badge">0</span><span class="emoji">🐟</span><span class="multi">x10</span></button>
            <button class="slot s5" data-emoji="🥕" data-multi="5"><span class="bet-badge">0</span><span class="emoji">🥕</span><span class="multi">x5</span></button>
            <button class="slot s6" data-emoji="🍅" data-multi="5"><span class="bet-badge">0</span><span class="emoji">🍅</span><span class="multi">x5</span></button>
            <button class="slot s7" data-emoji="🌽" data-multi="5"><span class="bet-badge">0</span><span class="emoji">🌽</span><span class="multi">x5</span></button>
            <button class="slot s8" data-emoji="🌶️" data-multi="5"><span class="bet-badge">0</span><span class="emoji">🌶️</span><span class="multi">x5</span></button>

            <div class="center-choice">
                <div class="center-face" id="centerFace">🐱</div>
                <div class="center-label" id="centerLabel">وقت الرهان</div>
                <div class="timer" id="timer">20s</div>
            </div>
        </div>
    </main>

    <section class="panel">
        <div class="history" id="history">
            <div>🌶️</div><div>🦀</div><div>🥕</div><div>🍅</div><div>🌽</div><div>🐔</div><div>🐮</div>
        </div>

        <div class="chips">
            <button class="chip" data-value="100000"><span class="chip-icon">🪙</span><span>100K</span></button>
            <button class="chip" data-value="10000"><span class="chip-icon">🪙</span><span>10K</span></button>
            <button class="chip" data-value="1000"><span class="chip-icon">🪙</span><span>1K</span></button>
            <button class="chip active" data-value="100"><span class="chip-icon">🪙</span><span>100</span></button>
        </div>

        <div class="status">
            <div class="status-box">رهانك: <span id="totalBet">0</span></div>
            <div class="status-box">اختيارك: <span id="selectedText">لا يوجد</span></div>
        </div>
    </section>
</div>

<div class="modal" id="popup">
    <div class="modal-card">
        <div class="modal-icon" id="popupEmoji">🐮</div>
        <div class="modal-title" id="popupTitle">لم تشارك</div>
        <div class="modal-stats">
            <div>رهانك: <span id="popupBet">0</span></div>
            <div>ربحك: <span id="popupWin">0</span></div>
        </div>
        <div class="reward-row"><div class="coin-medal"></div><div class="coin-medal"></div><div class="coin-medal"></div></div>
    </div>
</div>

<div class="modal" id="helpPopup">
    <div class="modal-card">
        <div class="modal-icon">?</div>
        <div class="modal-title">شرح اللعبة</div>
        <div class="help">
            اختر قيمة الرهان من الأسفل.<br>
            يمكنك الرهان على أكثر من رمز في نفس الجولة.<br>
            بعد انتهاء وقت الرهان يبدأ عداد 5 ثواني لإظهار النتيجة.<br>
            إذا ظهر رمز راهنت عليه تربح حسب المضاعف.
        </div>
        <button class="close-btn" id="closeHelp">إغلاق</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

let playerId = "guest";
if(window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user){
    playerId = String(Telegram.WebApp.initDataUnsafe.user.id);
}else{
    let guestId = localStorage.getItem("luckyGameGuestId");
    if(!guestId){
        guestId = "guest_" + Date.now();
        localStorage.setItem("luckyGameGuestId", guestId);
    }
    playerId = guestId;
}

const playerRef = db.ref("players/" + playerId);

const balanceEl = document.getElementById("balance");
const playerIdBox = document.getElementById("playerIdBox");
const timerEl = document.getElementById("timer");
const totalBetEl = document.getElementById("totalBet");
const selectedText = document.getElementById("selectedText");
const historyEl = document.getElementById("history");
const spinHand = document.getElementById("spinHand");
const centerLabel = document.getElementById("centerLabel");
const centerFace = document.getElementById("centerFace");

const popup = document.getElementById("popup");
const popupEmoji = document.getElementById("popupEmoji");
const popupTitle = document.getElementById("popupTitle");
const popupBet = document.getElementById("popupBet");
const popupWin = document.getElementById("popupWin");

const helpPopup = document.getElementById("helpPopup");
const helpBtn = document.getElementById("helpBtn");
const closeHelp = document.getElementById("closeHelp");
const backBtn = document.getElementById("backBtn");

playerIdBox.innerText = "ID: " + playerId;
playerIdBox.onclick = ()=>{
    navigator.clipboard.writeText(playerId);
    showPopup("✅","تم نسخ ID",0,0,1200);
};

helpBtn.onclick = ()=> helpPopup.style.display = "flex";
closeHelp.onclick = ()=> helpPopup.style.display = "none";
backBtn.onclick = ()=> location.href = "games.html";

let balance = 0;
let selectedChip = 100;
let selectedEmoji = null;
let totalBet = 0;
let betTime = 20;
let revealTime = 5;
let phase = "bet";
let locked = false;
let audioContext = null;

let bets = {"🐔":0,"🐮":0,"🦀":0,"🐟":0,"🥕":0,"🍅":0,"🌽":0,"🌶️":0};

const options = [
    {emoji:"🐔", multi:45},
    {emoji:"🐮", multi:25},
    {emoji:"🦀", multi:15},
    {emoji:"🐟", multi:10},
    {emoji:"🥕", multi:5},
    {emoji:"🍅", multi:5},
    {emoji:"🌽", multi:5},
    {emoji:"🌶️", multi:5}
];

function initPlayer(){
    balanceEl.innerText = "تحميل";
    playerRef.once("value").then(snapshot=>{
        if(!snapshot.exists()){
            return playerRef.set({balance:0,lastDailyReward:0});
        }
    }).then(()=>{
        playerRef.on("value", snapshot=>{
            const data = snapshot.val() || {};
            balance = Number(data.balance || 0);
            balanceEl.innerText = "رصيدك: " + formatMoney(balance);
        });
    });
}

function saveBalance(){
    balanceEl.innerText = "رصيدك: " + formatMoney(balance);
    playerRef.update({balance:balance});
}

function formatMoney(value){
    value = Number(value) || 0;
    if(value >= 1e18) return (value / 1e18).toFixed(1).replace(".0","") + "Qi";
    if(value >= 1e15) return (value / 1e15).toFixed(1).replace(".0","") + "Q";
    if(value >= 1e12) return (value / 1e12).toFixed(1).replace(".0","") + "T";
    if(value >= 1e9) return (value / 1e9).toFixed(1).replace(".0","") + "B";
    if(value >= 1e6) return (value / 1e6).toFixed(1).replace(".0","") + "M";
    if(value >= 1e3) return (value / 1e3).toFixed(1).replace(".0","") + "K";
    return String(Math.floor(value));
}

function initAudio(){
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioContext.state === "suspended") audioContext.resume();
}

document.addEventListener("click",initAudio,{once:true});
document.addEventListener("touchstart",initAudio,{once:true});

function tone(freq,duration,type="sine",vol=.12){
    if(!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,audioContext.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    osc.stop(audioContext.currentTime + duration);
}

function winSound(){
    tone(523,.1);
    setTimeout(()=>tone(659,.1),120);
    setTimeout(()=>tone(880,.18),240);
}

function loseSound(){
    tone(190,.18,"sawtooth",.1);
    setTimeout(()=>tone(130,.22,"sawtooth",.1),150);
}

function updateInfo(){
    totalBetEl.innerText = formatMoney(totalBet);
    selectedText.innerText = selectedEmoji || "لا يوجد";

    document.querySelectorAll(".slot").forEach(slot=>{
        const emoji = slot.dataset.emoji;
        const badge = slot.querySelector(".bet-badge");

        if(bets[emoji] > 0){
            slot.classList.add("has-bet");
            badge.innerText = formatMoney(bets[emoji]);
        }else{
            slot.classList.remove("has-bet");
            badge.innerText = "0";
        }
    });
}

function resetRound(){
    selectedEmoji = null;
    totalBet = 0;
    bets = {"🐔":0,"🐮":0,"🦀":0,"🐟":0,"🥕":0,"🍅":0,"🌽":0,"🌶️":0};

    phase = "bet";
    locked = false;
    betTime = 20;
    revealTime = 5;

    centerFace.innerText = "🐱";
    centerLabel.innerText = "وقت الرهان";
    timerEl.innerText = betTime + "s";

    document.querySelectorAll(".slot").forEach(o=>o.classList.remove("active","has-bet","winner"));
    updateInfo();

    spinHand.classList.remove("paused","fast");
    spinHand.style.animation = "none";
    spinHand.offsetHeight;
    spinHand.style.animation = "";
}

function showPopup(emoji,title,bet,win,duration=3000){
    popupEmoji.innerText = emoji;
    popupTitle.innerText = title;
    popupBet.innerText = formatMoney(bet);
    popupWin.innerText = formatMoney(win);
    popup.style.display = "flex";
    setTimeout(()=>popup.style.display = "none",duration);
}

function updateHistory(result){
    const items = Array.from(historyEl.children);
    for(let i=items.length-1;i>0;i--){
        items[i].innerText = items[i-1].innerText;
    }
    items[0].innerText = result;
}

document.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
        if(locked) return;
        document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        selectedChip = Number(chip.dataset.value);
        tone(700,.06,"triangle",.08);
    });
});

document.querySelectorAll(".slot").forEach(option=>{
    option.addEventListener("click",()=>{
        if(locked || phase !== "bet") return;

        if(balance < selectedChip){
            tone(110,.12,"square",.1);
            showPopup("❌","الرصيد غير كافي",0,0,1300);
            return;
        }

        selectedEmoji = option.dataset.emoji;
        balance -= selectedChip;
        totalBet += selectedChip;
        bets[selectedEmoji] += selectedChip;

        document.querySelectorAll(".slot").forEach(o=>o.classList.remove("active"));
        option.classList.add("active");

        saveBalance();
        updateInfo();
        tone(520,.06,"triangle",.08);
    });
});

function startRevealCountdown(){
    phase = "reveal";
    locked = true;
    revealTime = 5;

    centerFace.innerText = "⏳";
    centerLabel.innerText = "إظهار النتيجة";
    timerEl.innerText = revealTime + "s";

    spinHand.classList.add("fast");
}

function finishRound(){
    phase = "result";
    spinHand.classList.remove("fast");
    spinHand.classList.add("paused");

    const result = options[Math.floor(Math.random() * options.length)];
    updateHistory(result.emoji);

    document.querySelectorAll(".slot").forEach(slot=>{
        if(slot.dataset.emoji === result.emoji){
            slot.classList.add("winner");
        }
    });

    centerFace.innerText = result.emoji;
    centerLabel.innerText = "النتيجة";

    const betAmount = bets[result.emoji] || 0;
    let win = 0;
    let title = "لم تشارك";

    if(betAmount > 0){
        win = betAmount * result.multi;
        balance += win;
        title = "مبروك";
        winSound();
    }else if(totalBet > 0){
        title = "خسرت";
        loseSound();
    }

    saveBalance();
    showPopup(result.emoji,title,totalBet,win,3200);

    setTimeout(resetRound,3500);
}

setInterval(()=>{
    if(phase === "bet"){
        betTime--;
        timerEl.innerText = betTime + "s";

        if(betTime <= 0){
            startRevealCountdown();
        }

        return;
    }

    if(phase === "reveal"){
        revealTime--;
        timerEl.innerText = revealTime + "s";

        if(revealTime <= 0){
            finishRound();
        }
    }
},1000);

initPlayer();
updateInfo();
timerEl.innerText = betTime + "s";
</script>

</body>
</html>
