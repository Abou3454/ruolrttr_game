<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>كنوز البرق</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Tahoma,sans-serif;
    background:#080012;
    color:white;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.game{
    width:min(100vw,430px);
    height:100dvh;
    max-height:920px;
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 12%,rgba(255,207,89,.45),transparent 22%),
        linear-gradient(180deg,#183a9e 0%,#6930a5 32%,#2b073f 68%,#120017 100%);
}

.sky{
    position:absolute;
    inset:0;
    height:44%;
    background:
        radial-gradient(circle at 50% 72%,rgba(255,255,255,.65),transparent 24%),
        linear-gradient(180deg,#1a45b8,#8d45bb 54%,#f3a75e);
}

.temple{
    position:absolute;
    top:92px;
    left:50%;
    transform:translateX(-50%);
    width:94%;
    height:186px;
    opacity:.78;
    background:
        linear-gradient(90deg,
        transparent 0 7%,rgba(255,229,158,.9) 7% 12%,transparent 12% 21%,
        rgba(255,229,158,.9) 21% 26%,transparent 26% 74%,
        rgba(255,229,158,.9) 74% 79%,transparent 79% 88%,
        rgba(255,229,158,.9) 88% 93%,transparent 93%),
        linear-gradient(180deg,rgba(255,232,168,.95),rgba(255,232,168,.08));
    clip-path:polygon(6% 100%,12% 18%,50% 0,88% 18%,94% 100%);
    filter:drop-shadow(0 18px 20px rgba(0,0,0,.35));
}

.hero{
    position:absolute;
    top:112px;
    left:50%;
    transform:translateX(-50%);
    width:178px;
    height:178px;
    border-radius:46% 46% 24% 24%;
    border:5px solid #ffd869;
    background:
        radial-gradient(circle at 32% 30%,#ffffff 0 12%,transparent 13%),
        radial-gradient(circle at 68% 30%,#ffffff 0 12%,transparent 13%),
        linear-gradient(180deg,#f5d1b1 0 44%,#b96e44 45% 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:78px;
    z-index:2;
    box-shadow:0 0 26px rgba(255,223,112,.85);
}

.hero:before{
    content:"☁️";
    position:absolute;
    top:-38px;
    font-size:74px;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.28));
}

.topbar{
    position:absolute;
    top:8px;
    left:10px;
    right:10px;
    height:52px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:20;
}

.logo{
    min-width:128px;
    height:45px;
    padding:5px 12px;
    border-radius:14px;
    border:2px solid #ffe076;
    background:linear-gradient(180deg,#7a1bb0,#2a073b);
    color:#ffe36c;
    font-weight:900;
    text-align:center;
    line-height:1.05;
    text-shadow:0 2px #4a1700;
    box-shadow:0 0 16px rgba(255,222,105,.55);
}

.btns{
    display:flex;
    gap:8px;
}

.icon-btn{
    width:43px;
    height:43px;
    border-radius:50%;
    border:2px solid #ffe07a;
    background:linear-gradient(180deg,#fff1aa,#d17922);
    color:#3d1600;
    font-size:23px;
    font-weight:900;
    box-shadow:0 3px 0 #6f310b,0 0 10px rgba(255,225,105,.6);
}

.player{
    position:absolute;
    top:62px;
    left:50%;
    transform:translateX(-50%);
    width:72%;
    height:48px;
    border-radius:13px;
    border:2px solid #5c250b;
    background:linear-gradient(180deg,#fff2bd,#d98232);
    color:#321200;
    font-size:13px;
    font-weight:900;
    z-index:15;
    padding:5px 10px;
    text-align:center;
    box-shadow:0 4px 0 #5c250b;
    overflow:hidden;
}

.net{
    position:absolute;
    top:118px;
    right:16px;
    z-index:15;
    font-size:14px;
    color:#4cff5f;
    font-weight:900;
    text-shadow:0 2px 3px #003909;
}

.banner{
    position:absolute;
    top:294px;
    left:14px;
    right:14px;
    height:42px;
    z-index:6;
    border-radius:13px;
    border:3px solid #ffd55d;
    background:linear-gradient(180deg,#7e250d,#2b0008);
    box-shadow:0 5px 0 #240005,0 0 14px rgba(255,220,96,.55);
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    color:#ffe579;
    font-size:17px;
    font-weight:900;
}

#multiText{
    font-size:26px;
    color:#ffd23d;
    min-width:52px;
}

.board{
    position:absolute;
    top:344px;
    left:10px;
    right:10px;
    height:344px;
    padding:10px;
    z-index:8;
    border-radius:12px;
    border:4px solid #ffd55d;
    background:
        linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px),
        linear-gradient(180deg,#41105b,#190526);
    background-size:16.66% 100%,100% 100%;
    box-shadow:0 6px 0 #5b2607,0 0 24px rgba(255,222,94,.55);
}

.grid{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:5px;
}

.cell{
    border-radius:10px;
    border:1px solid rgba(255,219,98,.34);
    background:radial-gradient(circle at 50% 35%,#68257a,#26042f 72%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    box-shadow:inset 0 0 14px rgba(0,0,0,.5);
}

.cell.drop{
    animation:drop .36s cubic-bezier(.13,.78,.25,1.18);
}

.cell.win{
    border-color:#fff572;
    box-shadow:0 0 20px #fff572,inset 0 0 18px rgba(255,239,118,.65);
}

.cell.break{
    animation:break .34s ease forwards;
}

@keyframes drop{
    from{transform:translateY(-105px) scale(.78);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
}

@keyframes break{
    0%{transform:scale(1);opacity:1;filter:brightness(1)}
    45%{transform:scale(1.28);opacity:1;filter:brightness(2.2)}
    100%{transform:scale(.08) rotate(22deg);opacity:0}
}

.status{
    position:absolute;
    top:694px;
    left:16px;
    right:16px;
    height:45px;
    z-index:10;
    border-radius:13px;
    border:3px solid #ffd55d;
    background:linear-gradient(180deg,#fff2c6,#c87935);
    color:#642100;
    font-size:22px;
    font-weight:900;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 4px 0 #5b2607;
}

.bottom{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:178px;
    z-index:12;
    padding:10px 14px 12px;
    background:linear-gradient(180deg,#6e6195,#352352);
    border-top:4px solid #ffd55d;
    box-shadow:0 -8px 22px rgba(0,0,0,.38);
}

.stats{
    height:34px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:7px;
    margin-bottom:8px;
}

.stat{
    border-radius:8px;
    border:2px solid #d8ae4f;
    background:linear-gradient(180deg,#543762,#281630);
    color:#ffe99d;
    font-size:14px;
    font-weight:900;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:4px;
    overflow:hidden;
}

.controls{
    display:grid;
    grid-template-columns:58px 58px 1fr 58px 58px;
    gap:8px;
    align-items:center;
}

.small{
    width:58px;
    height:58px;
    border-radius:50%;
    border:3px solid #cbd8e8;
    background:linear-gradient(180deg,#f0fbff,#747a8f);
    color:#2e2340;
    font-size:28px;
    font-weight:900;
    box-shadow:inset 0 0 10px rgba(255,255,255,.55),0 4px 0 #202033;
}

.spin{
    height:92px;
    border-radius:50%;
    border:5px solid #ffdd72;
    background:radial-gradient(circle,#fff49d 0 12%,#ffbe27 13% 55%,#b65e00 56% 100%);
    color:#762300;
    font-size:42px;
    font-weight:900;
    box-shadow:0 0 25px rgba(255,222,92,.95),0 7px 0 #6e2f00;
}

.spin:disabled{
    opacity:.7;
    filter:grayscale(.55);
}

.chips{
    margin-top:9px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:7px;
}

.chip{
    height:38px;
    border-radius:11px;
    border:2px solid #633214;
    background:linear-gradient(180deg,#fff9cc,#f0aa3d);
    color:#301200;
    font-size:16px;
    font-weight:900;
    box-shadow:0 3px 0 #5b2607;
}

.chip.active{
    border-color:#fff45d;
    box-shadow:0 0 15px #fff45d,0 3px 0 #5b2607;
}

.popup{
    position:absolute;
    inset:0;
    z-index:50;
    background:rgba(0,0,0,.72);
    display:none;
    justify-content:center;
    align-items:center;
    padding:22px;
}

.popup-box{
    width:100%;
    max-width:330px;
    border-radius:18px;
    border:4px solid #ffe06a;
    background:linear-gradient(180deg,#741895,#26002f);
    padding:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,225,98,.78);
}

.popup-box h2{
    margin:0 0 12px;
    color:#ffe36f;
    font-size:28px;
}

.popup-icon{
    font-size:72px;
    margin:8px 0;
}

.popup-text{
    font-size:21px;
    font-weight:900;
    line-height:1.7;
}

.close{
    margin-top:16px;
    width:100%;
    height:44px;
    border-radius:12px;
    border:2px solid #ffe06a;
    background:linear-gradient(180deg,#edf8ff,#748294);
    color:white;
    font-size:18px;
    font-weight:900;
}

@media(max-height:760px){
    .temple{top:72px;height:150px}
    .hero{top:92px;width:145px;height:145px;font-size:58px}
    .banner{top:250px}
    .board{top:296px;height:286px}
    .status{top:588px;height:38px;font-size:18px}
    .bottom{height:164px}
    .spin{height:78px;font-size:35px}
    .cell{font-size:28px}
}

@media(max-width:360px){
    .cell{font-size:27px}
    .player{font-size:12px;width:75%}
    .controls{grid-template-columns:50px 50px 1fr 50px 50px}
    .small{width:50px;height:50px}
}
</style>
</head>

<body>

<div class="game">

    <div class="sky"></div>
    <div class="temple"></div>
    <div class="hero">⚡</div>

    <div class="topbar">
        <div class="btns">
            <button class="icon-btn" onclick="location.href='games.html'">↩</button>
            <button class="icon-btn" onclick="toggleSound()">🔊</button>
        </div>

        <div class="logo">كنوز<br>البرق</div>

        <div class="btns">
            <button class="icon-btn" onclick="showHelp()">؟</button>
            <button class="icon-btn" onclick="location.href='games.html'">☰</button>
        </div>
    </div>

    <div class="player">
        ID: <span id="playerId">...</span><br>
        رصيدك: <span id="balance">0</span>
    </div>

    <div class="net">225ms</div>

    <div class="banner">
        <span id="multiText">1X</span>
        <span id="bannerText">اضغط ابدأ وانظر إلى الكنوز</span>
    </div>

    <div class="board">
        <div class="grid" id="grid"></div>
    </div>

    <div class="status" id="status">حظا سعيدا</div>

    <div class="bottom">
        <div class="stats">
            <div class="stat">المحفظة: <span id="walletText">0</span></div>
            <div class="stat">الرهان: <span id="betText">100</span></div>
            <div class="stat">فوز: <span id="winText">0</span></div>
        </div>

        <div class="controls">
            <button class="small" onclick="toggleAuto()">⏵</button>
            <button class="small" onclick="changeBet(-1)">−</button>
            <button class="spin" id="spinBtn" onclick="startSpin()">↻</button>
            <button class="small" onclick="changeBet(1)">+</button>
            <button class="small" onclick="toggleSound()">⚡</button>
        </div>

        <div class="chips">
            <button class="chip active" onclick="selectBet(100,this)">100</button>
            <button class="chip" onclick="selectBet(1000,this)">1K</button>
            <button class="chip" onclick="selectBet(10000,this)">10K</button>
            <button class="chip" onclick="selectBet(100000,this)">100K</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-box">
            <h2 id="popupTitle">النتيجة</h2>
            <div class="popup-icon" id="popupIcon">⚡</div>
            <div class="popup-text" id="popupText"></div>
            <button class="close" onclick="closePopup()">حسنا</button>
        </div>
    </div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const tg = window.Telegram?.WebApp;
if(tg){
    tg.ready();
    tg.expand();
}

let playerId = "guest_" + localStorage.getItem("guest_id");

if(!localStorage.getItem("guest_id")){
    localStorage.setItem("guest_id", Math.floor(Math.random() * 999999999));
    playerId = "guest_" + localStorage.getItem("guest_id");
}

if(tg?.initDataUnsafe?.user?.id){
    playerId = String(tg.initDataUnsafe.user.id);
}

document.getElementById("playerId").innerText = playerId;

const playerRef = db.ref("players/" + playerId);

let balance = 0;
let bet = 100;
let currentWin = 0;
let spinning = false;
let soundOn = true;
let autoMode = false;

const rows = 5;
const cols = 6;
const WIN_MIN = 10;

const symbols = [
    { icon:"⚡", pay:7 },
    { icon:"👑", pay:6 },
    { icon:"💎", pay:5 },
    { icon:"🏺", pay:4 },
    { icon:"🦅", pay:3 },
    { icon:"🔱", pay:3 },
    { icon:"🟣", pay:2 },
    { icon:"🟢", pay:2 },
    { icon:"🔴", pay:2 }
];

let gridData = [];

const grid = document.getElementById("grid");
const spinBtn = document.getElementById("spinBtn");

function formatNumber(num){
    num = Number(num || 0);

    if(num >= 1000000000) return (num / 1000000000).toFixed(1) + "B";
    if(num >= 1000000) return (num / 1000000).toFixed(1) + "M";
    if(num >= 1000) return (num / 1000).toFixed(1) + "K";

    return String(num);
}

function updateTexts(){
    document.getElementById("balance").innerText = formatNumber(balance);
    document.getElementById("walletText").innerText = formatNumber(balance);
    document.getElementById("betText").innerText = formatNumber(bet);
    document.getElementById("winText").innerText = formatNumber(currentWin);
}

playerRef.once("value").then(snap=>{
    if(!snap.exists()){
        playerRef.set({
            balance:0,
            createdAt:Date.now()
        });
    }
});

playerRef.on("value", snap=>{
    const data = snap.val() || {};
    balance = Number(data.balance || 0);
    updateTexts();
});

function setBalance(value){
    balance = Math.max(0, Math.floor(Number(value || 0)));
    playerRef.update({ balance: balance });
    updateTexts();
}

function randomSymbol(){
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function createGrid(){
    grid.innerHTML = "";
    gridData = [];

    for(let r=0;r<rows;r++){
        const row = [];

        for(let c=0;c<cols;c++){
            const s = randomSymbol();
            row.push(s);

            const cell = document.createElement("div");
            cell.className = "cell drop";
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.innerText = s.icon;
            grid.appendChild(cell);
        }

        gridData.push(row);
    }
}

function renderGrid(drop=false){
    const cells = grid.querySelectorAll(".cell");

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const index = r * cols + c;
            const cell = cells[index];

            cell.className = drop ? "cell drop" : "cell";
            cell.innerText = gridData[r][c].icon;
        }
    }
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

function playTone(freq,duration,type="sine"){
    if(!soundOn) return;

    try{
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audio = new AudioContext();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = .08;

        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();

        setTimeout(()=>{
            osc.stop();
            audio.close();
        },duration);
    }catch(e){}
}

function findMatches(){
    const counts = {};
    const positions = {};

    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const icon = gridData[r][c].icon;

            counts[icon] = (counts[icon] || 0) + 1;

            if(!positions[icon]){
                positions[icon] = [];
            }

            positions[icon].push({r,c});
        }
    }

    let matched = [];
    let bestSymbol = null;
    let bestCount = 0;

    Object.keys(counts).forEach(icon=>{
        if(counts[icon] >= WIN_MIN){
            matched = matched.concat(positions[icon]);

            if(counts[icon] > bestCount){
                bestCount = counts[icon];
                bestSymbol = icon;
            }
        }
    });

    return { matched, bestSymbol, bestCount };
}

function getPayByIcon(icon){
    const item = symbols.find(s=>s.icon === icon);
    return item ? item.pay : 1;
}

function randomMultiplier(){
    const x = Math.random();

    if(x < .025) return 10;
    if(x < .075) return 5;
    if(x < .18) return 2;

    return 1;
}

async function breakMatches(matched){
    const cells = grid.querySelectorAll(".cell");

    matched.forEach(pos=>{
        const index = pos.r * cols + pos.c;
        cells[index].classList.add("win");
    });

    playTone(760,120,"triangle");
    await sleep(230);

    matched.forEach(pos=>{
        const index = pos.r * cols + pos.c;
        cells[index].classList.remove("win");
        cells[index].classList.add("break");
    });

    await sleep(360);
}

function collapseGrid(matched){
    const removeMap = new Set(matched.map(p=>p.r + "-" + p.c));

    for(let c=0;c<cols;c++){
        const remaining = [];

        for(let r=rows-1;r>=0;r--){
            if(!removeMap.has(r + "-" + c)){
                remaining.push(gridData[r][c]);
            }
        }

        for(let r=rows-1;r>=0;r--){
            if(remaining.length){
                gridData[r][c] = remaining.shift();
            }else{
                gridData[r][c] = randomSymbol();
            }
        }
    }
}

async function startSpin(){
    if(spinning) return;

    if(balance < bet){
        showPopup("لا يوجد رصيد", "💰", "رصيدك غير كاف للرهان.");
        return;
    }

    spinning = true;
    spinBtn.disabled = true;
    currentWin = 0;
    updateTexts();

    setBalance(balance - bet);

    document.getElementById("status").innerText = "الرموز تنزل...";
    document.getElementById("bannerText").innerText = "انتظر النتيجة";
    document.getElementById("multiText").innerText = "1X";

    createGrid();

    playTone(430,120,"square");
    await sleep(680);

    let tumble = 0;
    let totalWin = 0;

    while(tumble < 5){
        const result = findMatches();

        if(result.matched.length === 0){
            break;
        }

        tumble++;

        const multi = randomMultiplier();
        const pay = getPayByIcon(result.bestSymbol);
        const countBonus = Math.max(1, result.bestCount - (WIN_MIN - 1));
        const roundWin = Math.floor(bet * pay * countBonus * multi);

        totalWin += roundWin;
        currentWin = totalWin;

        document.getElementById("multiText").innerText = multi + "X";
        document.getElementById("bannerText").innerText = "تطابق " + result.bestSymbol + " وانكسار";
        document.getElementById("status").innerText = "انكسار الكنوز " + tumble;

        updateTexts();

        await breakMatches(result.matched);
        collapseGrid(result.matched);
        renderGrid(true);
        await sleep(540);
    }

    if(totalWin > 0){
        setBalance(balance + totalWin);

        document.getElementById("status").innerText = "فوز جميل";
        playTone(880,130,"triangle");
        await sleep(120);
        playTone(1100,160,"triangle");

        showPopup("مبروك", "🏆", "ربحت " + formatNumber(totalWin) + " نقطة");
    }else{
        document.getElementById("status").innerText = "حظا أوفر";
        playTone(180,180,"sawtooth");

        showPopup("لم تربح", "⚡", "لم تظهر 10 رموز متشابهة هذه الجولة.");
    }

    spinning = false;
    spinBtn.disabled = false;

    if(autoMode){
        setTimeout(()=>{
            if(autoMode) startSpin();
        },1300);
    }
}

function selectBet(value,btn){
    if(spinning) return;

    bet = value;

    document.querySelectorAll(".chip").forEach(chip=>{
        chip.classList.remove("active");
    });

    btn.classList.add("active");
    updateTexts();
}

function changeBet(dir){
    const bets = [100,1000,10000,100000];
    let index = bets.indexOf(bet);

    if(index === -1) index = 0;

    index += dir;

    if(index < 0) index = 0;
    if(index >= bets.length) index = bets.length - 1;

    bet = bets[index];

    document.querySelectorAll(".chip").forEach((chip,i)=>{
        chip.classList.toggle("active", i === index);
    });

    updateTexts();
}

function toggleSound(){
    soundOn = !soundOn;
    showPopup("الصوت", soundOn ? "🔊" : "🔇", soundOn ? "تم تشغيل الصوت." : "تم إيقاف الصوت.");
}

function toggleAuto(){
    autoMode = !autoMode;
    showPopup("اللعب التلقائي", "⏵", autoMode ? "تم تشغيل اللعب التلقائي." : "تم إيقاف اللعب التلقائي.");
}

function showHelp(){
    showPopup(
        "شرح اللعبة",
        "⚡",
        "اختر الرهان ثم اضغط زر الدوران. الربح يحدث فقط إذا ظهر 10 رموز أو أكثر من نفس النوع، بعدها تنكسر الرموز وتنزل رموز جديدة مكانها."
    );
}

function showPopup(title,icon,text){
    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupIcon").innerText = icon;
    document.getElementById("popupText").innerText = text;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

createGrid();
updateTexts();
</script>
