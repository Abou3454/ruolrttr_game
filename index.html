<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لعبة الحظ</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    padding:8px;
    min-height:100dvh;
    background:radial-gradient(circle,#3d0066,#12001f,#000);
    font-family:Arial;
    overflow-x:hidden;
    text-align:center;
    color:white;
}

.balance{
    font-size:clamp(34px,8vw,70px);
    color:gold;
    font-weight:bold;
    margin-top:4px;
    text-shadow:0 0 24px gold;
}

.player-id{
    width:fit-content;
    max-width:95vw;
    margin:6px auto 0;
    padding:8px 14px;
    border:2px solid gold;
    border-radius:14px;
    background:rgba(0,0,0,.35);
    color:white;
    font-size:clamp(15px,4vw,20px);
    box-shadow:0 0 14px rgba(255,215,0,.6);
    cursor:pointer;
    user-select:none;
}

.daily-btn{
    margin-top:8px;
    padding:12px 24px;
    border:none;
    border-radius:18px;
    background:linear-gradient(#ffe066,#ff9900);
    color:#3b1400;
    font-size:clamp(18px,5vw,26px);
    font-weight:bold;
    box-shadow:0 0 22px gold;
    cursor:pointer;
}

.daily-btn:disabled{
    background:linear-gradient(#999,#555);
    color:#ddd;
    box-shadow:none;
    cursor:not-allowed;
}

.pointer{
    width:0;
    height:0;
    margin:2px auto 0;
    border-left:clamp(18px,5vw,35px) solid transparent;
    border-right:clamp(18px,5vw,35px) solid transparent;
    border-top:clamp(42px,9vw,80px) solid yellow;
    filter:drop-shadow(0 0 16px gold);
    position:relative;
    z-index:10;
}

.wheel-container{
    position:relative;
    width:clamp(245px,72vw,500px);
    height:clamp(245px,72vw,500px);
    margin:0 auto;
    margin-top:-4px;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:clamp(7px,2vw,14px) solid gold;
    background:#1488ff;
    box-shadow:0 0 35px gold,0 0 55px #ff00ff;
    display:block;
}

.center-circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:clamp(72px,17vw,120px);
    height:clamp(72px,17vw,120px);
    border-radius:50%;
    background:radial-gradient(circle,#ff4444,#990000);
    border:clamp(4px,1.5vw,8px) solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:clamp(38px,10vw,70px);
    font-weight:bold;
    color:white;
    box-shadow:0 0 30px orange;
}

.history{
    display:flex;
    justify-content:center;
    gap:clamp(8px,2vw,15px);
    margin-top:clamp(10px,2.5vw,25px);
}

.history div{
    width:clamp(42px,11vw,65px);
    height:clamp(42px,11vw,65px);
    border-radius:14px;
    background:#8000aa;
    border:3px solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:clamp(24px,7vw,38px);
    box-shadow:0 0 16px gold;
}

.bets{
    display:flex;
    justify-content:center;
    gap:clamp(8px,2.5vw,20px);
    margin-top:clamp(12px,3vw,25px);
    flex-wrap:nowrap;
}

.bet-box{
    width:clamp(96px,28vw,170px);
    height:clamp(118px,31vw,190px);
    background:linear-gradient(#ff00ff,#660099);
    border-radius:18px;
    border:clamp(3px,1vw,5px) solid gold;
    box-shadow:0 0 20px #ff00ff;
    position:relative;
    cursor:pointer;
    user-select:none;
}

.bet-box:hover{ transform:scale(1.03); }

.bet-box .emoji{
    font-size:clamp(42px,12vw,75px);
    margin-top:-8px;
}

.bet-box .multi{
    font-size:clamp(34px,11vw,70px);
    color:gold;
    font-weight:bold;
    margin-top:-8px;
}

.bet-box .amount{
    font-size:clamp(28px,9vw,60px);
    margin-top:-6px;
}

.chips{
    display:flex;
    justify-content:center;
    gap:clamp(10px,4vw,25px);
    margin-top:clamp(16px,4vw,35px);
    padding-bottom:10px;
    flex-wrap:nowrap;
}

.chip{
    width:clamp(68px,20vw,110px);
    height:clamp(68px,20vw,110px);
    border-radius:50%;
    background:white;
    border:clamp(5px,1.5vw,8px) solid #ddd;
    color:black;
    font-size:clamp(18px,5vw,28px);
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 18px white;
    cursor:pointer;
    user-select:none;
}

.active{
    border-color:gold;
    box-shadow:0 0 28px gold;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:min(86vw,400px);
    background:linear-gradient(red,#770000);
    border:6px solid gold;
    border-radius:25px;
    padding:24px;
    box-shadow:0 0 40px gold;
}

.popup-box h1{
    color:gold;
    font-size:clamp(34px,10vw,55px);
    margin:0 0 12px;
}

.popup-emoji{ font-size:clamp(76px,22vw,120px); }
.popup-text{ font-size:clamp(28px,8vw,45px); }

@media(max-height:700px){
    body{ padding:4px; }
    .balance{ font-size:34px; margin-top:0; }
    .player-id{ padding:6px 10px; font-size:14px; }
    .daily-btn{ padding:8px 18px; font-size:18px; margin-top:4px; }
    .wheel-container{ width:245px; height:245px; }
    .pointer{
        border-left-width:18px;
        border-right-width:18px;
        border-top-width:38px;
    }
    .history{ margin-top:8px; }
    .bets{ margin-top:8px; }
    .chips{ margin-top:10px; }
}
</style>
</head>

<body>

<div class="balance" id="balance">$0</div>
<div class="player-id" id="playerIdBox">ID الشحن: ...</div>
<button class="daily-btn" id="dailyBtn">مكافأة يومية +1000</button>

<div class="pointer"></div>

<div class="wheel-container">
    <canvas id="wheel" width="500" height="500"></canvas>
    <div class="center-circle" id="timer">15</div>
</div>

<div class="history" id="history">
    <div>🍉</div>
    <div>🍎</div>
    <div>7️⃣</div>
</div>

<div class="bets">
    <div class="bet-box" data-emoji="🍉" data-multi="2">
        <div class="emoji">🍉</div>
        <div class="multi">x2</div>
        <div class="amount">0</div>
    </div>

    <div class="bet-box" data-emoji="7️⃣" data-multi="8">
        <div class="emoji">7️⃣</div>
        <div class="multi">x8</div>
        <div class="amount">0</div>
    </div>

    <div class="bet-box" data-emoji="🍎" data-multi="2">
        <div class="emoji">🍎</div>
        <div class="multi">x2</div>
        <div class="amount">0</div>
    </div>
</div>

<div class="chips">
    <div class="chip active" data-value="100">100</div>
    <div class="chip" data-value="1000">1K</div>
    <div class="chip" data-value="10000">10K</div>
</div>

<div id="popup">
    <div class="popup-box">
        <h1>النتيجة</h1>
        <div class="popup-emoji" id="popupEmoji">🍉</div>
        <div class="popup-text" id="popupText">انتهت الجولة</div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

let playerId = "guest";

if(
    window.Telegram &&
    Telegram.WebApp &&
    Telegram.WebApp.initDataUnsafe &&
    Telegram.WebApp.initDataUnsafe.user
){
    playerId = String(Telegram.WebApp.initDataUnsafe.user.id);
}else{
    let guestId = localStorage.getItem("luckyGameGuestId");
    if(!guestId){
        guestId = "guest_" + Date.now();
        localStorage.setItem("luckyGameGuestId", guestId);
    }
    playerId = guestId;
}

const playerRef = db.ref("players/" + playerId);

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const balanceEl = document.getElementById("balance");
const timer = document.getElementById("timer");
const popup = document.getElementById("popup");
const popupEmoji = document.getElementById("popupEmoji");
const popupText = document.getElementById("popupText");
const historyEl = document.getElementById("history");
const dailyBtn = document.getElementById("dailyBtn");
const playerIdBox = document.getElementById("playerIdBox");

playerIdBox.innerText = "ID الشحن: " + playerId;

const sections = ["🍉","🍎","🍉","7️⃣","🍎","🍉","🍎","🍉"];
const colors = ["#1488ff","#1488ff","#1488ff","#ff00cc","#1488ff","#1488ff","#1488ff","#1488ff"];

const dailyRewardAmount = 1000;
const dailyRewardTime = 24 * 60 * 60 * 1000;

let balance = 0;
let currentAngle = 0;
let timeLeft = 15;
let selectedChip = 100;
let spinning = false;
let audioContext = null;

let bets = {
    "🍉": 0,
    "🍎": 0,
    "7️⃣": 0
};

function initPlayer(){
    playerRef.once("value").then(snapshot=>{
        if(!snapshot.exists()){
            playerRef.set({
                balance: 5000,
                lastDailyReward: 0
            });
        }
    });

    playerRef.on("value", snapshot=>{
        const data = snapshot.val();

        if(data && typeof data.balance !== "undefined"){
            balance = Number(data.balance);
            balanceEl.innerText = "$" + balance;
        }

        updateDailyButton();
    });
}

function saveBalance(){
    playerRef.update({
        balance: balance
    });
}

function updateBalance(){
    balanceEl.innerText = "$" + balance;
    saveBalance();
}

function initAudio(){
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }
}

document.addEventListener("click", initAudio, {once:true});
document.addEventListener("touchstart", initAudio, {once:true});

function playTone(frequency, duration, type = "sine", volume = 0.18){
    if(!audioContext) return;

    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();

    oscillator.type = type;
    oscillator.frequency.value = frequency;

    gain.gain.setValueAtTime(volume, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);

    oscillator.start();
    oscillator.stop(audioContext.currentTime + duration);
}

function playWinSound(){
    playTone(523, 0.12, "sine");
    setTimeout(()=>playTone(659, 0.12, "sine"), 120);
    setTimeout(()=>playTone(784, 0.18, "sine"), 240);
}

function playLoseSound(){
    playTone(220, 0.18, "sawtooth", 0.12);
    setTimeout(()=>playTone(160, 0.22, "sawtooth", 0.1), 160);
}

function playErrorSound(){
    playTone(120, 0.12, "square", 0.1);
    setTimeout(()=>playTone(100, 0.12, "square", 0.1), 130);
}

function playRewardSound(){
    playTone(440, 0.1, "triangle");
    setTimeout(()=>playTone(660, 0.1, "triangle"), 100);
    setTimeout(()=>playTone(880, 0.18, "triangle"), 200);
}

function showPopup(emoji, text, duration = 2000){
    popup.style.display = "flex";
    popupEmoji.innerText = emoji;
    popupText.innerText = text;

    setTimeout(()=>{
        popup.style.display = "none";
    }, duration);
}

function formatTime(ms){
    const totalSeconds = Math.ceil(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return hours + "س " + minutes + "د " + seconds + "ث";
}

function updateDailyButton(){
    playerRef.once("value").then(snapshot=>{
        const data = snapshot.val() || {};
        const lastReward = Number(data.lastDailyReward) || 0;
        const now = Date.now();
        const remaining = dailyRewardTime - (now - lastReward);

        if(remaining <= 0){
            dailyBtn.disabled = false;
            dailyBtn.innerText = "مكافأة يومية +1000";
        }else{
            dailyBtn.disabled = true;
            dailyBtn.innerText = "المكافأة بعد " + formatTime(remaining);
        }
    });
}

dailyBtn.addEventListener("click",()=>{
    initAudio();

    playerRef.once("value").then(snapshot=>{
        const data = snapshot.val() || {};
        const lastReward = Number(data.lastDailyReward) || 0;
        const now = Date.now();

        if(now - lastReward >= dailyRewardTime){
            balance += dailyRewardAmount;

            playerRef.update({
                balance: balance,
                lastDailyReward: now
            });

            playRewardSound();
            showPopup("🎁", "حصلت على $1000", 2000);
        }else{
            updateDailyButton();
            playErrorSound();
        }
    });
});

playerIdBox.addEventListener("click",()=>{
    navigator.clipboard.writeText(String(playerId));
    showPopup("✅", "تم نسخ ID", 1200);
});

function drawWheel(){
    const center = 250;
    const radius = 235;
    const angle = (Math.PI * 2) / sections.length;

    ctx.clearRect(0,0,500,500);

    for(let i = 0; i < sections.length; i++){
        const start = i * angle;
        const end = start + angle;

        ctx.beginPath();
        ctx.moveTo(center,center);
        ctx.arc(center,center,radius,start,end);
        ctx.closePath();

        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.lineWidth = 4;
        ctx.strokeStyle = "gold";
        ctx.stroke();

        ctx.save();
        ctx.translate(center,center);
        ctx.rotate(start + angle / 2);

        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(sections[i], radius - 80, 0);

        ctx.restore();
    }
}

function resetBets(){
    bets = {
        "🍉": 0,
        "🍎": 0,
        "7️⃣": 0
    };

    document.querySelectorAll(".bet-box").forEach(box=>{
        box.querySelector(".amount").innerText = "0";
    });
}

function updateHistory(result){
    const items = Array.from(historyEl.children);

    for(let i = items.length - 1; i > 0; i--){
        items[i].innerText = items[i - 1].innerText;
    }

    items[0].innerText = result;
}

function getResultFromWheel(){
    const sectionAngle = 360 / sections.length;
    const normalizedAngle = ((currentAngle % 360) + 360) % 360;
    const pointerAngle = (270 - normalizedAngle + 360) % 360;
    const index = Math.floor(pointerAngle / sectionAngle);

    return sections[index];
}

function spinWheel(){
    if(spinning) return;

    spinning = true;
    timeLeft = 15;
    timer.innerText = timeLeft;

    const randomDeg = Math.floor(Math.random() * 360) + 1440;

    currentAngle += randomDeg;

    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.25,1)";
    canvas.style.transform = `rotate(${currentAngle}deg)`;

    setTimeout(()=>{
        showResult();
        spinning = false;
    }, 4300);
}

function showResult(){
    const result = getResultFromWheel();
    const betAmount = bets[result];
    const box = document.querySelector(`.bet-box[data-emoji="${result}"]`);
    const multiplier = Number(box.dataset.multi);

    let message = "خسرت";

    if(betAmount > 0){
        const winAmount = betAmount * multiplier;
        balance += winAmount;
        message = "ربحت $" + winAmount;
        playWinSound();
    }else{
        playLoseSound();
    }

    updateBalance();
    updateHistory(result);

    popup.style.display = "flex";
    popupEmoji.innerText = result;
    popupText.innerText = message;

    resetBets();

    setTimeout(()=>{
        popup.style.display = "none";
    },3000);
}

document.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
        initAudio();

        document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        selectedChip = Number(chip.dataset.value);

        playTone(700, 0.06, "triangle", 0.08);
    });
});

document.querySelectorAll(".bet-box").forEach(box=>{
    box.addEventListener("click",()=>{
        initAudio();

        if(spinning) return;

        if(balance < selectedChip){
            playErrorSound();
            showPopup("❌", "الرصيد غير كافي", 1500);
            return;
        }

        const emoji = box.dataset.emoji;

        balance -= selectedChip;
        bets[emoji] += selectedChip;

        playTone(520, 0.07, "triangle", 0.08);
        updateBalance();
        box.querySelector(".amount").innerText = bets[emoji];
    });
});

setInterval(()=>{
    if(spinning) return;

    timeLeft--;
    timer.innerText = timeLeft;

    if(timeLeft <= 0){
        spinWheel();
    }
},1000);

setInterval(updateDailyButton,1000);

drawWheel();
initPlayer();
</script>

</body>
</html>
