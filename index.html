<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Casino</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:tahoma;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
font-size:42px;
text-shadow:0 0 20px red;
}

.balance{
font-size:30px;
color:gold;
margin:15px;
}

#wheel-container{
position:relative;
width:320px;
height:320px;
margin:auto;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
border:10px solid gold;
background:
conic-gradient(
red 0deg 20deg,
black 20deg 40deg,
red 40deg 60deg,
black 60deg 80deg,
red 80deg 100deg,
black 100deg 120deg,
red 120deg 140deg,
black 140deg 160deg,
red 160deg 180deg,
black 180deg 200deg,
red 200deg 220deg,
black 220deg 240deg,
red 240deg 260deg,
black 260deg 280deg,
red 280deg 300deg,
black 300deg 320deg,
red 320deg 340deg,
black 340deg 360deg
);

box-shadow:
0 0 30px gold,
0 0 80px orange;

transition:transform 5s cubic-bezier(.17,.67,.2,1);
}

.pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid yellow;
z-index:10;
}

.bet-buttons{
margin-top:20px;
}

.bet-buttons button{
padding:12px 25px;
margin:8px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

.redBtn{
background:#ff4d6d;
color:white;
}

.blackBtn{
background:#444;
color:white;
}

.greenBtn{
background:#00d000;
color:white;
}

.range-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
width:90%;
margin:25px auto;
}

.range-buttons button{
padding:20px;
font-size:28px;
background:#1e90ff;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.money-buttons{
margin-top:20px;
}

.money-buttons button{
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:24px;
margin:10px;
cursor:pointer;
font-weight:bold;
}

.selectedMoney{
outline:5px solid gold;
}

.currentBet{
font-size:30px;
margin-top:10px;
}

.result{
margin-top:25px;
font-size:40px;
color:yellow;
text-shadow:0 0 20px yellow;
}

</style>
</head>

<body>

<h1>🎰 كازينو الروليت</h1>

<div class="balance">
الرصيد: $<span id="balance">5000</span>
</div>

<div id="wheel-container">

<div class="pointer"></div>

<div id="wheel"></div>

</div>

<div class="money-buttons">

<button onclick="setBet(10)">10</button>

<button onclick="setBet(50)">50</button>

<button onclick="setBet(100)">100</button>

<button onclick="setBet(1000)">1K</button>

</div>

<div class="currentBet">
الرهان الحالي:
<span id="currentBet">10</span>
$
</div>

<div class="bet-buttons">

<button class="redBtn" onclick="play('red')">
🔴 RED x2
</button>

<button class="blackBtn" onclick="play('black')">
⚫ BLACK x2
</button>

<button class="greenBtn" onclick="play('green')">
🟢 GREEN x14
</button>

</div>

<div class="range-buttons">

<button onclick="playRange(1,12)">
1 - 12
</button>

<button onclick="playRange(13,24)">
13 - 24
</button>

<button onclick="playRange(25,36)">
25 - 36
</button>

<button onclick="playEvenOdd('even')">
EVEN
</button>

<button onclick="playEvenOdd('odd')">
ODD
</button>

</div>

<div class="result" id="result"></div>

<script>

const wheel=document.getElementById("wheel");
const result=document.getElementById("result");
const balanceEl=document.getElementById("balance");
const currentBetEl=document.getElementById("currentBet");

let balance=5000;
let currentBet=10;

function setBet(amount){

currentBet=amount;

currentBetEl.innerHTML=currentBet;

}

function spinWheel(){

return new Promise(resolve=>{

const number=
Math.floor(Math.random()*37);

const degree=
3600+(number*9.73);

wheel.style.transform=
`rotate(-${degree}deg)`;

setTimeout(()=>{

resolve(number);

},5000);

});

}

async function play(color){

if(balance<currentBet){

alert("الرصيد غير كافي");

return;

}

balance-=currentBet;

updateBalance();

const number=await spinWheel();

let win=false;

if(color==="green" && number===0){

balance+=currentBet*14;

win=true;

}

else if(color==="red" && number!==0 && number%2===0){

balance+=currentBet*2;

win=true;

}

else if(color==="black" && number%2!==0){

balance+=currentBet*2;

win=true;

}

showResult(win,number);

}

async function playRange(min,max){

if(balance<currentBet){

alert("الرصيد غير كافي");

return;

}

balance-=currentBet;

updateBalance();

const number=await spinWheel();

let win=false;

if(number>=min && number<=max){

balance+=currentBet*3;

win=true;

}

showResult(win,number);

}

async function playEvenOdd(type){

if(balance<currentBet){

alert("الرصيد غير كافي");

return;

}

balance-=currentBet;

updateBalance();

const number=await spinWheel();

let win=false;

if(type==="even" && number!==0 && number%2===0){

balance+=currentBet*2;

win=true;

}

if(type==="odd" && number%2!==0){

balance+=currentBet*2;

win=true;

}

showResult(win,number);

}

function updateBalance(){

balanceEl.innerHTML=balance;

}

function showResult(win,number){

if(win){

result.innerHTML=
"🎉 WIN +" + currentBet;

}else{

result.innerHTML=
"❌ خسرت - الرقم " + number;

}

updateBalance();

}

</script>

</body>
</html>
