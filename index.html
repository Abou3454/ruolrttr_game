<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMEER ROULETTE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
linear-gradient(to bottom,#18003d,#020018);
color:white;
overflow-x:hidden;
padding-bottom:120px;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.circle-btn{
width:70px;
height:70px;
border-radius:50%;
background:gold;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
box-shadow:0 0 25px gold;
}

.ping{
font-size:45px;
font-weight:bold;
color:#ff5252;
}

/* TIMER */

#timerBox{
width:180px;
margin:10px auto;
padding:18px;
border-radius:20px;
text-align:center;
font-size:45px;
font-weight:bold;
background:linear-gradient(45deg,#ff0066,#ff4081);
box-shadow:0 0 30px #ff0066;
}

/* WHEEL */

.wheel-wrapper{
position:relative;
width:92vw;
height:92vw;
margin:auto;
max-width:650px;
max-height:650px;
}

#rouletteCanvas{
width:100%;
height:100%;
border-radius:50%;
background:#111;
box-shadow:
0 0 40px orange,
0 0 90px #ff9800;
border:18px solid #7a4516;
}

.pointer{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:28px solid transparent;
border-right:28px solid transparent;
border-top:75px solid yellow;
z-index:10;
}

.ball{
position:absolute;
top:50%;
left:50%;
width:22px;
height:22px;
background:white;
border-radius:50%;
box-shadow:0 0 25px white;
transform:
translate(-50%,-50%)
translateY(-41vw);
z-index:20;
}

/* RESULT */

.result{
text-align:center;
font-size:110px;
font-weight:bold;
color:#00e5ff;
margin-top:20px;
text-shadow:0 0 35px cyan;
}

/* INFO */

.info{
text-align:center;
font-size:24px;
font-weight:bold;
line-height:1.8;
margin-top:10px;
}

/* HISTORY */

.history{
display:flex;
gap:12px;
overflow-x:auto;
padding:15px;
width:95%;
margin:auto;
}

.history-item{
min-width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

.red{
background:#ff1744;
}

.black{
background:black;
border:3px solid #555;
}

.green{
background:#00c853;
}

/* BALANCE */

.balance-area{
display:flex;
gap:15px;
width:92%;
margin:20px auto;
}

.balance{
flex:1;
background:linear-gradient(45deg,#00e5ff,#00b0ff);
padding:20px;
border-radius:22px;
font-size:30px;
font-weight:bold;
text-align:center;
}

.charge{
flex:1;
background:linear-gradient(45deg,#ff9800,#ffc107);
padding:20px;
border-radius:22px;
font-size:30px;
font-weight:bold;
text-align:center;
color:black;
}

/* CHIPS */

.chips{
display:flex;
justify-content:center;
gap:15px;
margin:20px 0;
flex-wrap:wrap;
}

.chip{
width:90px;
height:90px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
border:8px dashed rgba(255,255,255,.7);
cursor:pointer;
}

.white{
background:white;
color:black;
}

.blue{
background:#2196f3;
}

.redchip{
background:#f44336;
}

.gold{
background:#ffc107;
color:black;
}

/* BETS */

.bets{
width:95%;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.bet{
background:#00b248;
border:5px solid #5cff9d;
border-radius:22px;
padding:25px 10px;
text-align:center;
font-size:38px;
font-weight:bold;
box-shadow:0 0 18px #00ff73;
cursor:pointer;
transition:.2s;
}

.bet:hover{
transform:scale(1.03);
}

.bet span{
display:block;
margin-top:10px;
font-size:26px;
}

.selected-bet{
border:6px solid yellow !important;
}

/* BUTTON */

.spin-btn{
width:90%;
margin:30px auto;
display:block;
padding:22px;
font-size:40px;
font-weight:bold;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff0066,#ff4081);
color:white;
box-shadow:0 0 30px #ff0066;
cursor:pointer;
}

/* AUTO */

.auto{
width:92%;
margin:15px auto;
background:#111;
padding:20px;
border-radius:20px;
font-size:28px;
font-weight:bold;
text-align:center;
border:2px solid #666;
}

/* MOBILE */

@media(max-width:600px){

.bet{
font-size:28px;
}

.bet span{
font-size:20px;
}

.chip{
width:75px;
height:75px;
font-size:24px;
}

.result{
font-size:80px;
}

.balance,
.charge{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

<div class="circle-btn">☰</div>

<div class="ping">422ms</div>

<div class="circle-btn">🏆</div>

</div>

<div id="timerBox">
⏳ <span id="timer">15</span>
</div>

<div class="wheel-wrapper">

<canvas id="rouletteCanvas"></canvas>

<div class="pointer"></div>

<div class="ball" id="ball"></div>

</div>

<div class="result" id="resultNumber">
0
</div>

<div class="info">

<div>
إجمالي الرهان:
<span id="totalBet">0</span>
</div>

<div>
كوينزاتي:
<span id="balanceText">10000</span>
</div>

</div>

<div class="history" id="history">

<div class="history-item green">0</div>
<div class="history-item red">7</div>
<div class="history-item black">12</div>

</div>

<div class="balance-area">

<div class="balance">
💰 <span id="balance">10000</span>
</div>

<div class="charge" onclick="chargeCoins()">
➕ شحن
</div>

</div>

<div class="chips">

<div class="chip white" onclick="setChip(10)">
10
</div>

<div class="chip blue" onclick="setChip(50)">
50
</div>

<div class="chip redchip" onclick="setChip(100)">
100
</div>

<div class="chip gold" onclick="setChip(1000)">
1K
</div>

</div>

<div class="bets">

<div class="bet" onclick="placeBet('0')">
0
<span>x36</span>
</div>

<div class="bet" onclick="placeBet('1-12')">
1-12
<span>x3</span>
</div>

<div class="bet" onclick="placeBet('13-24')">
13-24
<span>x3</span>
</div>

<div class="bet" onclick="placeBet('25-36')">
25-36
<span>x3</span>
</div>

<div class="bet" onclick="placeBet('red')">
أحمر
<span>x2</span>
</div>

<div class="bet" onclick="placeBet('black')">
أسود
<span>x2</span>
</div>

<div class="bet" onclick="placeBet('odd')">
فردي
<span>x2</span>
</div>

<div class="bet" onclick="placeBet('even')">
زوجي
<span>x2</span>
</div>

</div>

<div class="auto">
🟢 الروليت التلقائي يعمل كل 15 ثانية
</div>

<button class="spin-btn" onclick="spin()">
SPIN
</button>

<audio id="spinSound" src="static/roulette.mp3"></audio>
<audio id="winSound" src="static/win.mp3"></audio>

<script>

/* SAVE */

let balance =
parseInt(localStorage.getItem("balance")) || 10000;

document.getElementById("balance").innerHTML=balance;
document.getElementById("balanceText").innerHTML=balance;

/* CANVAS */

const canvas =
document.getElementById("rouletteCanvas");

const ctx =
canvas.getContext("2d");

canvas.width=700;
canvas.height=700;

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,
24,16,33,1,20,14,31,9,22,
18,29,7,28,12,35,3,26
];

const colors=numbers.map((n,i)=>{
if(n===0)return"#00c853";
return i%2===0?"#ff0000":"#000";
});

function drawWheel(rotation=0){

ctx.clearRect(0,0,700,700);

const cx=350;
const cy=350;
const radius=320;

const arc=(Math.PI*2)/numbers.length;

for(let i=0;i<numbers.length;i++){

ctx.beginPath();

ctx.moveTo(cx,cy);

ctx.fillStyle=colors[i];

ctx.arc(
cx,
cy,
radius,
rotation+i*arc,
rotation+(i+1)*arc
);

ctx.fill();

ctx.save();

ctx.translate(cx,cy);

ctx.rotate(rotation+i*arc+arc/2);

ctx.fillStyle="white";

ctx.font="bold 24px Arial";

ctx.textAlign="center";

ctx.fillText(numbers[i],radius-40,10);

ctx.restore();

}

}

drawWheel();

/* BALL */

const ball=document.getElementById("ball");

let angle=0;

setInterval(()=>{

angle+=0.05;

ball.style.transform=
`
translate(-50%,-50%)
rotate(${angle}rad)
translateY(-41vw)
`;

},30);

/* BET SYSTEM */

let selectedChip=10;
let currentBet="";
let totalBet=0;

function setChip(v){

selectedChip=v;

}

function placeBet(type){

if(balance<selectedChip){

alert("لا يوجد كوينز كافي");

return;

}

currentBet=type;

balance-=selectedChip;

totalBet+=selectedChip;

updateBalance();

document.getElementById("totalBet")
.innerHTML=totalBet;

}

/* BALANCE */

function updateBalance(){

document.getElementById("balance")
.innerHTML=balance;

document.getElementById("balanceText")
.innerHTML=balance;

localStorage.setItem("balance",balance);

}

/* TIMER */

let timer=15;

setInterval(()=>{

timer--;

document.getElementById("timer")
.innerHTML=timer;

if(timer<=0){

timer=15;

spin();

}

},1000);

/* SPIN */

let currentRotation=0;
let spinning=false;

function spin(){

if(spinning)return;

spinning=true;

document.getElementById("spinSound")
.play();

const target=
Math.random()*Math.PI*12;

let start=currentRotation;
let end=currentRotation+target;

let startTime=null;

function animate(t){

if(!startTime)
startTime=t;

let progress=
(t-startTime)/5000;

if(progress>1)
progress=1;

let ease=
1-Math.pow(1-progress,3);

currentRotation=
start+(end-start)*ease;

drawWheel(currentRotation);

if(progress<1){

requestAnimationFrame(animate);

}else{

finish();

}

}

requestAnimationFrame(animate);

}

/* FINISH */

function finish(){

const result=
numbers[
Math.floor(Math.random()*numbers.length)
];

document.getElementById("resultNumber")
.innerHTML=result;

/* HISTORY */

const div=
document.createElement("div");

div.classList.add("history-item");

if(result===0){

div.classList.add("green");

}else if(result%2===0){

div.classList.add("black");

}else{

div.classList.add("red");

}

div.innerHTML=result;

document.getElementById("history")
.prepend(div);

/* WIN */

let reward=0;
let win=false;

if(currentBet==="red"
&& result!==0
&& result%2!==0){

reward=totalBet*2;
win=true;

}

if(currentBet==="black"
&& result!==0
&& result%2===0){

reward=totalBet*2;
win=true;

}

if(currentBet==="1-12"
&& result>=1
&& result<=12){

reward=totalBet*3;
win=true;

}

if(currentBet==="13-24"
&& result>=13
&& result<=24){

reward=totalBet*3;
win=true;

}

if(currentBet==="25-36"
&& result>=25
&& result<=36){

reward=totalBet*3;
win=true;

}

if(currentBet==="0"
&& result===0){

reward=totalBet*36;
win=true;

}

if(currentBet==="odd"
&& result%2!==0){

reward=totalBet*2;
win=true;

}

if(currentBet==="even"
&& result!==0
&& result%2===0){

reward=totalBet*2;
win=true;

}

if(win){

balance+=reward;

document.getElementById("winSound")
.play();

alert("🎉 ربحت "+reward);

}else{

alert("❌ خسرت");

}

totalBet=0;

document.getElementById("totalBet")
.innerHTML=0;

updateBalance();

spinning=false;

}

/* CHARGE */

function chargeCoins(){

const amount=
prompt("ادخل عدد الكوينز");

if(amount){

balance+=parseInt(amount);

updateBalance();

alert("✅ تم الشحن");

}

}

</script>

</body>
</html>
