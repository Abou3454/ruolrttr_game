<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الحظ</title>

<style>
body{
background:radial-gradient(circle,#240046,#000);
color:white;
text-align:center;
overflow-x:hidden;
margin:0;
padding:0;
}

.balance{
font-size:12vw;
color:gold;
font-weight:bold;
margin-top:15px;
text-shadow:0 0 20px gold;
}

.pointer{
width:0;
height:0;
border-left:6vw solid transparent;
border-right:6vw solid transparent;
border-top:12vw solid yellow;
margin:auto;
position:relative;
z-index:10;
top:6vw;
filter:drop-shadow(0 0 20px yellow);
}

.wheel-container{
position:relative;
width:90vw;
height:90vw;
max-width:420px;
max-height:420px;
margin:20px auto;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:3vw solid gold;
overflow:hidden;
position:relative;
transition:transform 5s cubic-bezier(0.17,0.67,0.12,0.99);
box-shadow:
0 0 40px gold,
0 0 80px yellow;
background:#0f6fff;
}

.slice{
position:absolute;
width:50%;
height:50%;
left:50%;
top:50%;
transform-origin:0% 0%;
clip-path:polygon(0 0,100% 0,0 100%);
display:flex;
align-items:center;
justify-content:center;
font-size:8vw;
font-weight:bold;
color:white;
}

.center-circle{
position:absolute;
width:30vw;
height:30vw;
max-width:130px;
max-height:130px;
background:radial-gradient(circle,#ff0000,#5a0000);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:2vw solid gold;
z-index:5;
display:flex;
align-items:center;
justify-content:center;
font-size:12vw;
font-weight:bold;
box-shadow:0 0 40px gold;
}

.bet-area{
display:flex;
justify-content:center;
gap:4vw;
margin-top:20px;
flex-wrap:wrap;
padding:10px;
}

.bet-box{
width:28vw;
height:32vw;
max-width:150px;
max-height:180px;
background:linear-gradient(#d000ff,#5a0070);
border-radius:20px;
border:4px solid gold;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:12vw;
font-weight:bold;
box-shadow:0 0 25px #ff00ff;
}

.bet-box span{
font-size:10vw;
color:gold;
margin-top:5px;
}

.amounts{
display:flex;
justify-content:center;
gap:4vw;
margin-top:20px;
flex-wrap:wrap;
}

.amount{
width:22vw;
height:22vw;
max-width:100px;
max-height:100px;
border-radius:50%;
border:none;
font-size:7vw;
font-weight:bold;
background:white;
box-shadow:0 0 20px white;
}

.active{
border:6px solid gold;
box-shadow:0 0 30px gold;
}

#spinBtn{
width:80vw;
max-width:320px;
height:18vw;
max-height:100px;
margin-top:30px;
border:none;
border-radius:20px;
font-size:10vw;
font-weight:bold;
background:linear-gradient(#666,#222);
color:white;
box-shadow:0 0 30px black;
}

.result{
margin-top:20px;
font-size:10vw;
color:gold;
text-shadow:0 0 20px gold;
padding-bottom:30px;
}
</style>
</head>

<body>

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-container">

<div id="wheel">

<div class="slice" style="transform:rotate(0deg);background:#1e88ff;">🍎</div>
<div class="slice" style="transform:rotate(45deg);background:#1e88ff;">🍉</div>
<div class="slice" style="transform:rotate(90deg);background:#ff00cc;">7️⃣</div>
<div class="slice" style="transform:rotate(135deg);background:#1e88ff;">🍎</div>
<div class="slice" style="transform:rotate(180deg);background:#1e88ff;">🍉</div>
<div class="slice" style="transform:rotate(225deg);background:#1e88ff;">🍎</div>
<div class="slice" style="transform:rotate(270deg);background:#1e88ff;">🍉</div>
<div class="slice" style="transform:rotate(315deg);background:#1e88ff;">🍎</div>

</div>

<div class="center-circle" id="timer">5</div>

</div>

<div class="bet-area">

<div class="bet-box">
🍉
<span>x2</span>
</div>

<div class="bet-box">
7️⃣
<span>x8</span>
</div>

<div class="bet-box">
🍎
<span>x2</span>
</div>

</div>

<div class="amounts">

<button class="amount">100</button>
<button class="amount">1K</button>
<button class="amount active">10K</button>

</div>

<button id="spinBtn">SPIN</button>

<div class="result" id="result">🍎 : النتيجة</div>

<script>

let spinning = false;
let balance = 5000;

const wheel = document.getElementById("wheel");
const spinBtn = document.getElementById("spinBtn");
const resultText = document.getElementById("result");
const balanceText = document.getElementById("balance");
const timer = document.getElementById("timer");

const items = [
"🍎",
"🍉",
"7️⃣",
"🍎",
"🍉",
"🍎",
"🍉",
"🍎"
];

const rewards = {
"🍎":2,
"🍉":2,
"7️⃣":8
};

function sound(type){

const audio = new Audio(
type=="win"
?
"https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"
:
"https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.mp3"
);

audio.play();

}

spinBtn.onclick = ()=>{

if(spinning) return;

spinning = true;

sound("spin");

let count = 5;

timer.innerText = count;

const timerInt = setInterval(()=>{

count--;

timer.innerText = count;

if(count<=0){
clearInterval(timerInt);
}

},1000);

const randomDeg = 3000 + Math.floor(Math.random()*360);

wheel.style.transform = `rotate(${randomDeg}deg)`;

setTimeout(()=>{

const index = Math.floor(Math.random()*items.length);

const result = items[index];

const reward = rewards[result];

balance += reward * 100;

balanceText.innerText = "$"+balance;

resultText.innerHTML = result + " : النتيجة";

sound("win");

navigator.vibrate([200,100,200]);

const popup = document.createElement("div");

popup.className = "popup";

popup.innerHTML = `
<h1>🎉 فوز</h1>
<div class="emoji">${result}</div>
<h2>X${reward}</h2>
`;

document.body.appendChild(popup);

setTimeout(()=>{
popup.remove();
},3000);

spinning = false;

timer.innerText = "5";

},5000);

}

</script>

</body>
</html>
