<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Roulette Casino</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
-webkit-tap-highlight-color:transparent;
}

body{
background:#111;
overflow:hidden;
height:100vh;
color:white;
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
background:
linear-gradient(#421111,#140909);
padding:5px;
}

/* العجلة */

.top{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

.history{
display:flex;
gap:5px;
margin-top:5px;
overflow:hidden;
}

.history div{
width:32px;
height:32px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:14px;
border:2px solid #555;
}

.redNum{
background:#ff0033;
}

.blackNum{
background:#111;
}

.greenNum{
background:#00cc44;
}

.timer{
font-size:50px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 20px gold;
margin-top:5px;
}

.wheelArea{
position:relative;
width:62vw;
height:62vw;
max-width:260px;
max-height:260px;
margin-top:5px;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid gold;
z-index:100;
}

.ball{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:50%;
top:10px;
left:50%;
margin-left:-9px;
z-index:90;

box-shadow:
0 0 10px white,
0 0 20px cyan;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid #c98c00;
overflow:hidden;
position:relative;

box-shadow:
0 0 20px orange,
0 0 50px gold;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

.number{
position:absolute;
left:50%;
top:50%;
font-size:12px;
font-weight:bold;
color:white;
transform-origin:0 0;
}

/* الطاولة */

.table{
width:100%;
background:#8f1f2d;
border-radius:15px;
padding:8px;
margin-top:5px;
border:2px solid rgba(255,255,255,.2);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:5px;
margin-bottom:5px;
}

.betBox{
height:70px;
border:2px solid rgba(255,255,255,.3);
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
position:relative;
overflow:hidden;
}

.betAmount{
position:absolute;
top:3px;
left:3px;
background:#111;
padding:2px 6px;
border-radius:8px;
font-size:13px;
color:gold;
}

.chipMark{
position:absolute;
bottom:3px;
right:3px;
font-size:22px;
}

.red{
background:#cc0022;
}

.black{
background:#1a1a1a;
}

.green{
background:#009933;
}

/* العملات */

.chips{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.chip{
width:65px;
height:65px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
background:white;
color:black;
border:4px solid #ddd;
}

.activeChip{
transform:scale(1.1);
box-shadow:0 0 20px gold;
border-color:gold;
}

/* الرصيد */

.balance{
font-size:35px;
font-weight:bold;
color:gold;
margin-top:5px;
}

/* النتيجة */

.result{
height:40px;
font-size:30px;
font-weight:bold;
margin-top:5px;
}

.win{
color:#00ff99;
}

.lose{
color:#ff3355;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="history" id="history"></div>

<div class="timer" id="timer">
15
</div>

<div class="wheelArea">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div class="wheel" id="wheel"></div>

</div>

</div>

<div class="table">

<div class="row">

<div class="betBox red"
onclick="placeBet('red',this)">
RED
<div class="betAmount" id="redAmount">0</div>
</div>

<div class="betBox black"
onclick="placeBet('black',this)">
BLACK
<div class="betAmount" id="blackAmount">0</div>
</div>

</div>

<div class="row">

<div class="betBox green"
onclick="placeBet('green',this)">
0
<div class="betAmount" id="greenAmount">0</div>
</div>

<div class="betBox"
onclick="placeBet('even',this)">
EVEN
<div class="betAmount" id="evenAmount">0</div>
</div>

</div>

<div class="row">

<div class="betBox"
onclick="placeBet('odd',this)">
ODD
<div class="betAmount" id="oddAmount">0</div>
</div>

<div class="betBox"
onclick="placeBet('big',this)">
19-36
<div class="betAmount" id="bigAmount">0</div>
</div>

</div>

<div class="chips">

<div class="chip activeChip"
onclick="selectChip(10,this)">
10
</div>

<div class="chip"
onclick="selectChip(50,this)">
50
</div>

<div class="chip"
onclick="selectChip(100,this)">
100
</div>

<div class="chip"
onclick="selectChip(1000,this)">
1K
</div>

</div>

<div class="balance"
id="balance">
$5000
</div>

<div class="result"
id="result"></div>

</div>

</div>

<script>

const wheel=
document.getElementById("wheel");

const ball=
document.getElementById("ball");

const history=
document.getElementById("history");

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,
24,16,33,1,20,14,31,9,22,
18,29,7,28,12,35,3,26
];

let balance=5000;

let selectedChip=10;

let bets={};

let spinning=false;

/* إنشاء العجلة */

function createWheel(){

const angle=360/numbers.length;

let gradient="";

for(let i=0;i<numbers.length;i++){

let color;

if(i===0){
color="#00aa33";
}else{
color=i%2===0?"red":"black";
}

gradient+=`${color}
${i*angle}deg
${(i+1)*angle}deg`;

if(i<numbers.length-1){
gradient+=",";
}

const n=
document.createElement("div");

n.className="number";

n.innerHTML=numbers[i];

n.style.transform=
`rotate(${i*angle}deg)
translateY(-28vw)
rotate(90deg)`;

wheel.appendChild(n);

}

wheel.style.background=
`conic-gradient(${gradient})`;

}

createWheel();

/* اختيار العملة */

function selectChip(amount,el){

selectedChip=amount;

document.querySelectorAll(".chip")
.forEach(c=>{
c.classList.remove("activeChip");
});

el.classList.add("activeChip");

}

/* وضع رهان */

function placeBet(type,el){

if(spinning) return;

if(balance<selectedChip){

alert("الرصيد غير كافي");

return;
}

balance-=selectedChip;

updateBalance();

if(!bets[type]){
bets[type]=0;
}

bets[type]+=selectedChip;

document.getElementById(
type+"Amount"
).innerHTML=bets[type];

let mark=
document.createElement("div");

mark.className="chipMark";

mark.innerHTML="🪙";

el.appendChild(mark);

setTimeout(()=>{
mark.remove();
},800);

}

/* تحديث الرصيد */

function updateBalance(){

document.getElementById("balance")
.innerHTML="$"+balance;

}

/* لون الرقم */

function getColor(num){

if(num===0) return "green";

const reds=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,
34,36
];

return reds.includes(num)
? "red"
: "black";

}

/* بدء الجولة */

function spin(){

spinning=true;

document.getElementById("result")
.innerHTML="";

const index=
Math.floor(
Math.random()*numbers.length
);

const result=
numbers[index];

const color=
getColor(result);

const slice=
360/numbers.length;

const rotate=
(360*8)+(index*slice);

wheel.style.transform=
`rotate(-${rotate}deg)`;

ball.style.transform=
`rotate(${rotate+720}deg)
translateY(29vw)`;

setTimeout(()=>{

calculateWin(result,color);

addHistory(result,color);

resetBets();

spinning=false;

},6500);

}

/* الأرباح */

function calculateWin(number,color){

let win=0;

for(let bet in bets){

const amount=bets[bet];

if(bet==="red" && color==="red")
win+=amount*2;

if(bet==="black" && color==="black")
win+=amount*2;

if(bet==="green" && color==="green")
win+=amount*14;

if(bet==="even"
&& number!==0
&& number%2===0)
win+=amount*2;

if(bet==="odd"
&& number%2!==0)
win+=amount*2;

if(bet==="big"
&& number>=19)
win+=amount*2;

}

if(win>0){

balance+=win;

document.getElementById("result")
.className="result win";

document.getElementById("result")
.innerHTML=
`ربحت ${win}$`;

}else{

document.getElementById("result")
.className="result lose";

document.getElementById("result")
.innerHTML=
`خسرت | ${number}`;

}

updateBalance();

}

/* السجل */

function addHistory(number,color){

const div=
document.createElement("div");

div.innerHTML=number;

if(color==="red")
div.className="redNum";

if(color==="black")
div.className="blackNum";

if(color==="green")
div.className="greenNum";

history.prepend(div);

if(history.children.length>8){
history.removeChild(
history.lastChild
);
}

}

/* تصفير */

function resetBets(){

bets={};

document
.querySelectorAll(".betAmount")
.forEach(el=>{
el.innerHTML="0";
});

}

/* المؤقت */

let time=15;

setInterval(()=>{

if(spinning) return;

time--;

document.getElementById("timer")
.innerHTML=time;

if(time<=0){

time=15;

spin();

}

},1000);

</script>

</body>
</html>
