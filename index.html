<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الحظ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:radial-gradient(circle,#2b0040,#090010);
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
padding:10px;
color:white;
}

.game{
width:100%;
max-width:430px;
text-align:center;
}

.balance{
font-size:70px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
margin-top:10px;
margin-bottom:10px;
}

.wheel-wrapper{
position:relative;
width:95vw;
max-width:380px;
height:95vw;
max-height:380px;
margin:auto;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-top:55px solid yellow;
z-index:20;
filter:drop-shadow(0 0 10px yellow);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
box-shadow:
0 0 25px gold,
0 0 60px yellow;
background:
conic-gradient(
#1e90ff 0deg 45deg,
#1e90ff 45deg 90deg,
#1e90ff 90deg 135deg,
#1e90ff 135deg 180deg,
#1e90ff 180deg 225deg,
#1e90ff 225deg 270deg,
#1e90ff 270deg 315deg,
#ff00aa 315deg 360deg
);
position:relative;
overflow:hidden;
transition:transform 5s cubic-bezier(.17,.67,.12,.99);
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,red,darkred);
border:8px solid gold;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
font-weight:bold;
color:white;
box-shadow:0 0 30px yellow;
z-index:10;
}

.slice{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
font-size:40px;
}

.slice:nth-child(1){transform:rotate(0deg) translate(120px);}
.slice:nth-child(2){transform:rotate(45deg) translate(120px);}
.slice:nth-child(3){transform:rotate(90deg) translate(120px);}
.slice:nth-child(4){transform:rotate(135deg) translate(120px);}
.slice:nth-child(5){transform:rotate(180deg) translate(120px);}
.slice:nth-child(6){transform:rotate(225deg) translate(120px);}
.slice:nth-child(7){transform:rotate(270deg) translate(120px);}
.slice:nth-child(8){transform:rotate(315deg) translate(120px);}

.bet-icons{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
margin-bottom:10px;
}

.bet-icons div{
font-size:40px;
background:#700090;
padding:10px;
border-radius:15px;
border:3px solid gold;
box-shadow:0 0 15px magenta;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:10px;
}

.card{
background:linear-gradient(#d000ff,#700090);
border:4px solid gold;
border-radius:25px;
padding:20px 10px;
box-shadow:0 0 25px magenta;
}

.card .icon{
font-size:60px;
}

.card .multi{
font-size:55px;
font-weight:bold;
color:gold;
margin-top:10px;
}

.bet{
font-size:50px;
margin-top:5px;
}

.chips{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.chip{
width:90px;
height:90px;
border-radius:50%;
background:white;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px white;
cursor:pointer;
transition:.2s;
}

.chip.active{
border:6px solid gold;
box-shadow:0 0 30px yellow;
}

.spin-btn{
margin-top:25px;
width:100%;
height:85px;
border:none;
border-radius:25px;
font-size:50px;
font-weight:bold;
background:linear-gradient(#666,#222);
color:white;
box-shadow:0 0 20px #000;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:45px;
color:gold;
text-shadow:0 0 10px gold;
}

@media(max-width:480px){

.balance{
font-size:50px;
}

.center{
width:90px;
height:90px;
font-size:50px;
}

.slice{
font-size:30px;
}

.card .icon{
font-size:45px;
}

.card .multi{
font-size:40px;
}

.bet{
font-size:40px;
}

.spin-btn{
font-size:40px;
height:75px;
}

.result{
font-size:35px;
}

.chip{
width:75px;
height:75px;
font-size:28px;
}

}

</style>
</head>

<body>

<div class="game">

<div class="balance" id="balance">$5000</div>

<div class="wheel-wrapper">

<div class="pointer"></div>

<div id="wheel">

<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">7️⃣</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="bet-icons">
<div>🍉</div>
<div>🍎</div>
<div>7️⃣</div>
</div>

<div class="cards">

<div class="card" onclick="setBet('watermelon')">
<div class="icon">🍉</div>
<div class="multi">x2</div>
<div class="bet" id="watermelonBet">0</div>
</div>

<div class="card" onclick="setBet('seven')">
<div class="icon">7️⃣</div>
<div class="multi">x8</div>
<div class="bet" id="sevenBet">0</div>
</div>

<div class="card" style="grid-column:1/3;width:50%;margin:auto;" onclick="setBet('apple')">
<div class="icon">🍎</div>
<div class="multi">x2</div>
<div class="bet" id="appleBet">0</div>
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(100)">100</div>
<div class="chip" onclick="selectChip(1000)">1K</div>
<div class="chip active" onclick="selectChip(10000)">10K</div>

</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

<div class="result" id="result">النتيجة :</div>

</div>

<script>

let selectedChip = 10000;

let bets = {
watermelon:0,
apple:0,
seven:0
};

let balance = 5000;

function updateBalance(){
document.getElementById("balance").innerHTML="$"+balance;
}

function selectChip(amount){

selectedChip=amount;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

event.target.classList.add("active");

}

function setBet(type){

if(balance < selectedChip) return;

balance -= selectedChip;

bets[type]+=selectedChip;

updateBalance();

document.getElementById(type+"Bet").innerHTML=bets[type];

}

function spin(){

const wheel=document.getElementById("wheel");

const timer=document.getElementById("timer");

let count=5;

timer.innerHTML=count;

let interval=setInterval(()=>{

count--;

timer.innerHTML=count;

if(count<=0){

clearInterval(interval);

finishSpin();

}

},1000);

let randomDeg=3600+Math.floor(Math.random()*360);

wheel.style.transform="rotate("+randomDeg+"deg)";

}

function finishSpin(){

const results=["🍉","🍎","7️⃣"];

const result=results[Math.floor(Math.random()*results.length)];

document.getElementById("result").innerHTML="النتيجة : "+result;

if(result=="🍉"){
balance += bets.watermelon * 2;
}

if(result=="🍎"){
balance += bets.apple * 2;
}

if(result=="7️⃣"){
balance += bets.seven * 8;
}

bets.watermelon=0;
bets.apple=0;
bets.seven=0;

document.getElementById("watermelonBet").innerHTML=0;
document.getElementById("appleBet").innerHTML=0;
document.getElementById("sevenBet").innerHTML=0;

updateBalance();

}

</script>

</body>
</html>
