<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Ultra Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{

background:
radial-gradient(circle,#006400 0%,#002200 45%,#000 100%);

overflow:hidden;
height:100vh;
color:white;

}

.game{

width:100%;
height:100vh;

display:flex;
flex-direction:column;
align-items:center;

padding:10px;

}

.top{

width:100%;

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:10px;

}

#balance{

font-size:34px;
font-weight:bold;

color:gold;

text-shadow:
0 0 10px gold,
0 0 25px gold,
0 0 50px gold;

}

#timer{

font-size:90px;
font-weight:bold;

color:#00ff55;

text-shadow:
0 0 10px #00ff55,
0 0 25px #00ff55,
0 0 50px #00ff55;

}

.wheelWrap{

position:relative;

width:330px;
height:330px;

margin-top:10px;

display:flex;
justify-content:center;
align-items:center;

}

#wheel{

width:100%;
height:100%;

border-radius:50%;

border:14px solid gold;

overflow:hidden;

position:relative;

transition:
transform 7s cubic-bezier(.15,.8,.2,1);

box-shadow:
0 0 20px gold,
0 0 50px gold,
0 0 100px gold;

background:
conic-gradient(
green 0deg 9.7deg,
red 9.7deg 19.4deg,
black 19.4deg 29.1deg,
red 29.1deg 38.8deg,
black 38.8deg 48.5deg,
red 48.5deg 58.2deg,
black 58.2deg 67.9deg,
red 67.9deg 77.6deg,
black 77.6deg 87.3deg,
red 87.3deg 97deg,
black 97deg 106.7deg,
red 106.7deg 116.4deg,
black 116.4deg 126.1deg,
red 126.1deg 135.8deg,
black 135.8deg 145.5deg,
red 145.5deg 155.2deg,
black 155.2deg 164.9deg,
red 164.9deg 174.6deg,
black 174.6deg 184.3deg,
red 184.3deg 194deg,
black 194deg 203.7deg,
red 203.7deg 213.4deg,
black 213.4deg 223.1deg,
red 223.1deg 232.8deg,
black 232.8deg 242.5deg,
red 242.5deg 252.2deg,
black 252.2deg 261.9deg,
red 261.9deg 271.6deg,
black 271.6deg 281.3deg,
red 281.3deg 291deg,
black 291deg 300.7deg,
red 300.7deg 310.4deg,
black 310.4deg 320.1deg,
red 320.1deg 329.8deg,
black 329.8deg 339.5deg,
red 339.5deg 349.2deg,
black 349.2deg 360deg
);

}

.center{

position:absolute;

width:95px;
height:95px;

border-radius:50%;

background:
radial-gradient(circle,#aa0000,#550000);

border:8px solid gold;

z-index:20;

box-shadow:
0 0 20px gold,
0 0 50px gold;

}

.pointer{

position:absolute;

top:-5px;
left:50%;

transform:translateX(-50%);

width:0;
height:0;

border-left:28px solid transparent;
border-right:28px solid transparent;
border-bottom:60px solid yellow;

z-index:100;

filter:
drop-shadow(0 0 15px yellow);

}

.number{

position:absolute;

left:50%;
top:50%;

font-size:16px;
font-weight:bold;

color:white;

transform-origin:0 -135px;

text-shadow:
0 0 5px black,
0 0 10px black;

}

.ball{

position:absolute;

width:22px;
height:22px;

background:white;

border-radius:50%;

top:50%;
left:50%;

margin-left:-11px;
margin-top:-150px;

z-index:50;

box-shadow:
0 0 20px white,
0 0 40px white,
0 0 80px white;

animation:ballSpin 1.2s linear infinite;

}

@keyframes ballSpin{

0%{
transform:
rotate(0deg)
translateY(-150px);
}

100%{
transform:
rotate(360deg)
translateY(-150px);
}

}

.resultBox{

margin-top:15px;

font-size:42px;
font-weight:bold;

color:gold;

text-shadow:
0 0 10px gold,
0 0 30px gold;

height:50px;

}

.bets{

width:100%;

display:grid;
grid-template-columns:1fr 1fr;

gap:10px;

margin-top:15px;

}

.bet{

height:100px;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;
font-weight:bold;

position:relative;

border:3px solid rgba(255,255,255,.2);

box-shadow:
0 0 15px rgba(255,255,255,.3),
inset 0 0 15px rgba(255,255,255,.2);

}

.bet span{

position:absolute;

top:8px;
left:8px;

background:black;

padding:4px 12px;

border-radius:12px;

font-size:18px;

color:yellow;

}

.blackbox{
background:#000;
}

.redbox{
background:#ff0055;
}

.greenbox{
background:#00dd44;
}

.darkbox{
background:#99003a;
}

.chips{

display:flex;
gap:14px;

margin-top:18px;

}

.chip{

width:85px;
height:85px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;
font-weight:bold;

color:black;

border:6px solid #ddd;

}

.chip.active{

border:6px solid gold;

box-shadow:
0 0 20px gold,
0 0 50px gold;

}

#currentBet{

margin-top:15px;

font-size:36px;

color:white;

text-shadow:
0 0 10px white;

}

</style>
</head>

<body>

<div class="game">

<div class="top">

<div id="balance">$5000</div>

<div id="timer">10</div>

</div>

<div class="wheelWrap">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div id="wheel"></div>

<div class="center"></div>

</div>

<div class="resultBox" id="result"></div>

<div class="bets">

<div class="bet blackbox">
<span>0</span>
BLACK
</div>

<div class="bet redbox">
<span>0</span>
RED
</div>

<div class="bet darkbox">
<span>0</span>
EVEN
</div>

<div class="bet greenbox">
<span>0</span>
0
</div>

<div class="bet darkbox">
<span>0</span>
19-36
</div>

<div class="bet darkbox">
<span>0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip">1K</div>

<div class="chip">100</div>

<div class="chip active">50</div>

<div class="chip">10</div>

</div>

<div id="currentBet">
0$: الرهان
</div>

</div>

<script>

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,27,13,36,
11,30,8,23,10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-135px) rotate(90deg)";

wheel.appendChild(div);

}

let timer=10;

let spinning=false;

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

spin();

}

},1000);

function spin(){

spinning=true;

document.getElementById("timer").innerHTML="SPIN";

const randomIndex=
Math.floor(Math.random()*numbers.length);

const result=
numbers[randomIndex];

const degree=
(randomIndex*9.73);

const finalRotate=
7200-degree;

wheel.style.transform=
"rotate("+finalRotate+"deg)";

const ball=
document.getElementById("ball");

ball.style.animation=
"ballSpin .4s linear infinite";

setTimeout(()=>{

ball.style.animation="none";

document.getElementById("result").innerHTML=
"WINNER : "+result;

},6500);

setTimeout(()=>{

timer=10;

spinning=false;

ball.style.animation=
"ballSpin 1.2s linear infinite";

},7000);

}

</script>

</body>
</html>
