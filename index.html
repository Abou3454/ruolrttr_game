<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>كازينو الروليت</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
linear-gradient(to bottom,#3d0000,#000);
overflow:hidden;
height:100vh;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:430px;
height:100vh;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
overflow:hidden;
}

.title{
font-size:17vw;
font-weight:bold;
color:white;
text-shadow:
0 0 10px red,
0 0 30px red;
margin-top:10px;
margin-bottom:5px;
}

.balance{
font-size:8vw;
color:gold;
font-weight:bold;
margin-bottom:5px;
}

.topBar{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
margin-bottom:5px;
}

.timer{
font-size:11vw;
font-weight:bold;
color:#00ff66;
text-shadow:
0 0 10px #00ff66,
0 0 25px #00ff66;
}

.history{
display:flex;
gap:6px;
overflow:hidden;
}

.history div{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:bold;
}

.redHis{
background:red;
}

.blackHis{
background:black;
}

.greenHis{
background:green;
}

.wheelWrap{
position:relative;
width:78vw;
height:78vw;
max-width:340px;
max-height:340px;
margin-top:5px;
}

.pointer{
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:35px solid yellow;
z-index:50;
filter:drop-shadow(0 0 15px yellow);
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
position:relative;
overflow:hidden;
box-shadow:
0 0 20px gold,
0 0 60px orange;
transition:
transform 6s cubic-bezier(.17,.67,.19,1);
background:black;
}

.ball{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:50%;
top:50%;
left:50%;
margin-left:-9px;
margin-top:-9px;
z-index:100;

box-shadow:
0 0 10px white,
0 0 20px cyan,
0 0 40px white;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
font-size:6vw;
font-weight:bold;
color:white;
text-shadow:0 0 8px white;
}

.betGrid{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.betBox{
height:70px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:8vw;
font-weight:bold;
position:relative;
border:3px solid rgba(255,255,255,.2);
transition:.2s;
}

.betCount{
position:absolute;
top:5px;
left:5px;
background:black;
color:yellow;
padding:2px 8px;
border-radius:10px;
font-size:16px;
}

.red{
background:#d9002b;
}

.black{
background:#111;
}

.green{
background:#00bb33;
}

.betControls{
display:flex;
gap:10px;
margin-top:12px;
}

.chip{
width:75px;
height:75px;
border-radius:50%;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
font-weight:bold;
border:5px solid #ddd;
}

.activeChip{
border-color:gold;
box-shadow:
0 0 15px gold,
0 0 35px gold;
transform:scale(1.1);
}

.currentBet{
margin-top:10px;
font-size:8vw;
color:white;
}

.spinBtn{
width:95%;
height:80px;
border:none;
border-radius:20px;
margin-top:12px;
background:red;
color:white;
font-size:12vw;
font-weight:bold;
box-shadow:
0 0 20px red,
0 0 50px red;
}

.result{
margin-top:10px;
font-size:9vw;
font-weight:bold;
color:yellow;
text-shadow:
0 0 10px yellow,
0 0 30px yellow;
}

@keyframes flash{

0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🎰 روليت
</div>

<div class="balance" id="balance">
$5000
</div>

<div class="topBar">

<div class="timer" id="timer">
15
</div>

<div class="history" id="history"></div>

</div>

<div class="wheelWrap">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div class="wheel" id="wheel"></div>

</div>

<div class="betGrid">

<div class="betBox black" onclick="placeBet('black',this)">
<div class="betCount" id="blackCount">0</div>
BLACK
</div>

<div class="betBox red" onclick="placeBet('red',this)">
<div class="betCount" id="redCount">0</div>
RED
</div>

<div class="betBox" style="background:#8c1025"
onclick="placeBet('even',this)">
<div class="betCount" id="evenCount">0</div>
EVEN
</div>

<div class="betBox green"
onclick="placeBet('zero',this)">
<div class="betCount" id="zeroCount">0</div>
0
</div>

<div class="betBox"
style="background:#8c1025"
onclick="placeBet('high',this)">
<div class="betCount" id="highCount">0</div>
19-36
</div>

<div class="betBox"
style="background:#8c1025"
onclick="placeBet('odd',this)">
<div class="betCount" id="oddCount">0</div>
ODD
</div>

</div>

<div class="betControls">

<div class="chip"
onclick="setChip(1000,this)">
1K
</div>

<div class="chip"
onclick="setChip(100,this)">
100
</div>

<div class="chip"
onclick="setChip(50,this)">
50
</div>

<div class="chip activeChip"
onclick="setChip(10,this)">
10
</div>

</div>

<div class="currentBet" id="currentBet">
الرهان: $0
</div>

<button class="spinBtn">
انتظر انتهاء العداد
</button>

<div class="result" id="result"></div>

</div>

<audio id="spinSound"
src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1932.mp3">
</audio>

<script>

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,
24,16,33,1,20,14,31,9,22,
18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

let balance=5000;
let chip=10;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

const wheel=document.getElementById("wheel");

numbers.forEach((n,i)=>{

const div=document.createElement("div");

div.className="number";

const deg=i*(360/numbers.length);

div.style.transform=
`rotate(${deg}deg)
translateY(-35vw)
rotate(90deg)`;

div.innerHTML=n;

wheel.appendChild(div);

});

function setChip(v,el){

chip=v;

document
.querySelectorAll(".chip")
.forEach(c=>c.classList.remove("activeChip"));

el.classList.add("activeChip");

}

function placeBet(type,el){

bets[type]+=chip;

balance-=chip;

updateUI();

el.style.boxShadow=
"0 0 20px gold";

}

function updateUI(){

document.getElementById("balance")
innerHTML="$"+balance;

document.getElementById("currentBet")
innerHTML=
"الرهان: $"+
Object.values(bets)
.reduce((a,b)=>a+b,0);

for(let k in bets){

document.getElementById(k+"Count")
innerHTML=bets[k];

}

}

let timer=15;

setInterval(()=>{

timer--;

document.getElementById("timer")
innerHTML=timer;

if(timer<=0){

spin();

timer=15;

}

},1000);

function spin(){

document
.getElementById("spinSound")
.play();

const result=
numbers[
Math.floor(
Math.random()*numbers.length
)
];

const index=
numbers.indexOf(result);

const deg=
360/numbers.length;

const rotate=
3600-(index*deg);

wheel.style.transform=
`rotate(${rotate}deg)`;

const ball=
document.getElementById("ball");

ball.style.transform=
`rotate(${rotate+1400}deg)
translateY(-30vw)`;

setTimeout(()=>{

checkWin(result);

addHistory(result);

document.getElementById("timer")
style.animation=
"flash .5s infinite";

},6500);

}

function checkWin(num){

let win=0;

if(redNums.includes(num))
win+=bets.red*2;

if(num!==0 &&
!redNums.includes(num))
win+=bets.black*2;

if(num%2==0 && num!=0)
win+=bets.even*2;

if(num%2==1)
win+=bets.odd*2;

if(num>=19)
win+=bets.high*2;

if(num==0)
win+=bets.zero*14;

balance+=win;

document.getElementById("result")
innerHTML=
win>0
?
"🎉 فوز +$"+win
:
"❌ خسارة - الرقم "+num;

if(win>0){

navigator.vibrate(300);

}

resetBets();

updateUI();

}

function resetBets(){

for(let k in bets){

bets[k]=0;

}

document
.querySelectorAll(".betBox")
.forEach(el=>{

el.style.boxShadow="none";

});

}

function addHistory(num){

const div=document.createElement("div");

div.innerHTML=num;

if(num==0)
div.className="greenHis";

else if(redNums.includes(num))
div.className="redHis";

else
div.className="blackHis";

const history=
document.getElementById("history");

history.prepend(div);

if(history.children.length>8){

history.removeChild(
history.lastChild
);

}

}

updateUI();

</script>

</body>
</html>
