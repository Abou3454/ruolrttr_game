<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الروليت</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:radial-gradient(#3d0057,#000);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
color:white;
}

.balance{
font-size:70px;
font-weight:bold;
color:gold;
margin-top:20px;
text-shadow:0 0 25px gold;
}

.pointer{
width:0;
height:0;
border-left:28px solid transparent;
border-right:28px solid transparent;
border-top:70px solid yellow;
margin-top:-5px;
z-index:10;
filter:drop-shadow(0 0 15px yellow);
}

.wheel-container{
position:relative;
width:85vw;
height:85vw;
max-width:380px;
max-height:380px;
margin-top:-10px;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
position:relative;
overflow:hidden;
background:#2d8cf0;
box-shadow:
0 0 40px gold,
0 0 80px #ff00ff;
transition:transform 5s cubic-bezier(.17,.67,.25,1);
}

.sector{
position:absolute;
width:50%;
height:50%;
left:50%;
top:50%;
transform-origin:0% 0%;
clip-path:polygon(0 0,100% 0,0 100%);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
border:2px solid #ffd700;
}

.sector span{
position:absolute;
font-size:42px;
transform:skewY(45deg) rotate(22deg);
text-shadow:0 0 10px rgba(255,255,255,0.8);
}

.s1{
background:linear-gradient(135deg,#ff00c8,#ff4de1);
transform:rotate(0deg) skewY(-45deg);
}

.s1 span{
font-size:55px;
filter:drop-shadow(0 0 12px gold);
}

.s2{
background:#1f8fff;
transform:rotate(45deg) skewY(-45deg);
}

.s3{
background:#1f8fff;
transform:rotate(90deg) skewY(-45deg);
}

.s4{
background:#1f8fff;
transform:rotate(135deg) skewY(-45deg);
}

.s5{
background:#1f8fff;
transform:rotate(180deg) skewY(-45deg);
}

.s6{
background:#1f8fff;
transform:rotate(225deg) skewY(-45deg);
}

.s7{
background:#1f8fff;
transform:rotate(270deg) skewY(-45deg);
}

.s8{
background:#1f8fff;
transform:rotate(315deg) skewY(-45deg);
}
</style>
</head>

<body>

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-container">

<div id="wheel">

<div class="sector s1"><span>7️⃣</span></div>
<div class="sector s2"><span>🍉</span></div>
<div class="sector s3"><span>🍎</span></div>
<div class="sector s4"><span>🍉</span></div>
<div class="sector s5"><span>🍎</span></div>
<div class="sector s6"><span>🍉</span></div>
<div class="sector s7"><span>🍎</span></div>
<div class="sector s8"><span>🍉</span></div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="bet-area">

<div class="card" onclick="bet('melon')">
<div class="emoji">🍉</div>
<div class="x">x2</div>
<div class="bet" id="melonBet">0</div>
</div>

<div class="card" onclick="bet('seven')">
<div class="emoji">7️⃣</div>
<div class="x">x8</div>
<div class="bet" id="sevenBet">0</div>
</div>

<div class="card" onclick="bet('apple')">
<div class="emoji">🍎</div>
<div class="x">x2</div>
<div class="bet" id="appleBet">0</div>
</div>

</div>

<div class="chips">

<div class="chip active" onclick="selectChip(100,this)">100</div>
<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip" onclick="selectChip(10000,this)">10K</div>

</div>

<div class="result" id="result">النتيجة : ؟</div>

<script>

let balance = 5000;
let selectedChip = 100;

let bets = {
melon:0,
apple:0,
seven:0
};

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll('.chip').forEach(c=>{
c.classList.remove('active');
});

el.classList.add('active');

}

function bet(type){

if(balance < selectedChip) return;

balance -= selectedChip;

bets[type] += selectedChip;

document.getElementById("balance").innerText="$"+balance;

document.getElementById(type+"Bet").innerText=bets[type];

}

let timer = 5;

setInterval(()=>{

timer--;

document.getElementById("timer").innerText=timer;

if(timer<=0){

spinWheel();

timer=5;

}

},1000);

function spinWheel(){

let wheel = document.getElementById("wheel");

let random = Math.floor(Math.random()*360)+1440;

wheel.style.transform="rotate("+random+"deg)";

let final = random % 360;

let result="apple";

if(final>=0 && final<90){
result="melon";
}
else if(final>=90 && final<180){
result="apple";
}
else if(final>=180 && final<270){
result="seven";
}
else{
result="apple";
}

setTimeout(()=>{

let win=0;

if(result=="melon"){
win=bets.melon*2;
document.getElementById("result").innerText="النتيجة : 🍉";
}

if(result=="apple"){
win=bets.apple*2;
document.getElementById("result").innerText="النتيجة : 🍎";
}

if(result=="seven"){
win=bets.seven*8;
document.getElementById("result").innerText="النتيجة : 7️⃣";
}

balance += win;

document.getElementById("balance").innerText="$"+balance;

bets.melon=0;
bets.apple=0;
bets.seven=0;

document.getElementById("melonBet").innerText="0";
document.getElementById("appleBet").innerText="0";
document.getElementById("sevenBet").innerText="0";

},5200);

}

</script>

</body>
</html>
