<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Wheel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    height:100dvh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:#fff;
    text-align:center;
    background:
        radial-gradient(circle at 50% 12%,rgba(50,148,255,.55),transparent 22%),
        radial-gradient(circle at 15% 55%,rgba(136,40,255,.35),transparent 30%),
        radial-gradient(circle at 85% 55%,rgba(255,0,184,.28),transparent 30%),
        linear-gradient(180deg,#050022,#150039 48%,#05000c);
}

.scene{
    width:min(100vw,430px);
    height:100dvh;
    margin:auto;
    position:relative;
    padding:10px 8px 8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:
        linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px),
        linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:80px 80px;
}

.scene::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    background:
        linear-gradient(130deg,transparent 0 28%,rgba(0,153,255,.18) 29% 31%,transparent 32%),
        linear-gradient(230deg,transparent 0 28%,rgba(0,153,255,.16) 29% 31%,transparent 32%),
        radial-gradient(circle at 50% 92%,rgba(255,171,64,.22),transparent 30%);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:2px 8px;
}

.top-left,.top-right{
    display:flex;
    gap:10px;
    align-items:center;
}

.round-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:3px solid #ffd86b;
    background:radial-gradient(circle,#6c22be,#2a075d);
    color:#ffd86b;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:900;
    box-shadow:0 0 12px rgba(255,216,107,.6);
}

.signal{
    color:#22ef72;
    font-size:13px;
    font-weight:bold;
    text-shadow:0 0 8px #22ef72;
}

.wheel-area{
    position:relative;
    flex:1;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:2px;
    min-height:300px;
}

.wheel-wrap{
    width:min(92vw,365px);
    height:min(92vw,365px);
    position:relative;
    margin:auto;
}

.pointer{
    position:absolute;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
    z-index:7;
    width:0;
    height:0;
    border-left:23px solid transparent;
    border-right:23px solid transparent;
    border-top:54px solid #ffd900;
    filter:drop-shadow(0 0 10px #ffd900);
}

.rim{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    background:
        repeating-conic-gradient(#ffe580 0 8deg,#ff9f1c 8deg 12deg),
        conic-gradient(#ffd86b,#ff8a00,#ffd86b);
    box-shadow:0 0 24px #ffb400, inset 0 0 18px #fff5a8;
}

.rim::after{
    content:"";
    position:absolute;
    inset:12px;
    border-radius:50%;
    border:8px solid #ffd86b;
    box-shadow:inset 0 0 15px rgba(0,0,0,.5);
}

#wheel{
    position:absolute;
    inset:16px;
    z-index:2;
    width:calc(100% - 32px);
    height:calc(100% - 32px);
    border-radius:50%;
    background:#095f8f;
}

.center{
    position:absolute;
    z-index:8;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:88px;
    height:88px;
    border-radius:50%;
    border:7px solid #ffbc2d;
    background:radial-gradient(circle,#5c12c8,#27005c);
    color:#fff;
    font-size:54px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 18px #ffd86b,inset 0 0 16px rgba(255,255,255,.2);
}

.stand{
    position:absolute;
    bottom:-15px;
    left:50%;
    transform:translateX(-50%);
    width:190px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(#ffcf5a,#9e5200);
    box-shadow:0 12px 20px rgba(0,0,0,.5);
}

.history-box{
    height:42px;
    border:3px solid #ffd86b;
    border-radius:10px;
    background:linear-gradient(180deg,#52118d,#230047);
    display:flex;
    align-items:center;
    justify-content:space-around;
    gap:3px;
    padding:2px 8px;
    box-shadow:0 0 12px rgba(255,216,107,.45);
}

.history-item{
    font-size:27px;
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.bet-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
    margin-top:6px;
}

.bet-card{
    min-width:0;
    height:106px;
    border:3px solid #ffd86b;
    border-radius:12px;
    background:linear-gradient(180deg,#8c0cbc,#37006d);
    box-shadow:0 0 12px rgba(255,0,255,.35),inset 0 0 18px rgba(255,255,255,.08);
    display:grid;
    grid-template-rows:22px 1fr 24px;
    overflow:hidden;
    cursor:pointer;
    user-select:none;
}

.bet-total{
    font-size:17px;
    font-weight:900;
    color:#fff;
    background:rgba(0,0,0,.18);
    padding-top:2px;
}

.bet-main{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:2px;
}

.bet-emoji{
    font-size:43px;
    line-height:1;
}

.bet-multi{
    color:#fff26a;
    font-size:42px;
    font-weight:900;
    text-shadow:0 0 8px #ff7a00;
    line-height:1;
}

.bet-you{
    font-size:16px;
    color:#ffd86b;
    font-weight:bold;
}

.controls{
    display:grid;
    grid-template-columns:74px 1fr;
    gap:8px;
    margin-top:8px;
    align-items:end;
}

.profile{
    height:68px;
    border-radius:11px;
    background:linear-gradient(135deg,#1b061f,#7e008f);
    border:2px solid #ffd86b;
    display:grid;
    grid-template-columns:46px 1fr;
    align-items:center;
    padding:5px;
    overflow:hidden;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:8px;
    background:radial-gradient(circle,#ffd86b,#2b1300);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#180014;
    font-size:24px;
    font-weight:900;
}

.profile-info{
    min-width:0;
    text-align:right;
    font-size:11px;
    line-height:1.35;
}

.id-line{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#fff;
}

.balance-line{
    color:#ffd86b;
    font-weight:900;
    font-size:14px;
}

.right-controls{
    min-width:0;
}

.chips{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:7px;
}

.chip{
    aspect-ratio:1;
    border-radius:50%;
    border:5px dashed #f0f0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:15px;
    font-weight:900;
    color:#111;
    cursor:pointer;
    background:radial-gradient(circle,#fff 0 36%,#ddd 37% 50%,#fff 51%);
    box-shadow:0 0 10px rgba(255,255,255,.55);
    user-select:none;
}

.chip[data-value="100000"]{border-color:#df7f12}
.chip[data-value="10000"]{border-color:#ba39c8}
.chip[data-value="1000"]{border-color:#1f95d1}
.chip[data-value="100"]{border-color:#1ebc64}

.chip.active{
    box-shadow:0 0 18px #fff,0 0 18px #00ff85;
    transform:translateY(-3px);
}

.repeat{
    margin-top:8px;
    height:46px;
    width:100%;
    border-radius:14px;
    border:4px solid #ffb82f;
    background:linear-gradient(180deg,#cfd6dc,#34434c);
    color:white;
    font-size:24px;
    font-weight:900;
    box-shadow:0 0 12px rgba(255,184,47,.6);
    cursor:pointer;
}

.footer{
    margin-top:2px;
    color:rgba(255,255,255,.45);
    font-size:10px;
}

#popup{
    position:fixed;
    inset:0;
    z-index:99;
    background:rgba(0,0,0,.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.popup-box{
    width:min(86vw,340px);
    border-radius:22px;
    border:4px solid #ffd86b;
    background:linear-gradient(180deg,#8b0eaa,#2b004a);
    box-shadow:0 0 30px #ffd86b;
    padding:24px 16px;
}

.popup-title{
    font-size:34px;
    color:#ffd86b;
    font-weight:900;
}

.popup-emoji{
    font-size:88px;
    margin-top:8px;
}

.popup-text{
    font-size:30px;
    font-weight:900;
    margin-top:8px;
}

@media(max-height:720px){
    .round-btn{width:36px;height:36px;font-size:21px}
    .wheel-wrap{width:285px;height:285px}
    .center{width:72px;height:72px;font-size:44px}
    .history-box{height:37px}
    .history-item{font-size:23px}
    .bet-card{height:92px}
    .bet-emoji{font-size:35px}
    .bet-multi{font-size:34px}
    .chip{font-size:13px}
    .repeat{height:40px;font-size:21px}
}
</style>
</head>

<body>

<div class="scene">

    <div class="top-bar">
        <div class="top-left">
            <div class="round-btn">☰</div>
            <div class="round-btn">?</div>
        </div>

        <div class="signal">5ms</div>

        <div class="top-right">
            <div class="round-btn">🔇</div>
            <div class="round-btn">↗</div>
        </div>
    </div>

    <div class="wheel-area">
        <div class="wheel-wrap">
            <div class="pointer"></div>
            <div class="rim"></div>
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="center" id="timer">15</div>
            <div class="stand"></div>
        </div>
    </div>

    <div>
        <div class="history-box" id="history">
            <div class="history-item">🍎</div>
            <div class="history-item">🍉</div>
            <div class="history-item">7️⃣</div>
            <div class="history-item">🍎</div>
            <div class="history-item">🍉</div>
            <div class="history-item">🍎</div>
            <div class="history-item">7️⃣</div>
        </div>

        <div class="bet-row">
            <div class="bet-card" data-emoji="🍉" data-multi="2">
                <div class="bet-total" id="totalWatermelon">0</div>
                <div class="bet-main">
                    <div class="bet-emoji">🍉</div>
                    <div class="bet-multi">x2</div>
                </div>
                <div class="bet-you">أنت: <span class="amount">0</span></div>
            </div>

            <div class="bet-card" data-emoji="7️⃣" data-multi="8">
                <div class="bet-total" id="totalSeven">0</div>
                <div class="bet-main">
                    <div class="bet-emoji">7️⃣</div>
                    <div class="bet-multi">x8</div>
                </div>
                <div class="bet-you">أنت: <span class="amount">0</span></div>
            </div>

            <div class="bet-card" data-emoji="🍎" data-multi="2">
                <div class="bet-total" id="totalApple">0</div>
                <div class="bet-main">
                    <div class="bet-emoji">🍎</div>
                    <div class="bet-multi">x2</div>
                </div>
                <div class="bet-you">أنت: <span class="amount">0</span></div>
            </div>
        </div>

        <div class="controls">
            <div class="profile">
                <div class="avatar">👑</div>
                <div class="profile-info">
                    <div class="id-line" id="playerIdBox">ID: ...</div>
                    <div class="balance-line" id="balance">$0</div>
                </div>
            </div>

            <div class="right-controls">
                <div class="chips">
                    <div class="chip" data-value="100000">100K</div>
                    <div class="chip" data-value="10000">10K</div>
                    <div class="chip" data-value="1000">1K</div>
                    <div class="chip active" data-value="100">100</div>
                </div>
                <button class="repeat" id="repeatBtn">إعادة</button>
            </div>
        </div>

        <div class="footer">version: 1.0.0</div>
    </div>

</div>

<div id="popup">
    <div class="popup-box">
        <div class="popup-title">النتيجة</div>
        <div class="popup-emoji" id="popupEmoji">🍉</div>
        <div class="popup-text" id="popupText">انتهت الجولة</div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

let playerId = "guest";

if(window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user){
    playerId = String(Telegram.WebApp.initDataUnsafe.user.id);
}else{
    let guestId = localStorage.getItem("luckyGameGuestId");
    if(!guestId){
        guestId = "guest_" + Date.now();
        localStorage.setItem("luckyGameGuestId", guestId);
    }
    playerId = guestId;
}

const playerRef = db.ref("players/" + playerId);

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const timer = document.getElementById("timer");
const balanceEl = document.getElementById("balance");
const playerIdBox = document.getElementById("playerIdBox");
const popup = document.getElementById("popup");
const popupEmoji = document.getElementById("popupEmoji");
const popupText = document.getElementById("popupText");
const historyEl = document.getElementById("history");
const repeatBtn = document.getElementById("repeatBtn");

playerIdBox.innerText = "ID: " + playerId;
playerIdBox.onclick = ()=>{
    navigator.clipboard.writeText(playerId);
    showPopup("✅","تم نسخ ID",1200);
};

const sections = ["🍎","🍉","🍎","🍉","🍎","🍉","🍎","🍉","7️⃣","🍉"];
const colors = ["#0c6fa5","#0b835a","#0c6fa5","#0b835a","#0c6fa5","#0b835a","#0c6fa5","#0b835a","#d414c7","#0b835a"];

let balance = 0;
let currentAngle = 0;
let timeLeft = 15;
let selectedChip = 100;
let spinning = false;
let audioContext = null;

let bets = {"🍉":0,"🍎":0,"7️⃣":0};
let lastBets = {"🍉":0,"🍎":0,"7️⃣":0};

function initPlayer(){
    playerRef.once("value").then(snapshot=>{
        if(!snapshot.exists()){
            playerRef.set({balance:0,lastDailyReward:0});
        }
    });

    playerRef.on("value", snapshot=>{
        const data = snapshot.val();
        if(data && typeof data.balance !== "undefined"){
            balance = Number(data.balance);
            balanceEl.innerText = "$" + balance;
        }
    });
}

function saveBalance(){
    balanceEl.innerText = "$" + balance;
    playerRef.update({balance:balance});
}

function initAudio(){
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioContext.state === "suspended") audioContext.resume();
}

document.addEventListener("click",initAudio,{once:true});
document.addEventListener("touchstart",initAudio,{once:true});

function tone(freq,duration,type="sine",vol=.15){
    if(!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,audioContext.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    osc.stop(audioContext.currentTime + duration);
}

function winSound(){
    tone(523,.1);
    setTimeout(()=>tone(659,.1),100);
    setTimeout(()=>tone(880,.18),210);
}

function loseSound(){
    tone(220,.15,"sawtooth",.1);
    setTimeout(()=>tone(150,.2,"sawtooth",.1),140);
}

function errorSound(){
    tone(120,.12,"square",.1);
    setTimeout(()=>tone(90,.12,"square",.1),120);
}

function showPopup(emoji,text,duration=2200){
    popup.style.display = "flex";
    popupEmoji.innerText = emoji;
    popupText.innerText = text;
    setTimeout(()=>popup.style.display = "none",duration);
}

function drawWheel(){
    const center = 250;
    const radius = 230;
    const angle = Math.PI * 2 / sections.length;

    ctx.clearRect(0,0,500,500);

    for(let i=0;i<sections.length;i++){
        const start = i * angle;
        const end = start + angle;

        const gradient = ctx.createRadialGradient(center,center,30,center,center,radius);
        gradient.addColorStop(0,"#ffd86b");
        gradient.addColorStop(.18,colors[i]);
        gradient.addColorStop(1,colors[i]);

        ctx.beginPath();
        ctx.moveTo(center,center);
        ctx.arc(center,center,radius,start,end);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.lineWidth = 6;
        ctx.strokeStyle = "#ffd86b";
        ctx.stroke();

        ctx.save();
        ctx.translate(center,center);
        ctx.rotate(start + angle / 2);
        ctx.font = "54px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,.7)";
        ctx.shadowBlur = 8;
        ctx.fillText(sections[i],radius - 72,0);
        ctx.restore();
    }
}

function updateBetUI(){
    document.querySelectorAll(".bet-card").forEach(card=>{
        const emoji = card.dataset.emoji;
        card.querySelector(".amount").innerText = bets[emoji];
    });

    document.getElementById("totalWatermelon").innerText = bets["🍉"];
    document.getElementById("totalApple").innerText = bets["🍎"];
    document.getElementById("totalSeven").innerText = bets["7️⃣"];
}

function resetBets(){
    lastBets = {...bets};
    bets = {"🍉":0,"🍎":0,"7️⃣":0};
    updateBetUI();
}

function updateHistory(result){
    const items = Array.from(historyEl.children);
    for(let i=items.length-1;i>0;i--){
        items[i].innerText = items[i-1].innerText;
    }
    items[0].innerText = result;
}

function getResult(){
    const sectionAngle = 360 / sections.length;
    const normalized = ((currentAngle % 360) + 360) % 360;
    const pointerAngle = (270 - normalized + 360) % 360;
    const index = Math.floor(pointerAngle / sectionAngle);
    return sections[index];
}

function spinWheel(){
    if(spinning) return;
    spinning = true;
    timeLeft = 15;
    timer.innerText = timeLeft;

    const randomDeg = Math.floor(Math.random() * 360) + 1440;
    currentAngle += randomDeg;

    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.25,1)";
    canvas.style.transform = `rotate(${currentAngle}deg)`;

    setTimeout(()=>{
        showResult();
        spinning = false;
    },4300);
}

function showResult(){
    const result = getResult();
    const betAmount = bets[result];
    const card = document.querySelector(`.bet-card[data-emoji="${result}"]`);
    const multi = Number(card.dataset.multi);

    let msg = "خسرت";

    if(betAmount > 0){
        const win = betAmount * multi;
        balance += win;
        msg = "ربحت $" + win;
        winSound();
    }else{
        loseSound();
    }

    saveBalance();
    updateHistory(result);
    showPopup(result,msg,2600);
    resetBets();
}

document.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
        initAudio();
        document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        selectedChip = Number(chip.dataset.value);
        tone(700,.05,"triangle",.08);
    });
});

document.querySelectorAll(".bet-card").forEach(card=>{
    card.addEventListener("click",()=>{
        initAudio();
        if(spinning) return;

        if(balance < selectedChip){
            errorSound();
            showPopup("❌","الرصيد غير كافي",1300);
            return;
        }

        const emoji = card.dataset.emoji;
        balance -= selectedChip;
        bets[emoji] += selectedChip;

        tone(520,.06,"triangle",.08);
        saveBalance();
        updateBetUI();
    });
});

repeatBtn.addEventListener("click",()=>{
    initAudio();
    if(spinning) return;

    const total = lastBets["🍉"] + lastBets["🍎"] + lastBets["7️⃣"];

    if(total <= 0){
        errorSound();
        showPopup("↻","لا يوجد رهان سابق",1300);
        return;
    }

    if(balance < total){
        errorSound();
        showPopup("❌","الرصيد غير كافي",1300);
        return;
    }

    balance -= total;
    bets["🍉"] += lastBets["🍉"];
    bets["🍎"] += lastBets["🍎"];
    bets["7️⃣"] += lastBets["7️⃣"];

    saveBalance();
    updateBetUI();
    tone(760,.08,"triangle",.1);
});

setInterval(()=>{
    if(spinning) return;
    timeLeft--;
    timer.innerText = timeLeft;
    if(timeLeft <= 0) spinWheel();
},1000);

drawWheel();
initPlayer();
updateBetUI();
</script>

</body>
</html>
