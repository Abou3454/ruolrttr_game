<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Casino Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#021002;
overflow:hidden;
height:100vh;
color:white;
}

.game{
width:100%;
height:100vh;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
background:
radial-gradient(circle at center,#066b12 0%,#021002 100%);
}

/* TOP */

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#balance{
font-size:30px;
font-weight:bold;
color:gold;
text-shadow:
0 0 10px gold,
0 0 25px gold;
}

#timer{
font-size:80px;
font-weight:bold;
color:#00ff55;
text-shadow:
0 0 15px #00ff55,
0 0 35px #00ff55;
}

/* HISTORY */

.history{
display:flex;
gap:6px;
margin-bottom:10px;
}

.history div{
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:15px;
font-weight:bold;
color:white;
}

.red{
background:#d90000;
}

.black{
background:#111;
}

.green{
background:#00aa33;
}

/* WHEEL AREA */

.wheelWrap{
position:relative;
width:340px;
height:340px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}

/* OUTER CASINO */

.outer{
position:absolute;
width:340px;
height:340px;
border-radius:50%;
background:
radial-gradient(circle,#8b0000 0%,#300000 100%);
border:12px solid gold;
box-shadow:
0 0 20px gold,
0 0 60px gold;
}

/* POINTER */

.pointer{
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-top:50px solid gold;
z-index:200;
filter:drop-shadow(0 0 15px gold);
}

/* WHEEL */

#wheel{
position:absolute;
width:280px;
height:280px;
border-radius:50%;
overflow:hidden;
transition:
transform 6s cubic-bezier(.17,.67,.2,1);
background:
conic-gradient(
#00aa33 0deg 9.7deg,
#e10000 9.7deg 19.4deg,
#111 19.4deg 29.1deg,
#e10000 29.1deg 38.8deg,
#111 38.8deg 48.5deg,
#e10000 48.5deg 58.2deg,
#111 58.2deg 67.9deg,
#e10000 67.9deg 77.6deg,
#111 77.6deg 87.3deg,
#e10000 87.3deg 97deg,
#111 97deg 106.7deg,
#e10000 106.7deg 116.4deg,
#111 116.4deg 126.1deg,
#e10000 126.1deg 135.8deg,
#111 135.8deg 145.5deg,
#e10000 145.5deg 155.2deg,
#111 155.2deg 164.9deg,
#e10000 164.9deg 174.6deg,
#111 174.6deg 184.3deg,
#e10000 184.3deg 194deg,
#111 194deg 203.7deg,
#e10000 203.7deg 213.4deg,
#111 213.4deg 223.1deg,
#e10000 223.1deg 232.8deg,
#111 232.8deg 242.5deg,
#e10000 242.5deg 252.2deg,
#111 252.2deg 261.9deg,
#e10000 261.9deg 271.6deg,
#111 271.6deg 281.3deg,
#e10000 281.3deg 291deg,
#111 291deg 300.7deg,
#e10000 300.7deg 310.4deg,
#111 310.4deg 320.1deg,
#e10000 320.1deg 329.8deg,
#111 329.8deg 339.5deg,
#e10000 339.5deg 349.2deg,
#111 349.2deg 360deg
);

box-shadow:
0 0 20px rgba(255,255,255,0.3);
}

/* GOLD RING */

.ring{
position:absolute;
width:298px;
height:298px;
border-radius:50%;
border:8px solid gold;
box-shadow:
0 0 20px gold;
}

/* CENTER */

.center{
position:absolute;
width:95px;
height:95px;
border-radius:50%;
background:
radial-gradient(circle,#a30000 0%,#2a0000 100%);
border:10px solid gold;
z-index:100;
box-shadow:
0 0 20px gold,
0 0 25px gold inset;
}

/* NUMBERS */

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 -126px;
font-size:18px;
font-weight:bold;
color:white;
text-shadow:
0 0 5px black,
0 0 10px black;
}

/* BALL */

.ball{
position:absolute;
width:20px;
height:20px;
background:white;
border-radius:50%;
z-index:300;

box-shadow:
0 0 15px white,
0 0 35px white;

animation:ballMove 1.5s linear infinite;
}

@keyframes ballMove{

0%{
transform:
rotate(0deg)
translateY(-160px);
}

100%{
transform:
rotate(360deg)
translateY(-160px);
}

}

/* WIN EFFECT */

.winFlash{
animation:flash 0.5s infinite;
}

@keyframes flash{

0%{
box-shadow:
0 0 10px white,
0 0 30px white;
}

100%{
box-shadow:
0 0 10px gold,
0 0 50px gold;
}

}

/* BETS */

.bets{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.bet{
height:90px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
position:relative;

border:3px solid rgba(255,255,255,0.2);

box-shadow:
0 0 15px rgba(255,255,255,0.2);
}

.bet.active{
transform:scale(1.03);

box-shadow:
0 0 30px white;
}

.bet span{
position:absolute;
top:6px;
left:6px;

background:black;

padding:2px 12px;

border-radius:15px;

font-size:18px;

color:yellow;
}

/* COLORS */

.blackbox{
background:#111;
}

.redbox{
background:#ff0044;
}

.greenbox{
background:#00cc44;
}

.darkbox{
background:#940030;
}

/* CHIPS */

.chips{
display:flex;
justify-content:center;
gap:12px;
margin-top:18px;
}

.chip{
width:82px;
height:82px;
border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;
font-weight:bold;
color:black;

border:5px solid #ddd;
}

.chip.active{
border:5px solid gold;

box-shadow:
0 0 25px gold;
}

/* TEXT */

#currentBet{
margin-top:15px;
font-size:34px;
}

#result{
margin-top:10px;
font-size:34px;
font-weight:bold;
color:gold;

text-shadow:
0 0 15px gold,
0 0 30px gold;
}

</style>
</head>

<body>

<div class="game">

<div class="top">

<div id="balance">$5000</div>

<div id="timer">10</div>

</div>

<div class="history" id="history"></div>

<div class="wheelWrap">

<div class="outer"></div>

<div class="pointer"></div>

<div class="ring"></div>

<div id="wheel"></div>

<div class="center"></div>

<div class="ball" id="ball"></div>

</div>

<div class="bets">

<div class="bet blackbox" onclick="placeBet('black',this)">
<span id="blackAmount">0</span>
BLACK
</div>

<div class="bet redbox" onclick="placeBet('red',this)">
<span id="redAmount">0</span>
RED
</div>

<div class="bet darkbox" onclick="placeBet('even',this)">
<span id="evenAmount">0</span>
EVEN
</div>

<div class="bet greenbox" onclick="placeBet('zero',this)">
<span id="zeroAmount">0</span>
0
</div>

<div class="bet darkbox" onclick="placeBet('high',this)">
<span id="highAmount">0</span>
19-36
</div>

<div class="bet darkbox" onclick="placeBet('odd',this)">
<span id="oddAmount">0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(1000,this)">1K</div>

<div class="chip" onclick="selectChip(100,this)">100</div>

<div class="chip active" onclick="selectChip(50,this)">50</div>

<div class="chip" onclick="selectChip(10,this)">10</div>

</div>

<div id="currentBet">الرهان: $0</div>

<div id="result"></div>

</div>

<script>

let balance=5000;

let selectedChip=50;

let timer=10;

let spinning=false;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

const numbers=[
0,32,15,19,4,21,2,25,17,34,
6,27,13,36,11,30,8,23,10,
5,24,16,33,1,20,14,31,9,
22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

/* CREATE NUMBERS */

function createNumbers(){

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-126px) rotate(90deg)";

wheel.appendChild(div);

}

}

createNumbers();

/* UPDATE BALANCE */

function updateBalance(){

document.getElementById("balance").innerHTML=
"$"+balance;

}

/* SELECT CHIP */

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

el.classList.add("active");

}

/* TOTAL BET */

function totalBet(){

return Object.values(bets).reduce((a,b)=>a+b,0);

}

/* PLACE BET */

function placeBet(type,el){

if(spinning)return;

if(balance<selectedChip)return;

balance-=selectedChip;

updateBalance();

bets[type]+=selectedChip;

document.getElementById(type+"Amount").innerHTML=
bets[type];

document.getElementById("currentBet").innerHTML=
"الرهان: $"+totalBet();

el.classList.add("active");

}

/* START ROUND */

function startRound(){

if(spinning)return;

spinning=true;

document.getElementById("timer").innerHTML="SPIN";

let result=
numbers[Math.floor(Math.random()*numbers.length)];

let index=numbers.indexOf(result);

let degree=(360/numbers.length)*index;

let finalRotate=3600-degree;

document.getElementById("wheel").style.transform=
"rotate("+finalRotate+"deg)";

/* SLOW BALL */

document.getElementById("ball").style.animation=
"ballMove 0.7s linear infinite";

setTimeout(()=>{

document.getElementById("ball").style.animation=
"ballMove 1.2s linear infinite";

},2000);

setTimeout(()=>{

document.getElementById("ball").style.animation=
"ballMove 2s linear infinite";

},4000);

setTimeout(()=>{

finishRound(result);

},6000);

}

/* FINISH */

function finishRound(number){

let win=0;

if(redNums.includes(number))
win+=bets.red*2;

if(number!==0 && !redNums.includes(number))
win+=bets.black*2;

if(number%2===0 && number!==0)
win+=bets.even*2;

if(number%2===1)
win+=bets.odd*2;

if(number>=19)
win+=bets.high*2;

if(number===0)
win+=bets.zero*14;

balance+=win;

updateBalance();

/* RESULT COLOR */

let color="black";

if(number===0)color="green";
else if(redNums.includes(number))color="red";

/* HISTORY */

let div=document.createElement("div");

div.className=color;

div.innerHTML=number;

document.getElementById("history").prepend(div);

if(document.getElementById("history").children.length>8){

document.getElementById("history").lastChild.remove();

}

/* RESULT */

document.getElementById("result").innerHTML=
(win>0 ? "WIN +$"+win : "LOSE")+" | "+number;

/* WIN FLASH */

if(win>0){

document.getElementById("result")
.classList.add("winFlash");

setTimeout(()=>{

document.getElementById("result")
.classList.remove("winFlash");

},3000);

}

/* RESET BETS */

for(let key in bets){

bets[key]=0;

document.getElementById(key+"Amount").innerHTML="0";

}

document.querySelectorAll(".bet").forEach(b=>{
b.classList.remove("active");
});

document.getElementById("currentBet").innerHTML=
"الرهان: $0";

document.getElementById("ball").style.animation=
"ballMove 1.5s linear infinite";

spinning=false;

timer=10;

}

/* TIMER */

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

startRound();

}

},1000);

updateBalance();

</script>

</body>
</html>
