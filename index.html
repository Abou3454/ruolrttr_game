<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
radial-gradient(circle,#0d5a00 0%,#001a00 70%);
overflow:hidden;
height:100vh;
color:white;
}

.game{
width:100%;
height:100vh;
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
}

/* TOP */

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#balance{
font-size:58px;
font-weight:bold;
color:gold;
text-shadow:0 0 25px gold;
}

#timer{
font-size:90px;
font-weight:bold;
color:#00ff55;
text-shadow:0 0 35px #00ff55;
}

/* WHEEL */

.wheelWrap{
position:relative;
width:420px;
height:420px;
margin-top:10px;
}

.outerGlow{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:radial-gradient(circle,rgba(255,255,0,.2),transparent 70%);
filter:blur(25px);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
position:absolute;
overflow:hidden;
border:14px solid gold;
box-shadow:
0 0 25px gold,
0 0 70px rgba(255,255,0,.6);
transition:transform 5s cubic-bezier(.17,.67,.2,1);

background:
conic-gradient(
#00aa00 0deg 9.73deg,
red 9.73deg 19.46deg,
black 19.46deg 29.19deg,
red 29.19deg 38.92deg,
black 38.92deg 48.65deg,
red 48.65deg 58.38deg,
black 58.38deg 68.11deg,
red 68.11deg 77.84deg,
black 77.84deg 87.57deg,
red 87.57deg 97.3deg,
black 97.3deg 107.03deg,
red 107.03deg 116.76deg,
black 116.76deg 126.49deg,
red 126.49deg 136.22deg,
black 136.22deg 145.95deg,
red 145.95deg 155.68deg,
black 155.68deg 165.41deg,
red 165.41deg 175.14deg,
black 175.14deg 184.87deg,
red 184.87deg 194.6deg,
black 194.6deg 204.33deg,
red 204.33deg 214.06deg,
black 214.06deg 223.79deg,
red 223.79deg 233.52deg,
black 233.52deg 243.25deg,
red 243.25deg 252.98deg,
black 252.98deg 262.71deg,
red 262.71deg 272.44deg,
black 272.44deg 282.17deg,
red 282.17deg 291.9deg,
black 291.9deg 301.63deg,
red 301.63deg 311.36deg,
black 311.36deg 321.09deg,
red 321.09deg 330.82deg,
black 330.82deg 340.55deg,
red 340.55deg 350.28deg,
black 350.28deg 360deg
);
}

/* CENTER */

.centerCircle{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
background:
radial-gradient(circle,#aa0000 0%,#550000 70%);
border:10px solid gold;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
box-shadow:
0 0 25px gold,
0 0 40px rgba(255,255,0,.5);
}

/* POINTER */

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:40px solid transparent;
border-right:40px solid transparent;
border-bottom:70px solid yellow;
z-index:50;
filter:drop-shadow(0 0 15px yellow);
}

/* BALL */

.ball{
position:absolute;
width:26px;
height:26px;
background:white;
border-radius:50%;
top:50%;
left:50%;
margin-left:-13px;
margin-top:-190px;
box-shadow:
0 0 20px white,
0 0 45px white;
z-index:60;
animation:ballSpin 1s linear infinite;
}

@keyframes ballSpin{

0%{
transform:rotate(0deg) translateY(-190px);
}

100%{
transform:rotate(360deg) translateY(-190px);
}

}

/* NUMBERS */

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 -175px;
font-size:17px;
font-weight:bold;
color:white;
text-shadow:0 0 8px black;
}

/* BETS */

.bets{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:20px;
}

.bet{
height:110px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
position:relative;
border:4px solid rgba(255,255,255,.2);
box-shadow:
0 0 20px rgba(255,255,255,.15);
}

.bet span{
position:absolute;
top:8px;
left:8px;
background:black;
padding:5px 14px;
border-radius:18px;
font-size:22px;
color:yellow;
}

.blackbox{
background:#000;
}

.redbox{
background:#ff0055;
}

.greenbox{
background:#00dd44;
}

.darkbox{
background:#a00040;
}

/* CHIPS */

.chips{
display:flex;
justify-content:center;
gap:15px;
margin-top:18px;
}

.chip{
width:95px;
height:95px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
color:black;
border:7px solid #ddd;
}

.chip.active{
border:7px solid gold;
box-shadow:
0 0 25px gold,
0 0 50px rgba(255,255,0,.7);
}

/* TEXT */

#currentBet{
margin-top:18px;
font-size:42px;
color:white;
text-shadow:0 0 10px white;
}

#result{
margin-top:10px;
font-size:40px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div class="game">

<div class="top">

<div id="balance">$5000</div>

<div id="timer">10</div>

</div>

<div class="wheelWrap">

<div class="outerGlow"></div>

<div class="pointer"></div>

<div class="ball"></div>

<div id="wheel"></div>

<div class="centerCircle"></div>

</div>

<div class="bets">

<div class="bet blackbox" onclick="placeBet('black')">
<span id="blackAmount">0</span>
BLACK
</div>

<div class="bet redbox" onclick="placeBet('red')">
<span id="redAmount">0</span>
RED
</div>

<div class="bet darkbox" onclick="placeBet('even')">
<span id="evenAmount">0</span>
EVEN
</div>

<div class="bet greenbox" onclick="placeBet('zero')">
<span id="zeroAmount">0</span>
0
</div>

<div class="bet darkbox" onclick="placeBet('high')">
<span id="highAmount">0</span>
19-36
</div>

<div class="bet darkbox" onclick="placeBet('odd')">
<span id="oddAmount">0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(1000,this)">1K</div>

<div class="chip" onclick="selectChip(100,this)">100</div>

<div class="chip active" onclick="selectChip(50,this)">50</div>

<div class="chip" onclick="selectChip(10,this)">10</div>

</div>

<div id="currentBet">الرهان: $0</div>

<div id="result"></div>

</div>

<script>

let balance=5000;

let selectedChip=50;

let timer=10;

let spinning=false;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

const numbers=[
0,32,15,19,4,21,2,25,17,34,
6,27,13,36,11,30,8,23,10,
5,24,16,33,1,20,14,31,9,
22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

/* CREATE NUMBERS */

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-175px) rotate(90deg)";

wheel.appendChild(div);

}

/* BALANCE */

function updateBalance(){

document.getElementById("balance").innerHTML="$"+balance;

}

/* CHIP */

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

el.classList.add("active");

}

/* TOTAL */

function totalBet(){

return Object.values(bets).reduce((a,b)=>a+b,0);

}

/* BET */

function placeBet(type){

if(spinning)return;

if(balance<selectedChip)return;

balance-=selectedChip;

updateBalance();

bets[type]+=selectedChip;

document.getElementById(type+"Amount").innerHTML=bets[type];

document.getElementById("currentBet").innerHTML=
"الرهان: $"+totalBet();

}

/* START ROUND */

function startRound(){

if(spinning)return;

spinning=true;

let result=numbers[
Math.floor(Math.random()*numbers.length)
];

let index=numbers.indexOf(result);

let degree=(360/numbers.length)*index;

let finalRotate=3600-degree;

wheel.style.transform=
"rotate("+finalRotate+"deg)";

setTimeout(()=>{

finishRound(result);

},5000);

}

/* FINISH */

function finishRound(number){

let win=0;

if(redNums.includes(number))
win+=bets.red*2;

if(number!==0 && !redNums.includes(number))
win+=bets.black*2;

if(number%2===0 && number!==0)
win+=bets.even*2;

if(number%2===1)
win+=bets.odd*2;

if(number>=19)
win+=bets.high*2;

if(number===0)
win+=bets.zero*14;

balance+=win;

updateBalance();

document.getElementById("result").innerHTML=
(win>0 ? "WIN +$"+win : "LOSE")+" | "+number;

for(let key in bets){

bets[key]=0;

document.getElementById(key+"Amount").innerHTML="0";

}

document.getElementById("currentBet").innerHTML=
"الرهان: $0";

spinning=false;

timer=10;

}

/* TIMER */

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

document.getElementById("timer").innerHTML="SPIN";

startRound();

}

},1000);

updateBalance();

</script>

</body>
</html>
