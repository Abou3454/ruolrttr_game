<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
radial-gradient(circle,#006400 0%,#002200 40%,#000 100%);
overflow:hidden;
height:100vh;
color:white;
}

.game{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
}

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#balance{
font-size:32px;
font-weight:bold;
color:gold;
text-shadow:
0 0 10px gold,
0 0 20px gold,
0 0 40px gold;
}

#timer{
font-size:90px;
font-weight:bold;
color:#00ff55;
text-shadow:
0 0 10px #00ff55,
0 0 30px #00ff55,
0 0 60px #00ff55;
}

.wheelWrap{
position:relative;
width:520px;
height:520px;
margin-top:10px;
}

#wheel{

width:100%;
height:100%;
border-radius:50%;

border:18px solid gold;

box-shadow:
0 0 20px gold,
0 0 60px gold,
0 0 120px gold;

position:relative;
overflow:hidden;

transition:transform 6s cubic-bezier(.17,.67,.2,1);

background:
conic-gradient(
green 0deg 9.7deg,
red 9.7deg 19.4deg,
black 19.4deg 29.1deg,
red 29.1deg 38.8deg,
black 38.8deg 48.5deg,
red 48.5deg 58.2deg,
black 58.2deg 67.9deg,
red 67.9deg 77.6deg,
black 77.6deg 87.3deg,
red 87.3deg 97deg,
black 97deg 106.7deg,
red 106.7deg 116.4deg,
black 116.4deg 126.1deg,
red 126.1deg 135.8deg,
black 135.8deg 145.5deg,
red 145.5deg 155.2deg,
black 155.2deg 164.9deg,
red 164.9deg 174.6deg,
black 174.6deg 184.3deg,
red 184.3deg 194deg,
black 194deg 203.7deg,
red 203.7deg 213.4deg,
black 213.4deg 223.1deg,
red 223.1deg 232.8deg,
black 232.8deg 242.5deg,
red 242.5deg 252.2deg,
black 252.2deg 261.9deg,
red 261.9deg 271.6deg,
black 271.6deg 281.3deg,
red 281.3deg 291deg,
black 291deg 300.7deg,
red 300.7deg 310.4deg,
black 310.4deg 320.1deg,
red 320.1deg 329.8deg,
black 329.8deg 339.5deg,
red 339.5deg 349.2deg,
black 349.2deg 360deg
);

}

.center{

position:absolute;
width:120px;
height:120px;
border-radius:50%;
background:
radial-gradient(circle,#aa0000,#550000);

border:10px solid gold;

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:20;

box-shadow:
0 0 20px gold,
0 0 50px gold;

}

.pointer{

position:absolute;

top:10px;
left:50%;

transform:translateX(-50%);

width:0;
height:0;

border-left:35px solid transparent;
border-right:35px solid transparent;
border-top:70px solid yellow;

z-index:50;

filter:drop-shadow(0 0 20px yellow);

}

.number{

position:absolute;

left:50%;
top:50%;

font-size:18px;
font-weight:bold;
color:white;

transform-origin:0 -210px;

text-shadow:
0 0 5px black,
0 0 10px black;

}

.ball{

position:absolute;

width:28px;
height:28px;

background:white;

border-radius:50%;

top:50%;
left:50%;

margin-left:-14px;
margin-top:-240px;

z-index:100;

box-shadow:
0 0 20px white,
0 0 40px white,
0 0 70px white;

animation:ballMove 2s linear infinite;

}

@keyframes ballMove{

0%{
transform:rotate(0deg) translateY(-240px);
}

100%{
transform:rotate(360deg) translateY(-240px);
}

}

.bets{

width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

margin-top:20px;

}

.bet{

height:120px;

border-radius:22px;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
font-weight:bold;

position:relative;

border:4px solid rgba(255,255,255,.2);

box-shadow:
inset 0 0 15px rgba(255,255,255,.2),
0 0 20px rgba(255,255,255,.2);

}

.bet span{

position:absolute;

top:8px;
left:8px;

background:black;

padding:4px 14px;

border-radius:15px;

color:yellow;

font-size:20px;

}

.blackbox{
background:#000;
}

.redbox{
background:#ff004c;
}

.greenbox{
background:#00dd44;
}

.darkbox{
background:#99003a;
}

.chips{

display:flex;
gap:16px;

margin-top:18px;

}

.chip{

width:95px;
height:95px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
font-weight:bold;
color:black;

border:7px solid #ddd;

box-shadow:
0 0 15px rgba(255,255,255,.4);

}

.chip.active{

border:7px solid gold;

box-shadow:
0 0 20px gold,
0 0 50px gold;

}

#currentBet{

margin-top:18px;

font-size:42px;

color:white;

text-shadow:
0 0 10px white;

}

#result{

margin-top:10px;

font-size:50px;
font-weight:bold;

color:gold;

text-shadow:
0 0 10px gold,
0 0 40px gold;

}

</style>
</head>

<body>

<div class="game">

<div class="top">

<div id="balance">$5000</div>

<div id="timer">10</div>

</div>

<div class="wheelWrap">

<div class="pointer"></div>

<div class="ball"></div>

<div id="wheel"></div>

<div class="center"></div>

</div>

<div class="bets">

<div class="bet blackbox">
<span>0</span>
BLACK
</div>

<div class="bet redbox">
<span>0</span>
RED
</div>

<div class="bet darkbox">
<span>0</span>
EVEN
</div>

<div class="bet greenbox">
<span>0</span>
0
</div>

<div class="bet darkbox">
<span>0</span>
19-36
</div>

<div class="bet darkbox">
<span>0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip">1K</div>

<div class="chip">100</div>

<div class="chip active">50</div>

<div class="chip">10</div>

</div>

<div id="currentBet">
0$: الرهان
</div>

<div id="result"></div>

</div>

<script>

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,27,13,36,
11,30,8,23,10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-210px) rotate(90deg)";

wheel.appendChild(div);

}

let timer=10;

let spinning=false;

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

spin();

}

},1000);

function spin(){

spinning=true;

document.getElementById("timer").innerHTML="SPIN";

let rotate=7200+Math.random()*360;

wheel.style.transform="rotate("+rotate+"deg)";

setTimeout(()=>{

timer=10;

spinning=false;

},6000);

}

</script>

</body>
</html>
