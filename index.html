<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino Roulette</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
radial-gradient(circle,#0d5f00,#001800);
height:100vh;
overflow:hidden;
color:white;
}

.game{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
}

/* TOP */

.top{
width:95%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

#balance{
font-size:42px;
font-weight:bold;
color:gold;
text-shadow:
0 0 10px gold,
0 0 30px gold;
}

#timer{
font-size:90px;
font-weight:bold;
color:#00ff55;
text-shadow:
0 0 15px #00ff55,
0 0 40px #00ff55;
}

/* WHEEL */

.wheelWrap{
position:relative;
width:380px;
height:380px;
display:flex;
justify-content:center;
align-items:center;
}

/* OUTER GOLD */

.outerRing{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:
radial-gradient(circle,
#ffe600,
#c18a00);
box-shadow:
0 0 30px gold,
0 0 70px gold;
}

/* INNER */

#wheel{
position:absolute;
width:330px;
height:330px;
border-radius:50%;
overflow:hidden;
transition:transform 5s cubic-bezier(.17,.67,.2,1);

background:
conic-gradient(
green 0deg 9.7deg,
red 9.7deg 19.4deg,
black 19.4deg 29.1deg,
red 29.1deg 38.8deg,
black 38.8deg 48.5deg,
red 48.5deg 58.2deg,
black 58.2deg 67.9deg,
red 67.9deg 77.6deg,
black 77.6deg 87.3deg,
red 87.3deg 97deg,
black 97deg 106.7deg,
red 106.7deg 116.4deg,
black 116.4deg 126.1deg,
red 126.1deg 135.8deg,
black 135.8deg 145.5deg,
red 145.5deg 155.2deg,
black 155.2deg 164.9deg,
red 164.9deg 174.6deg,
black 174.6deg 184.3deg,
red 184.3deg 194deg,
black 194deg 203.7deg,
red 203.7deg 213.4deg,
black 213.4deg 223.1deg,
red 223.1deg 232.8deg,
black 232.8deg 242.5deg,
red 242.5deg 252.2deg,
black 252.2deg 261.9deg,
red 261.9deg 271.6deg,
black 271.6deg 281.3deg,
red 281.3deg 291deg,
black 291deg 300.7deg,
red 300.7deg 310.4deg,
black 310.4deg 320.1deg,
red 320.1deg 329.8deg,
black 329.8deg 339.5deg,
red 339.5deg 349.2deg,
black 349.2deg 360deg
);

box-shadow:
inset 0 0 30px black,
0 0 20px rgba(0,0,0,.6);
}

/* CENTER */

.center{
position:absolute;
width:110px;
height:110px;
border-radius:50%;
background:
radial-gradient(circle,
#c40000,
#5a0000);

border:10px solid gold;

z-index:20;

box-shadow:
0 0 20px gold,
inset 0 0 30px black;
}

/* POINTER */

.pointer{
position:absolute;
top:10px;
width:0;
height:0;

border-left:35px solid transparent;
border-right:35px solid transparent;
border-bottom:70px solid yellow;

z-index:50;

filter:drop-shadow(0 0 15px yellow);
}

/* BALL */

.ball{
position:absolute;
width:24px;
height:24px;
border-radius:50%;
background:white;

box-shadow:
0 0 20px white,
0 0 50px white;

z-index:40;

animation:ballMove 2s linear infinite;
}

@keyframes ballMove{

0%{
transform:
rotate(0deg)
translateY(-170px);
}

100%{
transform:
rotate(360deg)
translateY(-170px);
}

}

/* NUMBERS */

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 -145px;
font-size:15px;
font-weight:bold;
color:white;
text-shadow:0 0 5px black;
}

/* BETS */

.bets{
width:95%;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.bet{
height:105px;
border-radius:25px;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
font-weight:bold;

position:relative;

border:4px solid rgba(255,255,255,.2);

box-shadow:
0 0 20px rgba(255,255,255,.25),
inset 0 0 20px rgba(255,255,255,.1);
}

.blackbox{
background:black;
}

.redbox{
background:#ff0055;
}

.greenbox{
background:#00dd44;
}

.darkbox{
background:#99003d;
}

.bet span{
position:absolute;
top:8px;
left:8px;

background:black;
color:yellow;

padding:5px 12px;

border-radius:15px;

font-size:22px;
}

/* CHIPS */

.chips{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}

.chip{
width:90px;
height:90px;
border-radius:50%;

background:#eee;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
font-weight:bold;
color:black;

border:6px solid #ccc;
}

.chip.active{
border:6px solid gold;

box-shadow:
0 0 20px gold,
0 0 50px gold;
}

#currentBet{
margin-top:25px;
font-size:48px;
color:white;
}

</style>
</head>

<body>

<div class="game">

<div class="top">

<div id="balance">$5000</div>

<div id="timer">10</div>

</div>

<div class="wheelWrap">

<div class="outerRing"></div>

<div class="pointer"></div>

<div class="ball"></div>

<div id="wheel"></div>

<div class="center"></div>

</div>

<div class="bets">

<div class="bet blackbox">
<span>0</span>
BLACK
</div>

<div class="bet redbox">
<span>0</span>
RED
</div>

<div class="bet darkbox">
<span>0</span>
EVEN
</div>

<div class="bet greenbox">
<span>0</span>
0
</div>

<div class="bet darkbox">
<span>0</span>
19-36
</div>

<div class="bet darkbox">
<span>0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip">1K</div>
<div class="chip">100</div>
<div class="chip active">50</div>
<div class="chip">10</div>

</div>

<div id="currentBet">
الرهان: 0$
</div>

</div>

<script>

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,24,
16,33,1,20,14,31,9,22,18,29,
7,28,12,35,3,26
];

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-145px) rotate(90deg)";

wheel.appendChild(div);

}

</script>

</body>
</html>
