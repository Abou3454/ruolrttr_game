<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Wheel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#120028;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#29105f,#090015);
z-index:-2;
}

.container{
width:100%;
max-width:420px;
text-align:center;
padding-top:10px;
}

.title{
font-size:35px;
font-weight:bold;
color:gold;
margin-bottom:10px;
text-shadow:0 0 20px gold;
}

.wheel-box{
position:relative;
width:340px;
height:340px;
margin:auto;
}

.pointer{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-top:50px solid gold;
z-index:10;
filter:drop-shadow(0 0 10px yellow);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
background:#111;
transition:transform 5s cubic-bezier(.17,.67,.12,.99);
box-shadow:
0 0 40px gold,
0 0 100px rgba(255,215,0,.5);
}

.center{
position:absolute;
width:90px;
height:90px;
background:radial-gradient(circle,#ff0000,#660000);
border:8px solid gold;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
box-shadow:0 0 30px gold;
}

.history{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
}

.item{
width:80px;
height:90px;
background:linear-gradient(#6f008d,#350046);
border:3px solid gold;
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 0 15px rgba(255,215,0,.5);
}

.item span{
font-size:40px;
}

.item b{
margin-top:5px;
font-size:30px;
color:gold;
}

.bet-area{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

.bet{
width:100px;
height:100px;
border-radius:20px;
border:3px solid gold;
background:linear-gradient(#8b008b,#45004f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:35px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,215,0,.4);
}

.bet p{
font-size:18px;
margin-top:5px;
color:#fff;
}

.chips{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

.chip{
width:70px;
height:70px;
border-radius:50%;
background:white;
border:6px solid #ccc;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:22px;
color:black;
box-shadow:0 0 15px white;
}

button{
margin-top:25px;
width:220px;
height:60px;
border:none;
border-radius:18px;
background:linear-gradient(#555,#222);
color:white;
font-size:28px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

.result{
margin-top:15px;
font-size:30px;
color:gold;
text-shadow:0 0 15px gold;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="title">LUCKY WHEEL</div>

<div class="wheel-box">

<div class="pointer"></div>

<canvas id="wheel" width="340" height="340"></canvas>

<div class="center" id="timer">5</div>

</div>

<div class="history">
<div class="item"><span>🍉</span><b>x2</b></div>
<div class="item"><span>7️⃣</span><b>x8</b></div>
<div class="item"><span>🍎</span><b>x2</b></div>
</div>

<div class="bet-area">

<div class="bet">
🍉
<p>x2</p>
</div>

<div class="bet">
7️⃣
<p>x8</p>
</div>

<div class="bet">
🍎
<p>x2</p>
</div>

</div>

<div class="chips">

<div class="chip">100</div>
<div class="chip">1K</div>
<div class="chip">10K</div>

</div>

<button onclick="spin()">SPIN</button>

<div class="result" id="result">جاهز للدوران</div>

</div>

<script>

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const sections=[
"🍉","🍎","🍉","7️⃣",
"🍎","🍉","🍎","🍉"
];

const colors=[
"#0080ff",
"#0066cc",
"#0080ff",
"#ff00aa",
"#0066cc",
"#0080ff",
"#0066cc",
"#0080ff"
];

const arc=Math.PI*2/sections.length;

function drawWheel(){

for(let i=0;i<sections.length;i++){

ctx.beginPath();

ctx.fillStyle=colors[i];

ctx.moveTo(170,170);

ctx.arc(
170,
170,
160,
i*arc,
(i+1)*arc
);

ctx.fill();

ctx.lineWidth=4;
ctx.strokeStyle="gold";
ctx.stroke();

ctx.save();

ctx.translate(170,170);

ctx.rotate(i*arc+arc/2);

ctx.textAlign="center";

ctx.font="40px Arial";

ctx.fillText(sections[i],110,15);

ctx.restore();

}

}

drawWheel();

let deg=0;

function spin(){

const wheel=document.getElementById("wheel");

const random=Math.floor(Math.random()*360);

deg+=3600+random;

wheel.style.transform=`rotate(${deg}deg)`;

const timer=document.getElementById("timer");

let count=5;

timer.innerHTML=count;

const t=setInterval(()=>{

count--;

timer.innerHTML=count;

if(count<=0){

clearInterval(t);

finish();

}

},1000);

}

function finish(){

const result=sections[
Math.floor(Math.random()*sections.length)
];

document.getElementById("result").innerHTML=
"النتيجة : "+result;

}

</script>

</body>
</html>
