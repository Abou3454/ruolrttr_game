<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الروليت</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:radial-gradient(#3d0057,#000);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
color:white;
}

.balance{
font-size:70px;
font-weight:bold;
color:gold;
margin-top:20px;
text-shadow:0 0 25px gold;
}

.pointer{
width:0;
height:0;
border-left:28px solid transparent;
border-right:28px solid transparent;
border-top:70px solid yellow;
margin-top:-5px;
z-index:10;
filter:drop-shadow(0 0 15px yellow);
}

.wheel-container{
position:relative;
width:85vw;
height:85vw;
max-width:380px;
max-height:380px;
margin-top:-10px;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
position:relative;
overflow:hidden;
background:#2d8cf0;
box-shadow:
0 0 40px gold,
0 0 80px #ff00ff;
transition:transform 5s cubic-bezier(.17,.67,.25,1);
}

.slice{
position:absolute;
width:50%;
height:50%;
left:50%;
top:50%;
transform-origin:0% 0%;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
color:white;
}

.slice span{
transform:rotate(22deg);
}

.slice:nth-child(1){transform:rotate(0deg) skewY(-45deg);}
.slice:nth-child(2){transform:rotate(45deg) skewY(-45deg);}
.slice:nth-child(3){transform:rotate(90deg) skewY(-45deg);}
.slice:nth-child(4){transform:rotate(135deg) skewY(-45deg);}
.slice:nth-child(5){transform:rotate(180deg) skewY(-45deg);}
.slice:nth-child(6){transform:rotate(225deg) skewY(-45deg);}
.slice:nth-child(7){transform:rotate(270deg) skewY(-45deg);}
.slice:nth-child(8){transform:rotate(315deg) skewY(-45deg);}

.center{
position:absolute;
width:120px;
height:120px;
background:radial-gradient(red,#990000);
border:8px solid gold;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
font-weight:bold;
color:white;
box-shadow:0 0 30px yellow;
z-index:5;
}

.bet-area{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
width:100%;
margin-top:20px;
padding:0 10px;
}

.card{
background:linear-gradient(#ff00ff,#7b009e);
border:3px solid gold;
border-radius:18px;
width:30%;
height:150px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:
0 0 20px #ff00ff,
0 0 40px #ff00ff;
}

.card .emoji{
font-size:55px;
margin-bottom:5px;
}

.card .x{
font-size:32px;
font-weight:bold;
color:gold;
text-shadow:0 0 12px gold;
}

.card .bet{
font-size:22px;
margin-top:5px;
}

.chips{
display:flex;
gap:12px;
margin-top:25px;
}

.chip{
width:70px;
height:70px;
border-radius:50%;
background:white;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
border:5px solid #ddd;
box-shadow:0 0 20px white;
cursor:pointer;
}

.chip.active{
border:6px solid gold;
box-shadow:0 0 25px gold;
}

.result{
margin-top:18px;
font-size:36px;
font-weight:bold;
color:gold;
text-shadow:0 0 15px gold;
}

@media(max-width:430px){

.balance{
font-size:58px;
}

.pointer{
border-left:24px solid transparent;
border-right:24px solid transparent;
border-top:60px solid yellow;
}

.center{
width:100px;
height:100px;
font-size:55px;
}

.card{
height:130px;
}

.card .emoji{
font-size:42px;
}

.card .x{
font-size:26px;
}

.card .bet{
font-size:18px;
}

.chip{
width:60px;
height:60px;
font-size:22px;
}

}

</style>
</head>

<body>

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-container">

<div id="wheel">

<div class="slice"><span>🍉</span></div>
<div class="slice"><span>🍎</span></div>
<div class="slice"><span>7️⃣</span></div>
<div class="slice"><span>🍎</span></div>
<div class="slice"><span>🍉</span></div>
<div class="slice"><span>🍎</span></div>
<div class="slice"><span>🍉</span></div>
<div class="slice"><span>🍎</span></div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="bet-area">

<div class="card" onclick="bet('melon')">
<div class="emoji">🍉</div>
<div class="x">x2</div>
<div class="bet" id="melonBet">0</div>
</div>

<div class="card" onclick="bet('seven')">
<div class="emoji">7️⃣</div>
<div class="x">x8</div>
<div class="bet" id="sevenBet">0</div>
</div>

<div class="card" onclick="bet('apple')">
<div class="emoji">🍎</div>
<div class="x">x2</div>
<div class="bet" id="appleBet">0</div>
</div>

</div>

<div class="chips">

<div class="chip active" onclick="selectChip(100,this)">100</div>
<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip" onclick="selectChip(10000,this)">10K</div>

</div>

<div class="result" id="result">النتيجة : ؟</div>

<script>

let balance = 5000;
let selectedChip = 100;

let bets = {
melon:0,
apple:0,
seven:0
};

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll('.chip').forEach(c=>{
c.classList.remove('active');
});

el.classList.add('active');

}

function bet(type){

if(balance < selectedChip) return;

balance -= selectedChip;

bets[type] += selectedChip;

document.getElementById("balance").innerText="$"+balance;

document.getElementById(type+"Bet").innerText=bets[type];

}

let timer = 5;

setInterval(()=>{

timer--;

document.getElementById("timer").innerText=timer;

if(timer<=0){

spinWheel();

timer=5;

}

},1000);

function spinWheel(){

let wheel = document.getElementById("wheel");

let random = Math.floor(Math.random()*360)+1440;

wheel.style.transform="rotate("+random+"deg)";

let final = random % 360;

let result="apple";

if(final>=0 && final<90){
result="melon";
}
else if(final>=90 && final<180){
result="apple";
}
else if(final>=180 && final<270){
result="seven";
}
else{
result="apple";
}

setTimeout(()=>{

let win=0;

if(result=="melon"){
win=bets.melon*2;
document.getElementById("result").innerText="النتيجة : 🍉";
}

if(result=="apple"){
win=bets.apple*2;
document.getElementById("result").innerText="النتيجة : 🍎";
}

if(result=="seven"){
win=bets.seven*8;
document.getElementById("result").innerText="النتيجة : 7️⃣";
}

balance += win;

document.getElementById("balance").innerText="$"+balance;

bets.melon=0;
bets.apple=0;
bets.seven=0;

document.getElementById("melonBet").innerText="0";
document.getElementById("appleBet").innerText="0";
document.getElementById("sevenBet").innerText="0";

},5200);

}

</script>

</body>
</html>
