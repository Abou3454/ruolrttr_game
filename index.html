<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لعبة الحظ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{

background:
radial-gradient(circle,#3b0066,#12001f);

min-height:100vh;

overflow-x:hidden;

display:flex;

justify-content:center;

align-items:flex-start;

padding:10px;

color:white;

}

.game{

width:100%;

max-width:430px;

text-align:center;

}

.balance{

font-size:70px;

font-weight:bold;

color:gold;

text-shadow:
0 0 20px gold,
0 0 40px yellow;

margin-top:10px;

margin-bottom:10px;

}

.wheel-box{

position:relative;

width:95vw;

height:95vw;

max-width:390px;

max-height:390px;

margin:auto;

}

.pointer{

position:absolute;

top:-5px;

left:50%;

transform:translateX(-50%);

width:0;

height:0;

border-left:28px solid transparent;

border-right:28px solid transparent;

border-top:60px solid yellow;

z-index:100;

filter:drop-shadow(0 0 12px yellow);

}

#wheel{

width:100%;

height:100%;

border-radius:50%;

border:12px solid gold;

background:

conic-gradient(

#1f8fff 0deg 45deg,

#1f8fff 45deg 90deg,

#1f8fff 90deg 135deg,

#ff00c8 135deg 180deg,

#1f8fff 180deg 225deg,

#1f8fff 225deg 270deg,

#1f8fff 270deg 315deg,

#1f8fff 315deg 360deg

);

box-shadow:

0 0 25px gold,

0 0 60px yellow,

0 0 100px #ff00ff;

position:relative;

overflow:hidden;

transition:
transform 5s cubic-bezier(.17,.67,.12,.99);

}

.slice{

position:absolute;

left:50%;

top:50%;

transform-origin:0 0;

font-size:42px;

}

.slice:nth-child(1){
transform:rotate(0deg) translate(125px);
}

.slice:nth-child(2){
transform:rotate(45deg) translate(125px);
}

.slice:nth-child(3){
transform:rotate(90deg) translate(125px);
}

.slice:nth-child(4){
transform:rotate(135deg) translate(125px);
}

.slice:nth-child(5){
transform:rotate(180deg) translate(125px);
}

.slice:nth-child(6){
transform:rotate(225deg) translate(125px);
}

.slice:nth-child(7){
transform:rotate(270deg) translate(125px);
}

.slice:nth-child(8){
transform:rotate(315deg) translate(125px);
}

.center{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:120px;

height:120px;

border-radius:50%;

background:
radial-gradient(circle,red,darkred);

border:8px solid gold;

display:flex;

justify-content:center;

align-items:center;

font-size:65px;

font-weight:bold;

box-shadow:
0 0 20px yellow,
0 0 40px orange;

z-index:10;

}

.cards{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-top:25px;

}

.card{

background:
linear-gradient(#ea00ff,#7b009e);

border:4px solid gold;

border-radius:25px;

padding:20px 10px;

box-shadow:
0 0 20px #ff00ff,
0 0 40px #ff00ff;

cursor:pointer;

transition:.2s;

}

.card:active{

transform:scale(.95);

}

.card .icon{

font-size:60px;

}

.multi{

font-size:55px;

font-weight:bold;

color:gold;

text-shadow:0 0 10px gold;

}

.bet{

font-size:45px;

margin-top:5px;

}

.apple{

grid-column:1/3;

width:50%;

margin:auto;

}

.chips{

display:flex;

justify-content:center;

gap:15px;

margin-top:25px;

flex-wrap:wrap;

}

.chip{

width:80px;

height:80px;

border-radius:50%;

background:white;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

font-weight:bold;

color:black;

box-shadow:
0 0 15px white;

cursor:pointer;

}

.active{

border:6px solid gold;

box-shadow:
0 0 25px yellow;

}

.result{

margin-top:25px;

font-size:40px;

color:gold;

text-shadow:
0 0 10px gold;

}

.win{

animation:flash .5s infinite;

}

@keyframes flash{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

@media(max-width:480px){

.balance{

font-size:55px;

}

.center{

width:95px;

height:95px;

font-size:45px;

}

.slice{

font-size:32px;

}

.slice:nth-child(1),
.slice:nth-child(2),
.slice:nth-child(3),
.slice:nth-child(4),
.slice:nth-child(5),
.slice:nth-child(6),
.slice:nth-child(7),
.slice:nth-child(8){

transform-origin:0 0;

}

.card .icon{

font-size:45px;

}

.multi{

font-size:40px;

}

.bet{

font-size:35px;

}

.chip{

width:65px;

height:65px;

font-size:24px;

}

.result{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="game">

<div class="balance" id="balance">$5000</div>

<div class="wheel-box">

<div class="pointer"></div>

<div id="wheel">

<div class="slice">🍉</div>

<div class="slice">🍎</div>

<div class="slice">🍉</div>

<div class="slice">7️⃣</div>

<div class="slice">🍎</div>

<div class="slice">🍉</div>

<div class="slice">🍎</div>

<div class="slice">🍎</div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="cards">

<div class="card" onclick="bet('watermelon')">

<div class="icon">🍉</div>

<div class="multi">x2</div>

<div class="bet" id="watermelonBet">0</div>

</div>

<div class="card" onclick="bet('seven')">

<div class="icon">7️⃣</div>

<div class="multi">x8</div>

<div class="bet" id="sevenBet">0</div>

</div>

<div class="card apple" onclick="bet('apple')">

<div class="icon">🍎</div>

<div class="multi">x2</div>

<div class="bet" id="appleBet">0</div>

</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(100,this)">
100
</div>

<div class="chip" onclick="selectChip(1000,this)">
1K
</div>

<div class="chip active" onclick="selectChip(10000,this)">
10K
</div>

</div>

<div class="result" id="result">

النتيجة :

</div>

</div>

<script>

let selectedChip=10000;

let balance=5000;

let countdown=5;

let bets={

watermelon:0,

apple:0,

seven:0

};

function updateBalance(){

document.getElementById("balance").innerHTML=
"$"+balance;

}

updateBalance();

function selectChip(amount,el){

selectedChip=amount;

document.querySelectorAll(".chip").forEach(c=>{

c.classList.remove("active");

});

el.classList.add("active");

}

function bet(type){

if(balance<selectedChip)return;

balance-=selectedChip;

bets[type]+=selectedChip;

document.getElementById(type+"Bet").innerHTML=
bets[type];

updateBalance();

}

function startGame(){

const timer=document.getElementById("timer");

setInterval(()=>{

countdown--;

timer.innerHTML=countdown;

if(countdown<=0){

spinWheel();

countdown=5;

}

},1000);

}

function spinWheel(){

const wheel=document.getElementById("wheel");

const deg=
3600+Math.floor(Math.random()*360);

wheel.style.transform=
"rotate("+deg+"deg)";

setTimeout(()=>{

finishGame();

},5000);

}

function finishGame(){

const results=["🍉","🍎","7️⃣"];

const result=
results[Math.floor(Math.random()*results.length)];

const resultBox=
document.getElementById("result");

resultBox.innerHTML=
"النتيجة : "+result;

resultBox.classList.add("win");

setTimeout(()=>{

resultBox.classList.remove("win");

},2000);

if(result=="🍉"){

balance+=bets.watermelon*2;

}

if(result=="🍎"){

balance+=bets.apple*2;

}

if(result=="7️⃣"){

balance+=bets.seven*8;

}

bets.watermelon=0;

bets.apple=0;

bets.seven=0;

document.getElementById("watermelonBet").innerHTML=0;

document.getElementById("appleBet").innerHTML=0;

document.getElementById("sevenBet").innerHTML=0;

updateBalance();

}

startGame();

</script>

</body>

</html>
