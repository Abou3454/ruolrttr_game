<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Roulette</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#2a0000;
overflow:hidden;
color:white;
height:100vh;
}

#game{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:10px;
}

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
}

#balance{
font-size:26px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

#timer{
font-size:60px;
font-weight:bold;
color:#00ff55;
text-shadow:0 0 20px #00ff55;
}

.history{
display:flex;
gap:6px;
margin-top:5px;
margin-bottom:8px;
}

.history div{
width:32px;
height:32px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:14px;
}

.red{background:red;}
.black{background:black;}
.green{background:green;}

.wheel-wrap{
position:relative;
width:300px;
height:300px;
margin-top:5px;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:45px solid yellow;
z-index:10;
filter:drop-shadow(0 0 15px yellow);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
box-shadow:0 0 40px gold;
transition:transform 5s cubic-bezier(.17,.67,.2,1);
background:
conic-gradient(
green 0deg 9.7deg,
red 9.7deg 19.4deg,
black 19.4deg 29.1deg,
red 29.1deg 38.8deg,
black 38.8deg 48.5deg,
red 48.5deg 58.2deg,
black 58.2deg 67.9deg,
red 67.9deg 77.6deg,
black 77.6deg 87.3deg,
red 87.3deg 97deg,
black 97deg 106.7deg,
red 106.7deg 116.4deg,
black 116.4deg 126.1deg,
red 126.1deg 135.8deg,
black 135.8deg 145.5deg,
red 145.5deg 155.2deg,
black 155.2deg 164.9deg,
red 164.9deg 174.6deg,
black 174.6deg 184.3deg,
red 184.3deg 194deg,
black 194deg 203.7deg,
red 203.7deg 213.4deg,
black 213.4deg 223.1deg,
red 223.1deg 232.8deg,
black 232.8deg 242.5deg,
red 242.5deg 252.2deg,
black 252.2deg 261.9deg,
red 261.9deg 271.6deg,
black 271.6deg 281.3deg,
red 281.3deg 291deg,
black 291deg 300.7deg,
red 300.7deg 310.4deg,
black 310.4deg 320.1deg,
red 320.1deg 329.8deg,
black 329.8deg 339.5deg,
red 339.5deg 349.2deg,
black 349.2deg 360deg
);
}

.ball{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:50%;
top:50%;
left:50%;
margin-left:-9px;
margin-top:-130px;
box-shadow:0 0 15px white;
animation:ballmove 1s linear infinite;
}

@keyframes ballmove{
0%{transform:rotate(0deg) translateY(-130px);}
100%{transform:rotate(360deg) translateY(-130px);}
}

.bets{
width:100%;
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.bet{
height:90px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
position:relative;
border:3px solid rgba(255,255,255,0.2);
}

.bet span{
position:absolute;
top:5px;
left:5px;
background:black;
padding:2px 8px;
border-radius:10px;
font-size:20px;
color:yellow;
}

.bet.active{
box-shadow:0 0 25px white;
transform:scale(1.03);
}

.redbox{background:#ff003c;}
.blackbox{background:#111;}
.greenbox{background:#00cc44;}
.darkbox{background:#8b1030;}

.chips{
display:flex;
justify-content:center;
gap:12px;
margin-top:15px;
}

.chip{
width:78px;
height:78px;
border-radius:50%;
background:white;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
border:5px solid #ddd;
}

.chip.active{
border:5px solid gold;
box-shadow:0 0 25px gold;
}

#currentBet{
margin-top:10px;
font-size:24px;
color:white;
}

#result{
margin-top:10px;
font-size:34px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div id="game">

<div class="top">
<div id="balance">$5000</div>
<div id="timer">10</div>
</div>

<div class="history" id="history"></div>

<div class="wheel-wrap">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div id="wheel"></div>

</div>

<div class="bets">

<div class="bet blackbox" onclick="placeBet('black',this)">
<span id="blackAmount">0</span>
BLACK
</div>

<div class="bet redbox" onclick="placeBet('red',this)">
<span id="redAmount">0</span>
RED
</div>

<div class="bet darkbox" onclick="placeBet('even',this)">
<span id="evenAmount">0</span>
EVEN
</div>

<div class="bet greenbox" onclick="placeBet('zero',this)">
<span id="zeroAmount">0</span>
0
</div>

<div class="bet darkbox" onclick="placeBet('high',this)">
<span id="highAmount">0</span>
19-36
</div>

<div class="bet darkbox" onclick="placeBet('odd',this)">
<span id="oddAmount">0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip" onclick="selectChip(100,this)">100</div>
<div class="chip active" onclick="selectChip(50,this)">50</div>
<div class="chip" onclick="selectChip(10,this)">10</div>

</div>

<div id="currentBet">الرهان: $0</div>

<div id="result"></div>

</div>

<script>

let balance=5000;

let selectedChip=50;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

let timer=10;

let spinning=false;

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,27,13,36,
11,30,8,23,10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,19,21,23,
25,27,30,32,34,36
];

function updateBalance(){
document.getElementById("balance").innerHTML="$"+balance;
}

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

el.classList.add("active");

}

function placeBet(type,el){

if(spinning)return;

if(balance<selectedChip)return;

balance-=selectedChip;

bets[type]+=selectedChip;

updateBalance();

document.getElementById(type+"Amount").innerHTML=bets[type];

document.getElementById("currentBet").innerHTML=
"الرهان: $"+totalBet();

document.querySelectorAll(".bet").forEach(b=>{
b.classList.remove("active");
});

el.classList.add("active");

}

function totalBet(){

return Object.values(bets).reduce((a,b)=>a+b,0);

}

function startRound(){

if(spinning)return;

spinning=true;

document.querySelectorAll(".bet").forEach(b=>{
b.classList.remove("active");
});

let result=numbers[Math.floor(Math.random()*numbers.length)];

let index=numbers.indexOf(result);

let degree=(360/numbers.length)*index;

let finalRotate=3600-degree;

document.getElementById("wheel").style.transform=
"rotate("+finalRotate+"deg)";

document.getElementById("ball").style.animation=
"ballmove .4s linear infinite";

setTimeout(()=>{

document.getElementById("ball").style.animation="none";

finishRound(result);

},5000);

}

function finishRound(number){

let win=0;

if(redNums.includes(number))
win+=bets.red*2;

if(number!==0 && !redNums.includes(number))
win+=bets.black*2;

if(number%2===0 && number!==0)
win+=bets.even*2;

if(number%2===1)
win+=bets.odd*2;

if(number>=19)
win+=bets.high*2;

if(number===0)
win+=bets.zero*14;

balance+=win;

updateBalance();

let color="black";

if(number===0)color="green";
else if(redNums.includes(number))color="red";

document.getElementById("result").innerHTML=
(win>0 ? "WIN +$"+win : "LOSE")+" | "+number;

let div=document.createElement("div");

div.className=color;

div.innerHTML=number;

document.getElementById("history").prepend(div);

if(document.getElementById("history").children.length>8){
document.getElementById("history").lastChild.remove();
}

for(let key in bets){
bets[key]=0;
document.getElementById(key+"Amount").innerHTML="0";
}

document.getElementById("currentBet").innerHTML=
"الرهان: $0";

spinning=false;

timer=10;

}

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

document.getElementById("timer").innerHTML="SPIN";

startRound();

}

},1000);

updateBalance();

</script>

</body>
</html>
