<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كازينو روليت</title>

<style>

body{
margin:0;
background:#050505;
font-family:tahoma;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
font-size:42px;
color:white;
text-shadow:0 0 20px red;
}

.balance{
font-size:30px;
margin:15px;
color:gold;
}

.wheel-container{
position:relative;
margin:auto;
width:320px;
height:320px;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
border:10px solid gold;
transition:transform 5s cubic-bezier(.17,.67,.2,1);
background:
conic-gradient(
red 0deg 20deg,
black 20deg 40deg,
red 40deg 60deg,
black 60deg 80deg,
red 80deg 100deg,
black 100deg 120deg,
red 120deg 140deg,
black 140deg 160deg,
red 160deg 180deg,
black 180deg 200deg,
red 200deg 220deg,
black 220deg 240deg,
red 240deg 260deg,
black 260deg 280deg,
red 280deg 300deg,
black 300deg 320deg,
red 320deg 340deg,
black 340deg 360deg
);
box-shadow:
0 0 20px gold,
0 0 60px orange;
}

.pointer{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid yellow;
}

.controls{
margin-top:25px;
}

input{
padding:12px;
font-size:22px;
border:none;
border-radius:10px;
margin:10px;
width:120px;
text-align:center;
}

button{
padding:15px 45px;
font-size:28px;
background:red;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 20px red;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:25px;
font-size:36px;
color:yellow;
text-shadow:0 0 20px yellow;
}

.numbers{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
max-width:420px;
margin:30px auto;
padding:10px;
}

.num{
padding:12px;
border-radius:8px;
font-weight:bold;
font-size:20px;
}

.red{
background:red;
}

.black{
background:black;
border:1px solid #555;
}

.selected{
outline:4px solid gold;
}

</style>
</head>

<body>

<h1>🎰 كازينو الروليت</h1>

<div class="balance">
الرصيد: $<span id="balance">1000</span>
</div>

<div class="wheel-container">

<div class="pointer"></div>

<div id="wheel"></div>

</div>

<div class="controls">

<input type="number" id="betAmount" placeholder="مبلغ الرهان">

<input type="number" id="betNumber" placeholder="الرقم">

<br><br>

<button onclick="spin()">ابدأ الرهان</button>

</div>

<div class="result" id="result"></div>

<div class="numbers" id="numbers"></div>

<script>

const wheel=document.getElementById("wheel");
const result=document.getElementById("result");
const balanceEl=document.getElementById("balance");
const numbersDiv=document.getElementById("numbers");

let balance=1000;

const rouletteNumbers=[
0,32,15,19,4,21,2,25,17,
34,6,27,13,36,11,30,8,23,
10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

rouletteNumbers.forEach((n,i)=>{

const div=document.createElement("div");

div.className="num "+(i%2==0?"red":"black");

div.innerHTML=n;

numbersDiv.appendChild(div);

});

function spin(){

const bet=
parseInt(document.getElementById("betAmount").value);

const chosen=
parseInt(document.getElementById("betNumber").value);

if(isNaN(bet)||bet<=0){

alert("ضع مبلغ صحيح");

return;

}

if(bet>balance){

alert("رصيدك غير كافي");

return;

}

if(isNaN(chosen)||chosen<0||chosen>36){

alert("اختر رقم من 0 الى 36");

return;

}

balance-=bet;

balanceEl.innerHTML=balance;

const randomIndex=
Math.floor(Math.random()*rouletteNumbers.length);

const winning=
rouletteNumbers[randomIndex];

const deg=
3600+(randomIndex*9.73);

wheel.style.transform=
`rotate(-${deg}deg)`;

setTimeout(()=>{

if(chosen===winning){

const win=bet*35;

balance+=win;

result.innerHTML=
"🎉 ربحت $" + win + " الرقم " + winning;

}else{

result.innerHTML=
"❌ خسرت - الرقم " + winning;

}

balanceEl.innerHTML=balance;

},5000);

}

</script>

</body>
</html>
