<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لعبة الحظ</title>

<style>
body{
    margin:0;
    padding:0;
    background:radial-gradient(circle,#3d0066,#12001f,#000);
    font-family:Arial;
    overflow-x:hidden;
    text-align:center;
    color:white;
}

.balance{
    font-size:70px;
    color:gold;
    font-weight:bold;
    margin-top:20px;
    text-shadow:0 0 30px gold;
}

.pointer{
    width:0;
    height:0;
    margin:auto;
    border-left:35px solid transparent;
    border-right:35px solid transparent;
    border-top:80px solid yellow;
    filter:drop-shadow(0 0 20px gold);
    position:relative;
    z-index:10;
}

.wheel-container{
    position:relative;
    width:85vw;
    height:85vw;
    max-width:520px;
    max-height:520px;
    margin:auto;
    margin-top:-10px;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:14px solid gold;
    background:#1488ff;
    box-shadow:
    0 0 50px gold,
    0 0 80px #ff00ff;
}

.center-circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle,#ff4444,#990000);
    border:8px solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    color:white;
    box-shadow:0 0 40px orange;
}

.history{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:25px;
}

.history div{
    width:65px;
    height:65px;
    border-radius:18px;
    background:#8000aa;
    border:3px solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    box-shadow:0 0 20px gold;
}

.bets{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
    flex-wrap:wrap;
}

.bet-box{
    width:170px;
    height:190px;
    background:linear-gradient(#ff00ff,#660099);
    border-radius:25px;
    border:5px solid gold;
    box-shadow:0 0 25px #ff00ff;
    position:relative;
    cursor:pointer;
    user-select:none;
}

.bet-box:hover{
    transform:scale(1.04);
}

.bet-box .emoji{
    font-size:75px;
    margin-top:-15px;
}

.bet-box .multi{
    font-size:70px;
    color:gold;
    font-weight:bold;
    margin-top:-10px;
}

.bet-box .amount{
    font-size:60px;
    margin-top:-10px;
}

.chips{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:35px;
    flex-wrap:wrap;
}

.chip{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    border:8px solid #ddd;
    color:black;
    font-size:28px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 25px white;
    cursor:pointer;
    user-select:none;
}

.active{
    border:8px solid gold;
    box-shadow:0 0 35px gold;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-box{
    width:80%;
    max-width:400px;
    background:linear-gradient(red,#770000);
    border:6px solid gold;
    border-radius:30px;
    padding:30px;
    box-shadow:0 0 40px gold;
}

.popup-box h1{
    color:gold;
    font-size:55px;
    margin:0 0 20px;
}

.popup-emoji{
    font-size:120px;
}

.popup-text{
    font-size:45px;
}

@media(max-width:600px){
    .balance{
        font-size:48px;
    }

    .center-circle{
        width:90px;
        height:90px;
        font-size:48px;
    }

    .bet-box{
        width:120px;
        height:150px;
    }

    .bet-box .emoji{
        font-size:55px;
    }

    .bet-box .multi{
        font-size:45px;
    }

    .bet-box .amount{
        font-size:38px;
    }

    .chip{
        width:80px;
        height:80px;
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-container">
    <canvas id="wheel" width="500" height="500"></canvas>
    <div class="center-circle" id="timer">15</div>
</div>

<div class="history" id="history">
    <div>🍉</div>
    <div>🍎</div>
    <div>7️⃣</div>
</div>

<div class="bets">

    <div class="bet-box" data-emoji="🍉" data-multi="2">
        <div class="emoji">🍉</div>
        <div class="multi">x2</div>
        <div class="amount">0</div>
    </div>

    <div class="bet-box" data-emoji="7️⃣" data-multi="8">
        <div class="emoji">7️⃣</div>
        <div class="multi">x8</div>
        <div class="amount">0</div>
    </div>

    <div class="bet-box" data-emoji="🍎" data-multi="2">
        <div class="emoji">🍎</div>
        <div class="multi">x2</div>
        <div class="amount">0</div>
    </div>

</div>

<div class="chips">
    <div class="chip active" data-value="100">100</div>
    <div class="chip" data-value="1000">1K</div>
    <div class="chip" data-value="10000">10K</div>
</div>

<div id="popup">
    <div class="popup-box">
        <h1>النتيجة</h1>
        <div class="popup-emoji" id="popupEmoji">🍉</div>
        <div class="popup-text" id="popupText">انتهت الجولة</div>
    </div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const balanceEl = document.getElementById("balance");
const timer = document.getElementById("timer");
const popup = document.getElementById("popup");
const popupEmoji = document.getElementById("popupEmoji");
const popupText = document.getElementById("popupText");
const historyEl = document.getElementById("history");

const sections = [
    "🍉","🍎","🍉","7️⃣",
    "🍎","🍉","🍎","🍉"
];

const colors = [
    "#1488ff",
    "#1488ff",
    "#1488ff",
    "#ff00cc",
    "#1488ff",
    "#1488ff",
    "#1488ff",
    "#1488ff"
];

let balance = 5000;
let currentAngle = 0;
let timeLeft = 15;
let selectedChip = 100;
let spinning = false;

let bets = {
    "🍉": 0,
    "🍎": 0,
    "7️⃣": 0
};

function updateBalance(){
    balanceEl.innerText = "$" + balance;
}

function drawWheel(){
    const center = 250;
    const radius = 235;
    const angle = (Math.PI * 2) / sections.length;

    ctx.clearRect(0,0,500,500);

    for(let i = 0; i < sections.length; i++){
        const start = i * angle;
        const end = start + angle;

        ctx.beginPath();
        ctx.moveTo(center,center);
        ctx.arc(center,center,radius,start,end);
        ctx.closePath();

        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.lineWidth = 4;
        ctx.strokeStyle = "gold";
        ctx.stroke();

        ctx.save();
        ctx.translate(center,center);
        ctx.rotate(start + angle / 2);

        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(sections[i], radius - 80, 0);

        ctx.restore();
    }
}

function resetBets(){
    bets = {
        "🍉": 0,
        "🍎": 0,
        "7️⃣": 0
    };

    document.querySelectorAll(".bet-box").forEach(box=>{
        box.querySelector(".amount").innerText = "0";
    });
}

function updateHistory(result){
    const items = Array.from(historyEl.children);

    for(let i = items.length - 1; i > 0; i--){
        items[i].innerText = items[i - 1].innerText;
    }

    items[0].innerText = result;
}

function getResultFromWheel(){
    const sectionAngle = 360 / sections.length;

    /*
        السهم في الأعلى، والكانفاس يبدأ من جهة اليمين.
        لذلك نستخدم زاوية 270 درجة لأنها تمثل أعلى الدائرة.
    */
    const normalizedAngle = ((currentAngle % 360) + 360) % 360;
    const pointerAngle = (270 - normalizedAngle + 360) % 360;

    const index = Math.floor(pointerAngle / sectionAngle);

    return sections[index];
}

function spinWheel(){
    if(spinning) return;

    spinning = true;
    timeLeft = 15;
    timer.innerText = timeLeft;

    const randomDeg = Math.floor(Math.random() * 360) + 1440;

    currentAngle += randomDeg;

    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.25,1)";
    canvas.style.transform = `rotate(${currentAngle}deg)`;

    setTimeout(()=>{
        showResult();
        spinning = false;
    }, 4300);
}

function showResult(){
    const result = getResultFromWheel();
    const betAmount = bets[result];
    const box = document.querySelector(`.bet-box[data-emoji="${result}"]`);
    const multiplier = Number(box.dataset.multi);

    let message = "خسرت";

    if(betAmount > 0){
        const winAmount = betAmount * multiplier;
        balance += winAmount;
        message = "ربحت $" + winAmount;
    }

    updateBalance();
    updateHistory(result);

    popup.style.display = "flex";
    popupEmoji.innerText = result;
    popupText.innerText = message;

    resetBets();

    setTimeout(()=>{
        popup.style.display = "none";
    },3000);
}

document.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
        document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        selectedChip = Number(chip.dataset.value);
    });
});

document.querySelectorAll(".bet-box").forEach(box=>{
    box.addEventListener("click",()=>{
        if(spinning) return;

        if(balance < selectedChip){
            popup.style.display = "flex";
            popupEmoji.innerText = "❌";
            popupText.innerText = "الرصيد غير كافي";

            setTimeout(()=>{
                popup.style.display = "none";
            },1500);

            return;
        }

        const emoji = box.dataset.emoji;

        balance -= selectedChip;
        bets[emoji] += selectedChip;

        updateBalance();
        box.querySelector(".amount").innerText = bets[emoji];
    });
});

setInterval(()=>{
    if(spinning) return;

    timeLeft--;
    timer.innerText = timeLeft;

    if(timeLeft <= 0){
        spinWheel();
    }
},1000);

drawWheel();
updateBalance();
</script>

</body>
</html>
