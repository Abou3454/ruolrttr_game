<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>كازينو الروليت</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
-webkit-tap-highlight-color: transparent;
}

body{
background:#000;
overflow:hidden;
height:100vh;
color:white;
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:10px;
overflow:hidden;
}

.title{
font-size:8vw;
color:white;
text-shadow:0 0 20px red;
font-weight:bold;
margin-top:5px;
}

.balance{
font-size:7vw;
color:gold;
margin-top:5px;
}

.timer{
font-size:8vw;
color:#00ff99;
text-shadow:0 0 20px #00ff99;
}

.wheel-area{
position:relative;
width:78vw;
height:78vw;
max-width:330px;
max-height:330px;
display:flex;
justify-content:center;
align-items:center;
}

.pointer{
position:absolute;
top:-10px;
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid yellow;
z-index:100;
filter:drop-shadow(0 0 10px yellow);
}

.ball{
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:50%;
top:12px;
left:50%;
margin-left:-9px;
z-index:90;

box-shadow:
0 0 10px white,
0 0 20px cyan;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid gold;
overflow:hidden;
position:relative;

box-shadow:
0 0 20px gold,
0 0 50px orange;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

.number{
position:absolute;
left:50%;
top:50%;
font-size:4vw;
font-weight:bold;
color:white;
text-shadow:0 0 6px white;
transform-origin:0 0;
}

.bet-title{
font-size:6vw;
margin-top:5px;
}

.money{
width:100%;
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.money button{
width:18vw;
height:18vw;
max-width:70px;
max-height:70px;
border-radius:50%;
border:none;
font-size:6vw;
font-weight:bold;
background:white;
transition:.2s;
}

.money button.active{
background:gold;
transform:scale(1.08);
}

.types{
width:100%;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:10px;
}

.types button{
padding:14px 5px;
border:none;
border-radius:12px;
font-size:5vw;
font-weight:bold;
color:white;
transition:.2s;
}

.red{
background:#ff0033;
}

.black{
background:#222;
}

.green{
background:#00cc44;
}

.spin{
width:95%;
padding:16px;
margin-top:12px;
border:none;
border-radius:16px;
font-size:7vw;
font-weight:bold;
background:red;
color:white;
box-shadow:0 0 25px red;
}

.result{
height:45px;
font-size:6vw;
font-weight:bold;
margin-top:8px;
text-align:center;
}

.win{
color:#00ff88;
text-shadow:0 0 15px #00ff88;
}

.lose{
color:#ff0033;
text-shadow:0 0 15px red;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
🎰 كازينو الروليت
</div>

<div class="balance" id="balance">
الرصيد: $5000
</div>

<div class="timer" id="timer">
10
</div>

<div class="wheel-area">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div class="wheel" id="wheel"></div>

</div>

<div class="bet-title">
الرهان:
<span id="betAmount">10</span>$
</div>

<div class="money">

<button onclick="setBet(10,this)">
10
</button>

<button onclick="setBet(50,this)">
50
</button>

<button onclick="setBet(100,this)">
100
</button>

<button onclick="setBet(1000,this)">
1K
</button>

</div>

<div class="types">

<button class="red"
onclick="setType('red',this)">
أحمر
</button>

<button class="black"
onclick="setType('black',this)">
أسود
</button>

<button class="green"
onclick="setType('green',this)">
0
</button>

</div>

<button class="spin"
onclick="manualSpin()">
ابدأ الرهان
</button>

<div class="result"
id="result"></div>

</div>

<script>

const wheel =
document.getElementById("wheel");

const ball =
document.getElementById("ball");

const numbers = [
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,
24,16,33,1,20,14,31,9,22,
18,29,7,28,12,35,3,26
];

let balance = 5000;

let bet = 10;

let type = "red";

let spinning = false;

function createWheel(){

const angle =
360 / numbers.length;

let gradient = "";

for(let i=0;i<numbers.length;i++){

let color;

if(i===0){
color="#00aa33";
}else{
color=i%2===0
? "red"
: "black";
}

gradient +=
`${color}
${i*angle}deg
${(i+1)*angle}deg`;

if(i<numbers.length-1){
gradient += ",";
}

const n =
document.createElement("div");

n.className = "number";

n.innerHTML = numbers[i];

n.style.transform =
`rotate(${i*angle}deg)
translateY(-34vw)
rotate(90deg)`;

wheel.appendChild(n);

}

wheel.style.background =
`conic-gradient(${gradient})`;

}

createWheel();

function setBet(amount,el){

bet = amount;

document.getElementById("betAmount")
.innerHTML = amount;

document
.querySelectorAll(".money button")
.forEach(btn=>{
btn.classList.remove("active");
});

el.classList.add("active");

}

function setType(t,el){

type = t;

/* إزالة التحديد القديم */

document
.querySelectorAll(".types button")
.forEach(btn=>{

btn.style.boxShadow="none";

btn.style.transform="scale(1)";

btn.style.border="none";

});

/* تحديد الرهان */

el.style.transform="scale(1.05)";

el.style.border=
"4px solid white";

el.style.boxShadow=
"0 0 20px white";

/* رسالة الرهان */

let msg = "";

if(t==="red"){
msg="🔴 راهنت على الأحمر";
}

if(t==="black"){
msg="⚫ راهنت على الأسود";
}

if(t==="green"){
msg="🟢 راهنت على الصفر";
}

document.getElementById("result")
.className="result";

document.getElementById("result")
.innerHTML=msg;

}

function getColor(num){

if(num===0)
return "green";

const reds = [
1,3,5,7,9,12,14,16,18,19,
21,23,25,27,30,32,34,36
];

return reds.includes(num)
? "red"
: "black";

}

function updateBalance(){

document.getElementById("balance")
.innerHTML=
`الرصيد: $${balance}`;

}

function manualSpin(){

if(spinning) return;

if(balance < bet){

alert("الرصيد غير كافي");

return;

}

spin();

}

function spin(){

spinning = true;

balance -= bet;

updateBalance();

const index =
Math.floor(
Math.random()*numbers.length
);

const result =
numbers[index];

const color =
getColor(result);

const slice =
360/numbers.length;

const rotate =
(360*8)+(index*slice);

wheel.style.transform =
`rotate(-${rotate}deg)`;

ball.style.transform =
`rotate(${rotate+720}deg)
translateY(36vw)`;

setTimeout(()=>{

let reward = 0;

let win = false;

if(type===color){

win = true;

reward =
color==="green"
? bet*14
: bet*2;

balance += reward;

}

updateBalance();

if(win){

document
.getElementById("result")
.className="result win";

document
.getElementById("result")
.innerHTML=
`✅ ربحت ${reward}$`;

}else{

document
.getElementById("result")
.className="result lose";

document
.getElementById("result")
.innerHTML=
`❌ خسرت | ${result}`;

}

spinning=false;

},6200);

}

let time = 10;

setInterval(()=>{

if(spinning) return;

time--;

document
.getElementById("timer")
.innerHTML=time;

if(time<=0){

time=10;

spin();

}

},1000);

</script>

</body>
</html>
