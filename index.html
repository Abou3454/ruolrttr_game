<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Roulette Casino</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
radial-gradient(circle,#4d0000,#000);
overflow:hidden;
height:100vh;
color:white;
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:8px;
overflow:hidden;
}

/* TITLE */

.title{
font-size:14vw;
font-weight:bold;
color:white;
text-shadow:
0 0 10px red,
0 0 30px red;
margin-top:5px;
}

/* TOP */

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
margin-top:5px;
}

.balance{
font-size:8vw;
font-weight:bold;
color:gold;
text-shadow:
0 0 10px gold;
}

.timer{
font-size:10vw;
font-weight:bold;
color:#00ff66;
text-shadow:
0 0 10px #00ff66,
0 0 30px #00ff66;
}

/* HISTORY */

.history{
width:100%;
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
margin-bottom:5px;
}

.history div{
width:28px;
height:28px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:14px;
font-weight:bold;
}

.redHis{
background:red;
}

.blackHis{
background:black;
}

.greenHis{
background:green;
}

/* WHEEL */

.wheelWrap{
position:relative;
width:74vw;
height:74vw;
max-width:330px;
max-height:330px;
margin-top:5px;
}

.pointer{
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:32px solid yellow;
z-index:200;
filter:drop-shadow(0 0 15px yellow);
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid gold;
overflow:hidden;
position:relative;
box-shadow:
0 0 20px gold,
0 0 60px orange;
transition:
transform 6s cubic-bezier(.17,.67,.19,1);
background:black;
}

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
font-size:5vw;
font-weight:bold;
color:white;
text-shadow:
0 0 5px white;
}

.ball{
position:absolute;
width:18px;
height:18px;
border-radius:50%;
background:white;
left:50%;
top:50%;
margin-left:-9px;
margin-top:-9px;
z-index:300;

box-shadow:
0 0 10px white,
0 0 20px cyan,
0 0 40px white;

transition:
transform 6s cubic-bezier(.17,.67,.19,1);
}

/* BET AREA */

.betBoard{
width:100%;
margin-top:8px;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.betBox{
height:65px;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
font-size:7vw;
font-weight:bold;
position:relative;
border:2px solid rgba(255,255,255,.15);

transition:.2s;
}

.red{
background:#ff0033;
}

.black{
background:#111;
}

.green{
background:#00bb44;
}

.special{
background:#7c0f26;
}

.betAmount{
position:absolute;
top:4px;
left:4px;
background:black;
color:yellow;
padding:2px 7px;
border-radius:10px;
font-size:15px;
}

/* CHIPS */

.chips{
display:flex;
gap:10px;
margin-top:10px;
}

.chip{
width:68px;
height:68px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:9vw;
font-weight:bold;
color:black;
border:5px solid #ddd;

transition:.2s;
}

.activeChip{
border-color:gold;

box-shadow:
0 0 15px gold,
0 0 30px gold;

transform:scale(1.1);
}

/* CURRENT BET */

.currentBet{
margin-top:10px;
font-size:8vw;
color:white;
}

/* SPIN */

.spinBtn{
width:95%;
height:72px;
border:none;
border-radius:20px;
margin-top:10px;

background:red;
color:white;

font-size:10vw;
font-weight:bold;

box-shadow:
0 0 20px red,
0 0 50px red;
}

/* RESULT */

.result{
margin-top:8px;
font-size:8vw;
font-weight:bold;
color:yellow;
text-shadow:
0 0 10px yellow,
0 0 25px yellow;
}

/* FLASH */

@keyframes flash{

0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
🎰 روليت
</div>

<div class="top">

<div class="balance" id="balance">
$5000
</div>

<div class="timer" id="timer">
15
</div>

</div>

<div class="history" id="history"></div>

<div class="wheelWrap">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div class="wheel" id="wheel"></div>

</div>

<div class="betBoard">

<div class="betBox black"
onclick="placeBet('black',this)">
<div class="betAmount" id="blackCount">0</div>
BLACK
</div>

<div class="betBox red"
onclick="placeBet('red',this)">
<div class="betAmount" id="redCount">0</div>
RED
</div>

<div class="betBox special"
onclick="placeBet('even',this)">
<div class="betAmount" id="evenCount">0</div>
EVEN
</div>

<div class="betBox green"
onclick="placeBet('zero',this)">
<div class="betAmount" id="zeroCount">0</div>
0
</div>

<div class="betBox special"
onclick="placeBet('high',this)">
<div class="betAmount" id="highCount">0</div>
19-36
</div>

<div class="betBox special"
onclick="placeBet('odd',this)">
<div class="betAmount" id="oddCount">0</div>
ODD
</div>

</div>

<div class="chips">

<div class="chip"
onclick="setChip(1000,this)">
1K
</div>

<div class="chip"
onclick="setChip(100,this)">
100
</div>

<div class="chip"
onclick="setChip(50,this)">
50
</div>

<div class="chip activeChip"
onclick="setChip(10,this)">
10
</div>

</div>

<div class="currentBet"
id="currentBet">
الرهان: $0
</div>

<button class="spinBtn">
انتظر انتهاء العداد
</button>

<div class="result"
id="result"></div>

</div>

<audio id="spinSound"
src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1932.mp3">
</audio>

<script>

const numbers=[
0,32,15,19,4,21,2,25,17,34,
6,27,13,36,11,30,8,23,10,
5,24,16,33,1,20,14,31,9,
22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

const wheel=document.getElementById("wheel");

numbers.forEach((n,i)=>{

const div=document.createElement("div");

div.className="number";

const deg=i*(360/numbers.length);

div.style.transform=
`rotate(${deg}deg)
translateY(-33vw)
rotate(90deg)`;

div.innerHTML=n;

wheel.appendChild(div);

});

/* STATE */

let balance=5000;

let currentChip=10;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

/* CHIP */

function setChip(v,el){

currentChip=v;

document
.querySelectorAll(".chip")
.forEach(c=>{

c.classList.remove("activeChip");

});

el.classList.add("activeChip");

}

/* BET */

function placeBet(type,el){

if(balance<currentChip) return;

bets[type]+=currentChip;

balance-=currentChip;

el.style.boxShadow=
"0 0 20px gold";

updateUI();

}

/* UI */

function updateUI(){

document.getElementById("balance")
innerHTML="$"+balance;

document.getElementById("currentBet")
innerHTML=
"الرهان: $"+
Object.values(bets)
.reduce((a,b)=>a+b,0);

for(let k in bets){

document
.getElementById(k+"Count")
.innerHTML=bets[k];

}

}

/* TIMER */

let time=15;

setInterval(()=>{

time--;

document.getElementById("timer")
innerHTML=time;

if(time<=0){

spin();

time=15;

}

},1000);

/* SPIN */

function spin(){

document
.getElementById("spinSound")
.play();

const result=
numbers[
Math.floor(
Math.random()*numbers.length
)
];

const index=
numbers.indexOf(result);

const deg=
360/numbers.length;

const rotate=
3600-(index*deg);

wheel.style.transform=
`rotate(${rotate}deg)`;

document.getElementById("ball")
.style.transform=
`rotate(${rotate+1400}deg)
translateY(-31vw)`;

setTimeout(()=>{

finish(result);

},6500);

}

/* RESULT */

function finish(num){

let win=0;

if(redNums.includes(num))
win+=bets.red*2;

if(num!==0 &&
!redNums.includes(num))
win+=bets.black*2;

if(num%2===0 && num!==0)
win+=bets.even*2;

if(num%2===1)
win+=bets.odd*2;

if(num>=19)
win+=bets.high*2;

if(num===0)
win+=bets.zero*14;

balance+=win;

document.getElementById("result")
innerHTML=
win>0
?
"🎉 WIN +$"+win
:
"❌ LOSE "+num;

document.getElementById("result")
.style.animation=
"flash .5s infinite";

if(win>0){

navigator.vibrate(300);

}

addHistory(num);

resetBets();

updateUI();

}

/* RESET */

function resetBets(){

for(let k in bets){

bets[k]=0;

}

document
.querySelectorAll(".betBox")
.forEach(el=>{

el.style.boxShadow="none";

});

}

/* HISTORY */

function addHistory(num){

const div=document.createElement("div");

div.innerHTML=num;

if(num===0)
div.className="greenHis";

else if(redNums.includes(num))
div.className="redHis";

else
div.className="blackHis";

const history=
document.getElementById("history");

history.prepend(div);

if(history.children.length>8){

history.removeChild(
history.lastChild
);

}

}

updateUI();

</script>

</body>
</html>
