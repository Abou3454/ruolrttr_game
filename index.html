<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Wheel Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#14002c;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#37006d,#120022);
z-index:-2;
}

.container{
width:100%;
max-width:430px;
text-align:center;
padding-top:10px;
}

.balance{
font-size:42px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
margin-bottom:10px;
}

.wheel-box{
position:relative;
width:340px;
height:340px;
margin:auto;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-top:55px solid gold;
z-index:100;
filter:drop-shadow(0 0 12px yellow);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
background:#111;
transition:transform 6s cubic-bezier(.17,.67,.12,.99);
box-shadow:
0 0 40px gold,
0 0 100px rgba(255,215,0,.6);
}

.center{
position:absolute;
width:100px;
height:100px;
background:radial-gradient(circle,#ff0000,#5f0000);
border:8px solid gold;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
box-shadow:0 0 25px gold;
}

.history{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.history div{
width:45px;
height:45px;
background:#70008f;
border:2px solid gold;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
box-shadow:0 0 10px rgba(255,215,0,.4);
}

.bets{
margin-top:18px;
display:flex;
justify-content:center;
gap:15px;
}

.bet{
width:105px;
height:115px;
background:linear-gradient(#a000c8,#5f006f);
border:4px solid gold;
border-radius:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 0 18px rgba(255,215,0,.5);
transition:.2s;
}

.bet.active{
transform:scale(1.08);
box-shadow:0 0 30px gold;
}

.bet span{
font-size:50px;
}

.bet b{
font-size:40px;
color:gold;
}

.bet p{
font-size:24px;
margin-top:5px;
}

.chips{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.chip{
width:72px;
height:72px;
border-radius:50%;
background:white;
border:7px solid #ddd;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:24px;
color:black;
box-shadow:0 0 15px white;
transition:.2s;
}

.chip.active{
transform:scale(1.15);
box-shadow:0 0 25px gold;
border-color:gold;
}

.spin-btn{
margin-top:25px;
width:240px;
height:65px;
border:none;
border-radius:18px;
background:linear-gradient(#666,#222);
color:white;
font-size:32px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,255,255,.5);
}

.result-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup{
width:320px;
background:linear-gradient(#c00000,#500000);
border:5px solid gold;
border-radius:20px;
padding:25px;
box-shadow:0 0 35px gold;
animation:pop .4s;
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup h1{
font-size:42px;
color:gold;
margin-bottom:15px;
}

.popup .emoji{
font-size:90px;
margin:20px 0;
}

.popup button{
margin-top:15px;
width:180px;
height:55px;
border:none;
border-radius:15px;
background:gold;
font-size:28px;
font-weight:bold;
}

.timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:55px;
font-weight:bold;
color:white;
text-shadow:0 0 15px white;
z-index:200;
}

</style>
</head>

<body>

<div class="container">

<div class="balance" id="balance">$5000</div>

<div class="wheel-box">

<div class="pointer"></div>

<canvas id="wheel" width="340" height="340"></canvas>

<div class="center"></div>

<div class="timer" id="timer">5</div>

</div>

<div class="history" id="history">
<div>🍉</div>
<div>🍎</div>
<div>7️⃣</div>
</div>

<div class="bets">

<div class="bet" onclick="selectBet('🍉',this)">
<span>🍉</span>
<b>x2</b>
<p id="bet1">0</p>
</div>

<div class="bet" onclick="selectBet('7️⃣',this)">
<span>7️⃣</span>
<b>x8</b>
<p id="bet2">0</p>
</div>

<div class="bet" onclick="selectBet('🍎',this)">
<span>🍎</span>
<b>x2</b>
<p id="bet3">0</p>
</div>

</div>

<div class="chips">

<div class="chip active" onclick="selectChip(100,this)">100</div>
<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip" onclick="selectChip(10000,this)">10K</div>

</div>

<button class="spin-btn" onclick="spin()">SPIN</button>

</div>

<div class="result-popup" id="popup">

<div class="popup">

<h1>حظ سعيد!</h1>

<div class="emoji" id="popupEmoji">🍉</div>

<h2 id="popupText">ربحت</h2>

<button onclick="closePopup()">إغلاق</button>

</div>

</div>

<script>

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const sections=[
"🍉","🍎","🍉","7️⃣",
"🍎","🍉","🍎","🍉"
];

const colors=[
"#0080ff",
"#0066cc",
"#0080ff",
"#ff00cc",
"#0066cc",
"#0080ff",
"#0066cc",
"#0080ff"
];

const arc=Math.PI*2/sections.length;

function drawWheel(){

for(let i=0;i<sections.length;i++){

ctx.beginPath();

ctx.fillStyle=colors[i];

ctx.moveTo(170,170);

ctx.arc(
170,
170,
160,
i*arc,
(i+1)*arc
);

ctx.fill();

ctx.lineWidth=4;
ctx.strokeStyle="gold";
ctx.stroke();

ctx.save();

ctx.translate(170,170);

ctx.rotate(i*arc+arc/2);

ctx.textAlign="center";

ctx.font="45px Arial";

ctx.fillText(sections[i],110,15);

ctx.restore();

}

}

drawWheel();

let selectedChip=100;
let selectedBet=null;
let balance=5000;
let deg=0;

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll(".chip")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

}

function selectBet(type,el){

if(balance<selectedChip) return;

selectedBet=type;

balance-=selectedChip;

document.getElementById("balance")
.innerHTML="$"+balance;

document.querySelectorAll(".bet")
.forEach(b=>b.classList.remove("active"));

el.classList.add("active");

}

function spin(){

if(!selectedBet){
alert("اختر رهان");
return;
}

const wheel=document.getElementById("wheel");

const random=Math.floor(Math.random()*360);

deg+=3600+random;

wheel.style.transform=`rotate(${deg}deg)`;

let count=5;

const timer=document.getElementById("timer");

timer.innerHTML=count;

const t=setInterval(()=>{

count--;

timer.innerHTML=count;

if(count<=0){

clearInterval(t);

finish();

}

},1000);

}

function finish(){

const result=
sections[Math.floor(Math.random()*sections.length)];

document.getElementById("popupEmoji")
.innerHTML=result;

let text="خسرت";

if(result===selectedBet){

if(result==="7️⃣"){

balance+=selectedChip*8;

}else{

balance+=selectedChip*2;

}

text="ربحت 🎉";

}

document.getElementById("balance")
.innerHTML="$"+balance;

document.getElementById("popupText")
.innerHTML=text;

document.getElementById("popup")
.style.display="flex";

const history=document.getElementById("history");

history.innerHTML=
`<div>${result}</div>`+history.innerHTML;

selectedBet=null;

document.querySelectorAll(".bet")
.forEach(b=>b.classList.remove("active"));

}

function closePopup(){

document.getElementById("popup")
.style.display="none";

}

</script>

</body>
</html>
