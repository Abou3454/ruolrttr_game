<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الحظ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:radial-gradient(circle,#2d004d,#000);
text-align:center;
overflow-x:hidden;
color:white;
}

.balance{
font-size:60px;
font-weight:bold;
color:gold;
margin-top:20px;
text-shadow:0 0 20px gold;
}

.pointer{
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-top:50px solid yellow;
margin:auto;
position:relative;
top:30px;
z-index:20;
filter:drop-shadow(0 0 15px yellow);
}

.wheel-container{
position:relative;
width:90vw;
height:90vw;
max-width:400px;
max-height:400px;
margin:auto;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
position:relative;
overflow:hidden;
background:#1e88ff;
transition:transform 5s cubic-bezier(0.17,0.67,0.12,0.99);
box-shadow:
0 0 30px gold,
0 0 80px yellow;
}

.slice{
position:absolute;
width:50%;
height:50%;
left:50%;
top:50%;
transform-origin:0% 0%;
clip-path:polygon(0 0,100% 0,0 100%);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
}

.slice:nth-child(1){transform:rotate(0deg);background:#1e88ff;}
.slice:nth-child(2){transform:rotate(45deg);background:#1e88ff;}
.slice:nth-child(3){transform:rotate(90deg);background:#ff00aa;}
.slice:nth-child(4){transform:rotate(135deg);background:#1e88ff;}
.slice:nth-child(5){transform:rotate(180deg);background:#1e88ff;}
.slice:nth-child(6){transform:rotate(225deg);background:#1e88ff;}
.slice:nth-child(7){transform:rotate(270deg);background:#1e88ff;}
.slice:nth-child(8){transform:rotate(315deg);background:#1e88ff;}

.center{
position:absolute;
width:120px;
height:120px;
background:radial-gradient(circle,#ff0000,#5f0000);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:8px solid gold;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
z-index:10;
box-shadow:0 0 30px gold;
}

.bet-area{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:30px;
padding:10px;
}

.bet-box{
width:120px;
height:150px;
background:linear-gradient(#d000ff,#5a0070);
border:4px solid gold;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:50px;
font-weight:bold;
box-shadow:0 0 20px #ff00ff;
}

.bet-box span{
font-size:45px;
color:gold;
}

.amounts{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.amount{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:35px;
font-weight:bold;
background:white;
}

.active{
border:5px solid gold;
box-shadow:0 0 20px gold;
}

#spinBtn{
width:300px;
height:90px;
border:none;
border-radius:20px;
margin-top:30px;
font-size:45px;
font-weight:bold;
background:linear-gradient(#666,#222);
color:white;
box-shadow:0 0 20px black;
}

.result{
margin-top:20px;
font-size:45px;
color:gold;
padding-bottom:30px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#5a0000;
padding:30px;
border-radius:25px;
border:5px solid gold;
box-shadow:0 0 40px gold;
z-index:999;
text-align:center;
animation:pop .4s ease;
}

.popup h1{
font-size:45px;
color:gold;
}

.popup .emoji{
font-size:100px;
margin:15px 0;
}

.popup h2{
font-size:50px;
}

@keyframes pop{
from{
transform:translate(-50%,-50%) scale(.2);
opacity:0;
}
to{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}

</style>
</head>

<body>

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-container">

<div id="wheel">

<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">7️⃣</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="bet-area">

<div class="bet-box">
🍉
<span>x2</span>
</div>

<div class="bet-box">
7️⃣
<span>x8</span>
</div>

<div class="bet-box">
🍎
<span>x2</span>
</div>

</div>

<div class="amounts">

<button class="amount">100</button>
<button class="amount">1K</button>
<button class="amount active">10K</button>

</div>

<button id="spinBtn">SPIN</button>

<div class="result" id="result">
🍎 : النتيجة
</div>

<script>

let spinning = false;
let balance = 5000;

const wheel = document.getElementById("wheel");
const spinBtn = document.getElementById("spinBtn");
const resultText = document.getElementById("result");
const balanceText = document.getElementById("balance");
const timer = document.getElementById("timer");

const items = [
"🍎",
"🍉",
"7️⃣",
"🍎",
"🍉",
"🍎",
"🍉",
"🍎"
];

const rewards = {
"🍎":2,
"🍉":2,
"7️⃣":8
};

function sound(type){

const audio = new Audio(
type=="win"
?
"https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"
:
"https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.mp3"
);

audio.play();

}

spinBtn.onclick = ()=>{

if(spinning) return;

spinning = true;

sound("spin");

let count = 5;

timer.innerText = count;

const countdown = setInterval(()=>{

count--;

timer.innerText = count;

if(count<=0){
clearInterval(countdown);
}

},1000);

const deg = 3000 + Math.floor(Math.random()*360);

wheel.style.transform = `rotate(${deg}deg)`;

setTimeout(()=>{

const index = Math.floor(Math.random()*items.length);

const result = items[index];

const reward = rewards[result];

balance += reward * 100;

balanceText.innerText = "$"+balance;

resultText.innerHTML = result + " : النتيجة";

sound("win");

navigator.vibrate([200,100,200]);

const popup = document.createElement("div");

popup.className = "popup";

popup.innerHTML = `
<h1>🎉 فوز</h1>
<div class="emoji">${result}</div>
<h2>X${reward}</h2>
`;

document.body.appendChild(popup);

setTimeout(()=>{
popup.remove();
},3000);

spinning = false;

timer.innerText = "5";

},5000);

}

</script>

</body>
</html>
