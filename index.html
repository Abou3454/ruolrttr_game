<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة واربح</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{

background:
radial-gradient(circle,#32004d,#12001f,#000);

overflow-x:hidden;
color:white;
text-align:center;

}

.game{

width:100%;
max-width:430px;
margin:auto;
padding-bottom:40px;
overflow:hidden;

}

.balance{

font-size:58px;
font-weight:bold;
color:gold;
margin-top:20px;

text-shadow:
0 0 20px gold,
0 0 40px yellow;

}

.pointer{

width:0;
height:0;

border-left:25px solid transparent;
border-right:25px solid transparent;
border-top:60px solid yellow;

margin:5px auto -20px;
position:relative;
z-index:10;

filter:drop-shadow(0 0 20px yellow);

}

.wheel-box{

position:relative;

width:64vw;
height:64vw;

max-width:240px;
max-height:240px;

margin:20px auto 30px;

}
#wheel{

width:100%;
height:100%;

border-radius:50%;

border:12px solid gold;

position:relative;

overflow:hidden;

background:#1e90ff;

box-shadow:
0 0 40px gold,
0 0 80px #ff00ff;

transition:transform 5s cubic-bezier(.17,.67,.2,1);

}

.slice{

position:absolute;

width:50%;
height:50%;

left:50%;
top:50%;

transform-origin:0% 0%;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;

}

.slice span{

transform:rotate(45deg);

}

.center{

position:absolute;

width:95px;
height:95px;

background:
radial-gradient(circle,red,#8b0000);

border-radius:50%;

top:50%;
left:50%;

transform:translate(-50%,-50%);

border:8px solid gold;

display:flex;
justify-content:center;
align-items:center;

font-size:52px;
font-weight:bold;

box-shadow:
0 0 30px yellow;

z-index:5;

}

.cards{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

padding:0 14px;

margin-top:40px;

}
.card{

background:
linear-gradient(#ff00ff,#7b009e);

border:3px solid gold;

border-radius:18px;

padding:10px 5px;

min-height:115px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

box-shadow:
0 0 20px #ff00ff;

cursor:pointer;

transition:.2s;

}

.card:active{

transform:scale(.95);

}

.icon{

font-size:38px;
margin-bottom:10px;

}

.multi{

font-size:34px;
font-weight:bold;
color:gold;

text-shadow:
0 0 10px yellow;

}

.bet{

font-size:24px;
margin-top:5px;

}

.apple{

grid-column:1/3;

width:42%;

margin:auto;

}

.chips{

display:flex;
justify-content:center;
gap:10px;

margin-top:20px;

flex-wrap:wrap;

}

.chip{

width:65px;
height:65px;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:26px;
font-weight:bold;
color:black;

border:5px solid #ddd;

cursor:pointer;

}

.active-chip{

border-color:gold;

box-shadow:
0 0 20px yellow;

}

.result{

font-size:40px;
margin-top:20px;
color:gold;

text-shadow:
0 0 10px yellow;

}

@media(max-width:430px){

.balance{

font-size:44px;

}

.slice{

font-size:28px;

}

.center{

width:90px;
height:90px;
font-size:45px;

}

.card{

min-height:150px;

}

.icon{

font-size:42px;

}

.multi{

font-size:38px;

}

.bet{

font-size:20px;

}

.chip{

width:58px;
height:58px;
font-size:20px;

}

}

</style>
</head>

<body>

<div class="game">

<div class="balance" id="balance">$5000</div>

<div class="pointer"></div>

<div class="wheel-box">

<div id="wheel">

<div class="slice" style="transform:rotate(0deg) skewY(-45deg);"><span>🍉</span></div>

<div class="slice" style="transform:rotate(45deg) skewY(-45deg);"><span>🍎</span></div>

<div class="slice" style="transform:rotate(90deg) skewY(-45deg);"><span>🍉</span></div>

<div class="slice" style="transform:rotate(135deg) skewY(-45deg);"><span>🍎</span></div>

<div class="slice" style="transform:rotate(180deg) skewY(-45deg);"><span>7️⃣</span></div>

<div class="slice" style="transform:rotate(225deg) skewY(-45deg);"><span>🍎</span></div>

<div class="slice" style="transform:rotate(270deg) skewY(-45deg);"><span>🍉</span></div>

<div class="slice" style="transform:rotate(315deg) skewY(-45deg);"><span>🍎</span></div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="cards">

<div class="card" onclick="betOn('melon')">

<div class="icon">🍉</div>

<div class="multi">x2</div>

<div class="bet" id="melonBet">0</div>

</div>

<div class="card" onclick="betOn('seven')">

<div class="icon">7️⃣</div>

<div class="multi">x8</div>

<div class="bet" id="sevenBet">0</div>

</div>

<div class="card apple" onclick="betOn('apple')">

<div class="icon">🍎</div>

<div class="multi">x2</div>

<div class="bet" id="appleBet">0</div>

</div>

</div>

<div class="chips">

<div class="chip" onclick="setChip(100)">100</div>

<div class="chip active-chip" onclick="setChip(1000)">1K</div>

<div class="chip" onclick="setChip(10000)">10K</div>

</div>

<div class="result" id="result">
النتيجة :
</div>

</div>

<script>

let balance=5000;

let chip=1000;

let bets={
melon:0,
apple:0,
seven:0
};

const wheel=document.getElementById("wheel");

const timer=document.getElementById("timer");

const result=document.getElementById("result");

function updateUI(){

document.getElementById("balance").innerText="$"+balance;

document.getElementById("melonBet").innerText=bets.melon;

document.getElementById("appleBet").innerText=bets.apple;

document.getElementById("sevenBet").innerText=bets.seven;

}

function setChip(v){

chip=v;

document.querySelectorAll(".chip").forEach(c=>{

c.classList.remove("active-chip");

});

event.target.classList.add("active-chip");

}

function betOn(type){

if(balance<chip)return;

balance-=chip;

bets[type]+=chip;

updateUI();

}

const items=[
"melon",
"apple",
"melon",
"apple",
"seven",
"apple",
"melon",
"apple"
];

function spin(){

let random=Math.floor(Math.random()*8);

let degree=(360*5)+(random*45);

wheel.style.transform=`rotate(${degree}deg)`;

let current=5;

timer.innerText=current;

let countdown=setInterval(()=>{

current--;

timer.innerText=current;

if(current<=0){

clearInterval(countdown);

finishRound(random);

}

},1000);

}

function finishRound(index){

let item=items[index];

let text="";

let win=0;

if(item==="melon"){

text="🍉";

win=bets.melon*2;

}

if(item==="apple"){

text="🍎";

win=bets.apple*2;

}

if(item==="seven"){

text="7️⃣";

win=bets.seven*8;

}

balance+=win;

result.innerHTML="النتيجة : "+text;

bets.melon=0;
bets.apple=0;
bets.seven=0;

updateUI();

setTimeout(()=>{

spin();

},3000);

}

updateUI();

spin();

</script>

</body>
</html>
