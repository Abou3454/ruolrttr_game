<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Roulette Casino</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:
radial-gradient(circle,#5a0000,#000);
overflow:hidden;
height:100vh;
color:white;
}

.container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
overflow:hidden;
}

/* TOP */

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
}

.balance{
font-size:9vw;
font-weight:bold;
color:gold;
text-shadow:
0 0 10px gold,
0 0 25px orange;
}

.timer{
font-size:10vw;
font-weight:bold;
color:#00ff66;
text-shadow:
0 0 10px #00ff66,
0 0 25px #00ff66;
}

/* HISTORY */

.history{
display:flex;
gap:5px;
margin-bottom:5px;
}

.history div{
width:26px;
height:26px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
font-weight:bold;
}

.redHis{
background:red;
}

.blackHis{
background:black;
}

.greenHis{
background:green;
}

/* CANVAS */

.canvasWrap{
position:relative;
width:100%;
display:flex;
justify-content:center;
align-items:center;
margin-top:5px;
}

canvas{
background:transparent;
}

/* POINTER */

.pointer{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:0;
height:0;

border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid yellow;

z-index:100;

filter:
drop-shadow(0 0 10px yellow);
}

/* BET AREA */

.betBoard{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.bet{
height:65px;
border-radius:15px;

display:flex;
justify-content:center;
align-items:center;

font-size:7vw;
font-weight:bold;

position:relative;

border:2px solid rgba(255,255,255,.2);

transition:.2s;
}

.red{
background:#ff0033;
}

.black{
background:#111;
}

.green{
background:#00c83a;
}

.special{
background:#8a1027;
}

.betValue{
position:absolute;
top:4px;
left:4px;
background:black;
padding:2px 8px;
border-radius:10px;
font-size:15px;
color:yellow;
}

/* CHIPS */

.chips{
display:flex;
gap:10px;
margin-top:10px;
}

.chip{
width:70px;
height:70px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:8vw;
font-weight:bold;
color:black;

border:5px solid #ddd;

transition:.2s;
}

.activeChip{

border-color:gold;

box-shadow:
0 0 15px gold,
0 0 30px gold;

transform:scale(1.1);

}

/* BET */

.currentBet{
margin-top:8px;
font-size:8vw;
}

/* RESULT */

.result{
margin-top:6px;
font-size:8vw;
font-weight:bold;
color:yellow;
text-shadow:
0 0 10px yellow,
0 0 30px yellow;
}

/* FLASH */

@keyframes flash{

0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}

}

</style>
</head>

<body>

<div class="container">

<div class="top">

<div class="balance" id="balance">
$5000
</div>

<div class="timer" id="timer">
15
</div>

</div>

<div class="history" id="history"></div>

<div class="canvasWrap">

<div class="pointer"></div>

<canvas id="roulette" width="320" height="320"></canvas>

</div>

<div class="betBoard">

<div class="bet black"
onclick="placeBet('black',this)">
<div class="betValue" id="blackCount">0</div>
BLACK
</div>

<div class="bet red"
onclick="placeBet('red',this)">
<div class="betValue" id="redCount">0</div>
RED
</div>

<div class="bet special"
onclick="placeBet('even',this)">
<div class="betValue" id="evenCount">0</div>
EVEN
</div>

<div class="bet green"
onclick="placeBet('zero',this)">
<div class="betValue" id="zeroCount">0</div>
0
</div>

<div class="bet special"
onclick="placeBet('high',this)">
<div class="betValue" id="highCount">0</div>
19-36
</div>

<div class="bet special"
onclick="placeBet('odd',this)">
<div class="betValue" id="oddCount">0</div>
ODD
</div>

</div>

<div class="chips">

<div class="chip"
onclick="setChip(1000,this)">
1K
</div>

<div class="chip"
onclick="setChip(100,this)">
100
</div>

<div class="chip"
onclick="setChip(50,this)">
50
</div>

<div class="chip activeChip"
onclick="setChip(10,this)">
10
</div>

</div>

<div class="currentBet" id="currentBet">
الرهان: $0
</div>

<div class="result" id="result"></div>

</div>

<script>

const canvas=document.getElementById("roulette");

const ctx=canvas.getContext("2d");

const numbers=[
0,32,15,19,4,21,2,25,17,34,
6,27,13,36,11,30,8,23,10,
5,24,16,33,1,20,14,31,9,
22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

let angle=0;

let spinning=false;

let ballAngle=0;

function drawWheel(){

ctx.clearRect(0,0,320,320);

ctx.save();

ctx.translate(160,160);

ctx.rotate(angle);

const slice=
(Math.PI*2)/numbers.length;

for(let i=0;i<numbers.length;i++){

ctx.beginPath();

ctx.moveTo(0,0);

ctx.arc(
0,
0,
145,
i*slice,
(i+1)*slice
);

ctx.fillStyle=
numbers[i]==0
?
"#00cc44"
:
redNums.includes(numbers[i])
?
"red"
:
"black";

ctx.fill();

ctx.strokeStyle="gold";

ctx.lineWidth=2;

ctx.stroke();

ctx.save();

ctx.rotate(i*slice+slice/2);

ctx.translate(115,0);

ctx.rotate(Math.PI/2);

ctx.fillStyle="white";

ctx.font="bold 20px Arial";

ctx.textAlign="center";

ctx.fillText(numbers[i],0,0);

ctx.restore();

}

ctx.restore();

/* BALL */

ctx.save();

ctx.translate(160,160);

ctx.rotate(ballAngle);

ctx.beginPath();

ctx.arc(0,-125,9,0,Math.PI*2);

ctx.fillStyle="white";

ctx.shadowBlur=20;

ctx.shadowColor="cyan";

ctx.fill();

ctx.restore();

}

drawWheel();

/* STATE */

let balance=5000;

let chip=10;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

function setChip(v,el){

chip=v;

document
.querySelectorAll(".chip")
.forEach(c=>c.classList.remove("activeChip"));

el.classList.add("activeChip");

}

function placeBet(type,el){

if(spinning)return;

if(balance<chip)return;

bets[type]+=chip;

balance-=chip;

el.style.boxShadow=
"0 0 20px gold";

updateUI();

}

function updateUI(){

document.getElementById("balance")
innerHTML="$"+balance;

document.getElementById("currentBet")
innerHTML=
"الرهان: $"+
Object.values(bets)
.reduce((a,b)=>a+b,0);

for(let k in bets){

document
.getElementById(k+"Count")
.innerHTML=bets[k];

}

}

/* TIMER */

let time=15;

setInterval(()=>{

if(spinning)return;

time--;

document.getElementById("timer")
.innerHTML=time;

if(time<=0){

spin();

time=15;

}

},1000);

/* SPIN */

function spin(){

spinning=true;

const result=
numbers[
Math.floor(
Math.random()*numbers.length
)
];

const index=
numbers.indexOf(result);

const target=
((Math.PI*2)/numbers.length)
*index;

let speed=0.35;

let ballSpeed=-0.45;

const interval=setInterval(()=>{

angle+=speed;

ballAngle+=ballSpeed;

speed*=0.992;

ballSpeed*=0.991;

drawWheel();

if(speed<0.003){

clearInterval(interval);

ballAngle=target;

drawWheel();

finish(result);

spinning=false;

}

},16);

}

/* RESULT */

function finish(num){

let win=0;

if(redNums.includes(num))
win+=bets.red*2;

if(num!==0 &&
!redNums.includes(num))
win+=bets.black*2;

if(num%2===0 && num!==0)
win+=bets.even*2;

if(num%2===1)
win+=bets.odd*2;

if(num>=19)
win+=bets.high*2;

if(num===0)
win+=bets.zero*14;

balance+=win;

document.getElementById("result")
.innerHTML=
win>0
?
"🎉 WIN +$"+win
:
"❌ LOSE "+num;

document.getElementById("result")
.style.animation=
"flash .5s infinite";

addHistory(num);

resetBets();

updateUI();

}

/* RESET */

function resetBets(){

for(let k in bets){

bets[k]=0;

}

document
.querySelectorAll(".bet")
.forEach(el=>{

el.style.boxShadow="none";

});

}

/* HISTORY */

function addHistory(num){

const div=document.createElement("div");

div.innerHTML=num;

if(num===0)
div.className="greenHis";

else if(redNums.includes(num))
div.className="redHis";

else
div.className="blackHis";

const his=
document.getElementById("history");

his.prepend(div);

if(his.children.length>8){

his.removeChild(his.lastChild);

}

}

updateUI();

</script>

</body>
</html>
