<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Royale</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{
    box-sizing:border-box;
}

:root{
    --gold:#ffd76a;
    --gold2:#ff9f1c;
    --pink:#ff3bd4;
    --blue:#30c7ff;
    --red:#ff3b55;
    --green:#35e48b;
    --dark:#080611;
    --panel:rgba(17,13,34,.82);
    --panel2:rgba(255,255,255,.08);
}

body{
    margin:0;
    min-height:100dvh;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
    overflow-x:hidden;
    background:
        radial-gradient(circle at 20% 10%,rgba(255,59,212,.35),transparent 28%),
        radial-gradient(circle at 80% 8%,rgba(48,199,255,.28),transparent 28%),
        radial-gradient(circle at 50% 92%,rgba(255,215,106,.18),transparent 34%),
        linear-gradient(180deg,#10071e,#070411 55%,#020106);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.04) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 80%);
}

.app{
    width:min(100%,720px);
    margin:0 auto;
    padding:10px 10px 18px;
    position:relative;
    z-index:1;
}

.top-card{
    background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));
    border:1px solid rgba(255,215,106,.45);
    border-radius:22px;
    padding:12px;
    box-shadow:0 0 28px rgba(255,215,106,.18), inset 0 0 30px rgba(255,255,255,.04);
}

.brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.brand-name{
    text-align:right;
}

.brand-name .title{
    font-size:clamp(24px,6vw,40px);
    font-weight:900;
    color:var(--gold);
    text-shadow:0 0 20px rgba(255,215,106,.85);
    line-height:1;
}

.brand-name .sub{
    margin-top:4px;
    font-size:clamp(12px,3vw,15px);
    color:rgba(255,255,255,.72);
}

.balance-box{
    min-width:130px;
    padding:10px 14px;
    border-radius:18px;
    background:linear-gradient(135deg,#2a1900,#6a3b00 55%,#2a1900);
    border:1px solid rgba(255,215,106,.85);
    box-shadow:0 0 22px rgba(255,215,106,.35);
}

.balance-label{
    font-size:12px;
    color:rgba(255,255,255,.72);
}

.balance{
    font-size:clamp(28px,7vw,48px);
    color:var(--gold);
    font-weight:900;
    line-height:1.05;
    text-shadow:0 0 18px rgba(255,215,106,.85);
}

.account-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:8px;
    margin-top:10px;
}

.player-id{
    min-width:0;
    padding:10px 12px;
    border-radius:16px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(48,199,255,.45);
    color:white;
    font-size:clamp(13px,3.5vw,17px);
    box-shadow:0 0 14px rgba(48,199,255,.16);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.daily-btn{
    padding:10px 14px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#fff1a8,#ffb321,#ff7a00);
    color:#2a1200;
    font-size:clamp(13px,3.4vw,17px);
    font-weight:900;
    box-shadow:0 0 20px rgba(255,179,33,.45);
    cursor:pointer;
    white-space:nowrap;
}

.daily-btn:disabled{
    background:linear-gradient(135deg,#777,#3a3a3a);
    color:#ddd;
    box-shadow:none;
    cursor:not-allowed;
}

.arena{
    margin-top:10px;
    padding:8px 0 0;
}

.pointer{
    width:0;
    height:0;
    margin:0 auto -8px;
    border-left:clamp(18px,5vw,34px) solid transparent;
    border-right:clamp(18px,5vw,34px) solid transparent;
    border-top:clamp(42px,9vw,76px) solid var(--gold);
    filter:drop-shadow(0 0 16px rgba(255,215,106,.95));
    position:relative;
    z-index:10;
}

.wheel-container{
    position:relative;
    width:clamp(252px,75vw,500px);
    height:clamp(252px,75vw,500px);
    margin:0 auto;
    border-radius:50%;
}

.wheel-container::before{
    content:"";
    position:absolute;
    inset:-15px;
    border-radius:50%;
    background:conic-gradient(from 0deg,var(--gold),var(--pink),var(--blue),var(--gold));
    filter:blur(18px);
    opacity:.48;
}

#wheel{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    border-radius:50%;
    border:clamp(8px,2vw,14px) solid var(--gold);
    background:#1488ff;
    box-shadow:
        0 0 34px rgba(255,215,106,.8),
        inset 0 0 32px rgba(0,0,0,.25);
    display:block;
}

.center-circle{
    position:absolute;
    z-index:3;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:clamp(74px,18vw,124px);
    height:clamp(74px,18vw,124px);
    border-radius:50%;
    background:radial-gradient(circle at 35% 25%,#fff0a6,#ff345f 38%,#72001b);
    border:clamp(5px,1.5vw,8px) solid var(--gold);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:clamp(38px,10vw,70px);
    font-weight:900;
    color:white;
    box-shadow:0 0 34px rgba(255,96,0,.75), inset 0 0 20px rgba(0,0,0,.25);
}

.history{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:14px;
}

.history div{
    width:clamp(42px,11vw,64px);
    height:clamp(42px,11vw,64px);
    border-radius:16px;
    background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.04));
    border:1px solid rgba(255,215,106,.68);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:clamp(24px,7vw,38px);
    box-shadow:0 0 16px rgba(255,215,106,.24);
}

.bets{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
    margin-top:14px;
}

.bet-box{
    min-width:0;
    height:clamp(124px,32vw,184px);
    border-radius:20px;
    border:1px solid rgba(255,215,106,.7);
    background:
        linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 10%,rgba(255,59,212,.55),transparent 54%),
        linear-gradient(180deg,#231043,#10061d);
    box-shadow:0 0 20px rgba(255,59,212,.2), inset 0 0 24px rgba(255,255,255,.05);
    cursor:pointer;
    user-select:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.bet-box:nth-child(2){
    background:
        linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 10%,rgba(255,215,106,.6),transparent 54%),
        linear-gradient(180deg,#4a2100,#120804);
}

.bet-box:hover{
    transform:translateY(-2px) scale(1.02);
}

.bet-box .emoji{
    font-size:clamp(42px,12vw,72px);
    line-height:1;
}

.bet-box .multi{
    font-size:clamp(28px,8vw,56px);
    color:var(--gold);
    font-weight:900;
    line-height:1;
    text-shadow:0 0 16px rgba(255,215,106,.7);
}

.bet-box .amount{
    min-height:32px;
    margin-top:4px;
    padding:3px 10px;
    border-radius:999px;
    background:rgba(0,0,0,.34);
    color:white;
    font-size:clamp(20px,6vw,36px);
    font-weight:900;
    line-height:1.1;
}

.chips{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:14px;
    padding-bottom:6px;
}

.chip{
    aspect-ratio:1;
    max-height:92px;
    border-radius:50%;
    background:
        radial-gradient(circle at 35% 28%,#fff,#f4f4f4 38%,#d2d2d2 39%,#fff 57%,#cfcfcf);
    border:clamp(5px,1.5vw,8px) dashed #d92b2b;
    color:#161616;
    font-size:clamp(18px,5vw,28px);
    font-weight:900;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 18px rgba(255,255,255,.45);
    cursor:pointer;
    user-select:none;
}

.chip.active{
    border-color:var(--gold);
    box-shadow:0 0 28px rgba(255,215,106,.95);
    transform:translateY(-2px);
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.72);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

.popup-box{
    width:min(88vw,420px);
    background:
        linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 0%,rgba(255,215,106,.42),transparent 48%),
        linear-gradient(180deg,#230a2d,#120513);
    border:1px solid rgba(255,215,106,.85);
    border-radius:26px;
    padding:24px;
    box-shadow:0 0 44px rgba(255,215,106,.35);
}

.popup-box h1{
    color:var(--gold);
    font-size:clamp(32px,9vw,52px);
    margin:0 0 10px;
    text-shadow:0 0 18px rgba(255,215,106,.7);
}

.popup-emoji{
    font-size:clamp(76px,22vw,120px);
    line-height:1;
}

.popup-text{
    margin-top:8px;
    font-size:clamp(26px,7vw,42px);
    font-weight:900;
}

@media(max-height:720px){
    .app{ padding-top:6px; }
    .top-card{ padding:9px; }
    .brand-name .title{ font-size:25px; }
    .brand-name .sub{ display:none; }
    .balance{ font-size:31px; }
    .account-row{ margin-top:7px; }
    .daily-btn,.player-id{ padding:7px 10px; font-size:13px; }
    .wheel-container{ width:246px; height:246px; }
    .pointer{
        border-left-width:17px;
        border-right-width:17px;
        border-top-width:38px;
    }
    .history{ margin-top:9px; }
    .bets{ margin-top:9px; }
    .bet-box{ height:112px; border-radius:16px; }
    .chips{ margin-top:9px; }
    .chip{ max-height:68px; }
}
</style>
</head>

<body>

<div class="app">

    <div class="top-card">
        <div class="brand">
            <div class="brand-name">
                <div class="title">Lucky Royale</div>
                <div class="sub">عجلة الحظ الملكية</div>
            </div>

            <div class="balance-box">
                <div class="balance-label">الرصيد</div>
                <div class="balance" id="balance">$0</div>
            </div>
        </div>

        <div class="account-row">
            <div class="player-id" id="playerIdBox">ID الشحن: ...</div>
            <button class="daily-btn" id="dailyBtn">مكافأة يومية +1000</button>
        </div>
    </div>

    <div class="arena">
        <div class="pointer"></div>

        <div class="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="center-circle" id="timer">15</div>
        </div>
    </div>

    <div class="history" id="history">
        <div>🍉</div>
        <div>🍎</div>
        <div>7️⃣</div>
    </div>

    <div class="bets">
        <div class="bet-box" data-emoji="🍉" data-multi="2">
            <div class="emoji">🍉</div>
            <div class="multi">x2</div>
            <div class="amount">0</div>
        </div>

        <div class="bet-box" data-emoji="7️⃣" data-multi="8">
            <div class="emoji">7️⃣</div>
            <div class="multi">x8</div>
            <div class="amount">0</div>
        </div>

        <div class="bet-box" data-emoji="🍎" data-multi="2">
            <div class="emoji">🍎</div>
            <div class="multi">x2</div>
            <div class="amount">0</div>
        </div>
    </div>

    <div class="chips">
        <div class="chip active" data-value="100">100</div>
        <div class="chip" data-value="1000">1K</div>
        <div class="chip" data-value="10000">10K</div>
    </div>

</div>

<div id="popup">
    <div class="popup-box">
        <h1>النتيجة</h1>
        <div class="popup-emoji" id="popupEmoji">🍉</div>
        <div class="popup-text" id="popupText">انتهت الجولة</div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAivahrO2GOmZ5L3djdPJp2-eD8g0B1Aa8",
    authDomain: "lucky-game-332e1.firebaseapp.com",
    databaseURL: "https://lucky-game-332e1-default-rtdb.firebaseio.com",
    projectId: "lucky-game-332e1",
    storageBucket: "lucky-game-332e1.firebasestorage.app",
    messagingSenderId: "376359612059",
    appId: "1:376359612059:web:30e2612f92f1c4a494a03e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

let playerId = "guest";

if(
    window.Telegram &&
    Telegram.WebApp &&
    Telegram.WebApp.initDataUnsafe &&
    Telegram.WebApp.initDataUnsafe.user
){
    playerId = String(Telegram.WebApp.initDataUnsafe.user.id);
}else{
    let guestId = localStorage.getItem("luckyGameGuestId");
    if(!guestId){
        guestId = "guest_" + Date.now();
        localStorage.setItem("luckyGameGuestId", guestId);
    }
    playerId = guestId;
}

const playerRef = db.ref("players/" + playerId);

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const balanceEl = document.getElementById("balance");
const timer = document.getElementById("timer");
const popup = document.getElementById("popup");
const popupEmoji = document.getElementById("popupEmoji");
const popupText = document.getElementById("popupText");
const historyEl = document.getElementById("history");
const dailyBtn = document.getElementById("dailyBtn");
const playerIdBox = document.getElementById("playerIdBox");

playerIdBox.innerText = "ID الشحن: " + playerId;

const sections = ["🍉","🍎","🍉","7️⃣","🍎","🍉","🍎","🍉"];
const colors = ["#188bff","#1bb8ff","#188bff","#ff2fd0","#1bb8ff","#188bff","#1bb8ff","#188bff"];

const dailyRewardAmount = 1000;
const dailyRewardTime = 24 * 60 * 60 * 1000;

let balance = 0;
let currentAngle = 0;
let timeLeft = 15;
let selectedChip = 100;
let spinning = false;
let audioContext = null;

let bets = {
    "🍉": 0,
    "🍎": 0,
    "7️⃣": 0
};

function initPlayer(){
    playerRef.once("value").then(snapshot=>{
        if(!snapshot.exists()){
            playerRef.set({
                balance: 5000,
                lastDailyReward: 0
            });
        }
    });

    playerRef.on("value", snapshot=>{
        const data = snapshot.val();

        if(data && typeof data.balance !== "undefined"){
            balance = Number(data.balance);
            balanceEl.innerText = "$" + balance;
        }

        updateDailyButton();
    });
}

function saveBalance(){
    playerRef.update({
        balance: balance
    });
}

function updateBalance(){
    balanceEl.innerText = "$" + balance;
    saveBalance();
}

function initAudio(){
    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(audioContext.state === "suspended"){
        audioContext.resume();
    }
}

document.addEventListener("click", initAudio, {once:true});
document.addEventListener("touchstart", initAudio, {once:true});

function playTone(frequency, duration, type = "sine", volume = 0.18){
    if(!audioContext) return;

    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();

    oscillator.type = type;
    oscillator.frequency.value = frequency;

    gain.gain.setValueAtTime(volume, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

    oscillator.connect(gain);
    gain.connect(audioContext.destination);

    oscillator.start();
    oscillator.stop(audioContext.currentTime + duration);
}

function playWinSound(){
    playTone(523, 0.12, "sine");
    setTimeout(()=>playTone(659, 0.12, "sine"), 120);
    setTimeout(()=>playTone(784, 0.18, "sine"), 240);
}

function playLoseSound(){
    playTone(220, 0.18, "sawtooth", 0.12);
    setTimeout(()=>playTone(160, 0.22, "sawtooth", 0.1), 160);
}

function playErrorSound(){
    playTone(120, 0.12, "square", 0.1);
    setTimeout(()=>playTone(100, 0.12, "square", 0.1), 130);
}

function playRewardSound(){
    playTone(440, 0.1, "triangle");
    setTimeout(()=>playTone(660, 0.1, "triangle"), 100);
    setTimeout(()=>playTone(880, 0.18, "triangle"), 200);
}

function showPopup(emoji, text, duration = 2000){
    popup.style.display = "flex";
    popupEmoji.innerText = emoji;
    popupText.innerText = text;

    setTimeout(()=>{
        popup.style.display = "none";
    }, duration);
}

function formatTime(ms){
    const totalSeconds = Math.ceil(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return hours + "س " + minutes + "د " + seconds + "ث";
}

function updateDailyButton(){
    playerRef.once("value").then(snapshot=>{
        const data = snapshot.val() || {};
        const lastReward = Number(data.lastDailyReward) || 0;
        const now = Date.now();
        const remaining = dailyRewardTime - (now - lastReward);

        if(remaining <= 0){
            dailyBtn.disabled = false;
            dailyBtn.innerText = "مكافأة يومية +1000";
        }else{
            dailyBtn.disabled = true;
            dailyBtn.innerText = "بعد " + formatTime(remaining);
        }
    });
}

dailyBtn.addEventListener("click",()=>{
    initAudio();

    playerRef.once("value").then(snapshot=>{
        const data = snapshot.val() || {};
        const lastReward = Number(data.lastDailyReward) || 0;
        const now = Date.now();

        if(now - lastReward >= dailyRewardTime){
            balance += dailyRewardAmount;

            playerRef.update({
                balance: balance,
                lastDailyReward: now
            });

            playRewardSound();
            showPopup("🎁", "حصلت على $1000", 2000);
        }else{
            updateDailyButton();
            playErrorSound();
        }
    });
});

playerIdBox.addEventListener("click",()=>{
    navigator.clipboard.writeText(String(playerId));
    showPopup("✅", "تم نسخ ID", 1200);
});

function drawWheel(){
    const center = 250;
    const radius = 235;
    const angle = (Math.PI * 2) / sections.length;

    ctx.clearRect(0,0,500,500);

    for(let i = 0; i < sections.length; i++){
        const start = i * angle;
        const end = start + angle;

        const gradient = ctx.createRadialGradient(center,center,20,center,center,radius);
        gradient.addColorStop(0,"#fff2a5");
        gradient.addColorStop(.2,colors[i]);
        gradient.addColorStop(1,colors[i]);

        ctx.beginPath();
        ctx.moveTo(center,center);
        ctx.arc(center,center,radius,start,end);
        ctx.closePath();

        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.lineWidth = 5;
        ctx.strokeStyle = "#ffd76a";
        ctx.stroke();

        ctx.save();
        ctx.translate(center,center);
        ctx.rotate(start + angle / 2);

        ctx.font = "54px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,.7)";
        ctx.shadowBlur = 8;
        ctx.fillText(sections[i], radius - 82, 0);

        ctx.restore();
    }
}

function resetBets(){
    bets = {
        "🍉": 0,
        "🍎": 0,
        "7️⃣": 0
    };

    document.querySelectorAll(".bet-box").forEach(box=>{
        box.querySelector(".amount").innerText = "0";
    });
}

function updateHistory(result){
    const items = Array.from(historyEl.children);

    for(let i = items.length - 1; i > 0; i--){
        items[i].innerText = items[i - 1].innerText;
    }

    items[0].innerText = result;
}

function getResultFromWheel(){
    const sectionAngle = 360 / sections.length;
    const normalizedAngle = ((currentAngle % 360) + 360) % 360;
    const pointerAngle = (270 - normalizedAngle + 360) % 360;
    const index = Math.floor(pointerAngle / sectionAngle);

    return sections[index];
}

function spinWheel(){
    if(spinning) return;

    spinning = true;
    timeLeft = 15;
    timer.innerText = timeLeft;

    const randomDeg = Math.floor(Math.random() * 360) + 1440;

    currentAngle += randomDeg;

    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.25,1)";
    canvas.style.transform = `rotate(${currentAngle}deg)`;

    setTimeout(()=>{
        showResult();
        spinning = false;
    }, 4300);
}

function showResult(){
    const result = getResultFromWheel();
    const betAmount = bets[result];
    const box = document.querySelector(`.bet-box[data-emoji="${result}"]`);
    const multiplier = Number(box.dataset.multi);

    let message = "خسرت";

    if(betAmount > 0){
        const winAmount = betAmount * multiplier;
        balance += winAmount;
        message = "ربحت $" + winAmount;
        playWinSound();
    }else{
        playLoseSound();
    }

    updateBalance();
    updateHistory(result);

    popup.style.display = "flex";
    popupEmoji.innerText = result;
    popupText.innerText = message;

    resetBets();

    setTimeout(()=>{
        popup.style.display = "none";
    },3000);
}

document.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
        initAudio();

        document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        selectedChip = Number(chip.dataset.value);

        playTone(700, 0.06, "triangle", 0.08);
    });
});

document.querySelectorAll(".bet-box").forEach(box=>{
    box.addEventListener("click",()=>{
        initAudio();

        if(spinning) return;

        if(balance < selectedChip){
            playErrorSound();
            showPopup("❌", "الرصيد غير كافي", 1500);
            return;
        }

        const emoji = box.dataset.emoji;

        balance -= selectedChip;
        bets[emoji] += selectedChip;

        playTone(520, 0.07, "triangle", 0.08);
        updateBalance();
        box.querySelector(".amount").innerText = bets[emoji];
    });
});

setInterval(()=>{
    if(spinning) return;

    timeLeft--;
    timer.innerText = timeLeft;

    if(timeLeft <= 0){
        spinWheel();
    }
},1000);

setInterval(updateDailyButton,1000);

drawWheel();
initPlayer();
</script>

</body>
</html>
