<!-- استبدل ملف index.html بالكامل بهذا الكود -->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roulette Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#070707;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
font-size:45px;
text-shadow:0 0 20px red;
}

.balance{
font-size:32px;
margin-top:15px;
color:gold;
}

.timer{
font-size:38px;
margin-top:10px;
color:#00ff99;
text-shadow:0 0 20px #00ff99;
}

#wheelArea{
position:relative;
width:360px;
height:360px;
margin:25px auto;
}

#wheel{
width:360px;
height:360px;
border-radius:50%;
border:12px solid gold;
position:relative;
overflow:hidden;

box-shadow:
0 0 30px gold,
0 0 90px orange;

transition:transform 8s cubic-bezier(.17,.67,.2,1);
}

.slice{
position:absolute;
width:50%;
height:50%;
left:50%;
top:50%;
transform-origin:0% 0%;
clip-path:polygon(0 0,100% 0,0 100%);
}

.number{
position:absolute;
left:52%;
top:52%;
transform-origin:0 -145px;
font-size:18px;
font-weight:bold;
color:white;
text-shadow:0 0 10px white;
}

.pointer{
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid yellow;
z-index:100;
}

.ball{
position:absolute;
width:24px;
height:24px;
border-radius:50%;
background:white;
top:15px;
left:50%;
transform:translateX(-50%);
box-shadow:
0 0 20px white,
0 0 40px cyan;
z-index:99;
}

.money{
margin-top:20px;
}

.money button{
width:75px;
height:75px;
border-radius:50%;
border:none;
margin:10px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.selected{
outline:5px solid gold;
}

.betDisplay{
font-size:32px;
margin-top:10px;
}

.betButtons{
margin-top:25px;
}

.betButtons button{
padding:18px 30px;
font-size:24px;
border:none;
border-radius:15px;
margin:8px;
cursor:pointer;
font-weight:bold;
}

.red{
background:#ff2d55;
color:white;
}

.black{
background:#333;
color:white;
}

.green{
background:#00d000;
color:white;
}

.result{
margin-top:30px;
font-size:42px;
color:yellow;
text-shadow:0 0 20px yellow;
padding-bottom:40px;
}

</style>
</head>

<body>

<h1>🎰 كازينو الروليت</h1>

<div class="balance">
الرصيد: $
<span id="balance">5000</span>
</div>

<div class="timer">
⏳ <span id="timer">15</span>
</div>

<div id="wheelArea">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div id="wheel"></div>

</div>

<div class="money">

<button onclick="setBet(10)">10</button>
<button onclick="setBet(50)">50</button>
<button onclick="setBet(100)">100</button>
<button onclick="setBet(1000)">1K</button>

</div>

<div class="betDisplay">
الرهان الحالي:
<span id="bet">10</span>$
</div>

<div class="betButtons">

<button class="red" onclick="placeBet('red')">
🔴 RED x2
</button>

<button class="black" onclick="placeBet('black')">
⚫ BLACK x2
</button>

<button class="green" onclick="placeBet('green')">
🟢 GREEN x14
</button>

</div>

<div class="result" id="result"></div>

<script>

const wheel=document.getElementById("wheel");
const result=document.getElementById("result");
const balanceEl=document.getElementById("balance");
const timerEl=document.getElementById("timer");
const ball=document.getElementById("ball");

let balance=5000;

let currentBet=10;

let currentChoice=null;

let countdown=15;

const rouletteNumbers=[
0,32,15,19,4,21,2,25,17,
34,6,27,13,36,11,30,8,23,
10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

createWheel();

function createWheel(){

const deg=360/rouletteNumbers.length;

for(let i=0;i<rouletteNumbers.length;i++){

const slice=document.createElement("div");

slice.className="slice";

slice.style.transform=
`rotate(${i*deg}deg) skewY(${90-deg}deg)`;

slice.style.background=
i%2===0?"red":"black";

wheel.appendChild(slice);

const num=document.createElement("div");

num.className="number";

num.innerHTML=rouletteNumbers[i];

num.style.transform=
`rotate(${i*deg}deg)`;

wheel.appendChild(num);

}

}

function setBet(v){

currentBet=v;

document.getElementById("bet").innerHTML=v;

}

function placeBet(type){

currentChoice=type;

result.innerHTML=
"✅ تم وضع الرهان على " + type;

}

function startTimer(){

setInterval(()=>{

countdown--;

timerEl.innerHTML=countdown;

if(countdown<=0){

spin();

countdown=15;

}

},1000);

}

async function spin(){

if(currentChoice===null){

result.innerHTML=
"⚠️ لا يوجد رهان";

return;

}

if(balance<currentBet){

result.innerHTML=
"❌ الرصيد غير كافي";

return;

}

balance-=currentBet;

updateBalance();

const index=
Math.floor(Math.random()*rouletteNumbers.length);

const winning=
rouletteNumbers[index];

const deg=360/rouletteNumbers.length;

const rotate=
3600+(index*deg);

wheel.style.transform=
`rotate(-${rotate}deg)`;

ball.style.transition=
"all 8s linear";

ball.style.transform=
`translateX(-50%) rotate(${rotate*2}deg)`;

setTimeout(()=>{

let color;

if(winning===0){

color="green";

}else if(winning%2===0){

color="red";

}else{

color="black";

}

if(color===currentChoice){

let reward=
currentChoice==="green"
?currentBet*14
:currentBet*2;

balance+=reward;

result.innerHTML=
"🎉 WIN +" + reward +
" | الرقم " + winning;

}else{

result.innerHTML=
"❌ خسرت | الرقم " + winning;

}

updateBalance();

currentChoice=null;

},8000);

}

function updateBalance(){

balanceEl.innerHTML=balance;

}

startTimer();

</script>

</body>
</html>
