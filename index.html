<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>كازينو الروليت</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
text-align:center;
}

.container{
width:100%;
max-width:430px;
margin:auto;
padding:20px 10px 50px;
}

.title{
font-size:52px;
font-weight:bold;
color:#fff;
text-shadow:0 0 25px red;
margin-top:15px;
margin-bottom:20px;
}

.balance{
font-size:45px;
color:gold;
margin-bottom:20px;
text-shadow:0 0 15px orange;
}

.timer{
font-size:55px;
color:#00ff88;
margin-bottom:15px;
text-shadow:0 0 20px #00ff88;
}

.wheel-area{
position:relative;
width:100%;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:25px;
}

.pointer{
position:absolute;
top:-18px;
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-bottom:45px solid gold;
z-index:50;
filter:drop-shadow(0 0 10px yellow);
}

.ball{
position:absolute;
width:24px;
height:24px;
background:#fff;
border-radius:50%;
top:20px;
left:50%;
margin-left:-12px;
z-index:30;
box-shadow:0 0 20px #fff;
transition:transform 6s cubic-bezier(.17,.67,.19,1);
}

.wheel{
width:90vw;
height:90vw;
max-width:370px;
max-height:370px;
border-radius:50%;
border:10px solid gold;
position:relative;
overflow:hidden;
box-shadow:
0 0 50px orange,
0 0 100px gold;
transition:transform 6s cubic-bezier(.17,.67,.19,1);
}

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
font-size:18px;
font-weight:bold;
color:white;
text-shadow:0 0 8px #fff;
}

.controls{
margin-top:25px;
}

.bet-title{
font-size:38px;
margin-bottom:15px;
color:#fff;
}

.bet-buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.bet-btn{
background:#fff;
color:#000;
border:none;
border-radius:50%;
height:75px;
font-size:28px;
font-weight:bold;
cursor:pointer;
}

.bet-btn.active{
background:gold;
}

.types{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.type-btn{
padding:18px;
font-size:28px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
color:white;
}

.red{background:#ff0033;}
.black{background:#222;}
.green{background:#00cc44;}

.spin-btn{
margin-top:25px;
width:100%;
padding:22px;
border:none;
border-radius:18px;
font-size:35px;
background:red;
color:#fff;
font-weight:bold;
box-shadow:0 0 30px red;
cursor:pointer;
}

.result{
margin-top:25px;
font-size:42px;
font-weight:bold;
min-height:60px;
}

.win{
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

.lose{
color:#ff0033;
text-shadow:0 0 20px red;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🎰 كازينو الروليت</div>

<div class="balance" id="balance">
الرصيد: $5000
</div>

<div class="timer" id="timer">
10
</div>

<div class="wheel-area">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div class="wheel" id="wheel"></div>

</div>

<div class="controls">

<div class="bet-title">
اختر مبلغ الرهان
</div>

<div class="bet-buttons">
<button class="bet-btn" onclick="setBet(10)">10</button>
<button class="bet-btn" onclick="setBet(50)">50</button>
<button class="bet-btn" onclick="setBet(100)">100</button>
<button class="bet-btn" onclick="setBet(1000)">1K</button>
</div>

<div class="bet-title">
اختر الرهان
</div>

<div class="types">
<button class="type-btn red" onclick="setType('red')">أحمر ×2</button>
<button class="type-btn black" onclick="setType('black')">أسود ×2</button>
<button class="type-btn green" onclick="setType('green')">أخضر ×14</button>
</div>

<button class="spin-btn" onclick="manualSpin()">
ابدأ الرهان
</button>

<div class="result" id="result"></div>

</div>
</div>

<script>

const wheel=document.getElementById("wheel");
const ball=document.getElementById("ball");

const rouletteNumbers=[
0,32,15,19,4,21,2,25,17,34,6,
27,13,36,11,30,8,23,10,5,
24,16,33,1,20,14,31,9,22,
18,29,7,28,12,35,3,26
];

let balance=5000;
let currentBet=10;
let currentType="red";
let spinning=false;

function createWheel(){

const total=rouletteNumbers.length;
const angle=360/total;

let gradient="";

for(let i=0;i<total;i++){

const start=i*angle;
const end=(i+1)*angle;

let color;

if(i===0){
color="#00aa33";
}else{
color=i%2===0?"red":"black";
}

gradient += `${color} ${start}deg ${end}deg`;

if(i<total-1){
gradient += ",";
}

const number=document.createElement("div");
number.className="number";

number.innerHTML=rouletteNumbers[i];

number.style.transform=
`rotate(${i*angle}deg)
translateY(-160px)
rotate(90deg)`;

wheel.appendChild(number);

}

wheel.style.background=
`conic-gradient(${gradient})`;

}

createWheel();

function setBet(amount){

currentBet=amount;

document.querySelectorAll(".bet-btn")
.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

}

function setType(type){

currentType=type;

}

function updateBalance(){

document.getElementById("balance").innerHTML=
`الرصيد: $${balance}`;

}

function getColor(number){

if(number===0) return "green";

const redNumbers=[
1,3,5,7,9,12,14,16,18,19,
21,23,25,27,30,32,34,36
];

return redNumbers.includes(number)
? "red"
: "black";

}

function manualSpin(){

if(spinning) return;

if(balance<currentBet){
alert("الرصيد غير كافي");
return;
}

spin();

}

function spin(){

spinning=true;

balance-=currentBet;
updateBalance();

document.getElementById("result").innerHTML="";

const randomIndex=
Math.floor(Math.random()*rouletteNumbers.length);

const resultNumber=
rouletteNumbers[randomIndex];

const resultColor=
getColor(resultNumber);

const slice=
360/rouletteNumbers.length;

const finalDeg=
(360*8)+(randomIndex*slice);

wheel.style.transform=
`rotate(-${finalDeg}deg)`;

ball.style.transform=
`rotate(${finalDeg+720}deg)
translateY(165px)`;

setTimeout(()=>{

let win=false;
let reward=0;

if(currentType===resultColor){

win=true;

if(resultColor==="green"){
reward=currentBet*14;
}else{
reward=currentBet*2;
}

}

if(win){

balance+=reward;

document.getElementById("result").innerHTML=
`✅ ربحت ${reward}$ - الرقم ${resultNumber}`;

document.getElementById("result")
.className="result win";

}else{

document.getElementById("result").innerHTML=
`❌ خسرت - الرقم ${resultNumber}`;

document.getElementById("result")
.className="result lose";

}

updateBalance();

spinning=false;

},6500);

}

let countdown=10;

setInterval(()=>{

if(spinning) return;

countdown--;

document.getElementById("timer").innerHTML=
`⏳ ${countdown}`;

if(countdown<=0){

countdown=10;

spin();

}

},1000);

</script>

</body>
</html>
