<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Game</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:60px;
}

button{
    padding:15px 40px;
    font-size:25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:40px;
    color:yellow;
}
</style>
</head>

<body>

<h1>🎰 لعبة الروليت</h1>

<button onclick="spin()">ابدأ</button>

<div id="result"></div>

<script>
function spin(){
    let num = Math.floor(Math.random()*37);

    document.getElementById("result").innerHTML =
    "الرقم هو: " + num;

    if(window.Telegram.WebApp){
        Telegram.WebApp.sendData(num.toString());
    }
}
</script>

</body>
</html>
