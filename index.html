<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الحظ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:radial-gradient(circle,#2d004d,#090010);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.game{
width:100%;
max-width:430px;
text-align:center;
padding:10px;
}

.balance{
font-size:70px;
font-weight:bold;
color:gold;
text-shadow:0 0 25px gold;
margin-bottom:15px;
}

.wheel-box{
position:relative;
width:90vw;
height:90vw;
max-width:360px;
max-height:360px;
margin:auto;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-top:55px solid yellow;
z-index:20;
filter:drop-shadow(0 0 15px yellow);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
box-shadow:
0 0 30px gold,
0 0 60px yellow;
background:
conic-gradient(
#1e90ff 0deg 45deg,
#1e90ff 45deg 90deg,
#1e90ff 90deg 135deg,
#1e90ff 135deg 180deg,
#1e90ff 180deg 225deg,
#1e90ff 225deg 270deg,
#1e90ff 270deg 315deg,
#ff00aa 315deg 360deg
);

transition:transform 5s cubic-bezier(.17,.67,.12,.99);
position:relative;
overflow:hidden;
}

.slice{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
font-size:38px;
}

.slice:nth-child(1){transform:rotate(0deg) translate(120px);}
.slice:nth-child(2){transform:rotate(45deg) translate(120px);}
.slice:nth-child(3){transform:rotate(90deg) translate(120px);}
.slice:nth-child(4){transform:rotate(135deg) translate(120px);}
.slice:nth-child(5){transform:rotate(180deg) translate(120px);}
.slice:nth-child(6){transform:rotate(225deg) translate(120px);}
.slice:nth-child(7){transform:rotate(270deg) translate(120px);}
.slice:nth-child(8){transform:rotate(315deg) translate(120px);}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:110px;
height:110px;
border-radius:50%;
background:radial-gradient(circle,red,darkred);
border:8px solid gold;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
color:white;
box-shadow:0 0 25px yellow;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.card{
background:linear-gradient(#d000ff,#700090);
border:4px solid gold;
border-radius:25px;
padding:20px 10px;
box-shadow:0 0 25px magenta;
cursor:pointer;
}

.card .icon{
font-size:55px;
}

.multi{
font-size:50px;
font-weight:bold;
color:gold;
}

.bet{
font-size:40px;
margin-top:5px;
}

.apple{
grid-column:1/3;
width:50%;
margin:auto;
}

.chips{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.chip{
width:80px;
height:80px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:bold;
color:black;
box-shadow:0 0 20px white;
cursor:pointer;
}

.active{
border:5px solid gold;
box-shadow:0 0 25px yellow;
}

button{
margin-top:25px;
width:100%;
height:80px;
border:none;
border-radius:25px;
font-size:45px;
font-weight:bold;
background:linear-gradient(#666,#222);
color:white;
cursor:pointer;
box-shadow:0 0 20px black;
}

.result{
margin-top:20px;
font-size:40px;
color:gold;
text-shadow:0 0 15px gold;
}

@media(max-width:480px){

.balance{
font-size:55px;
}

.center{
width:90px;
height:90px;
font-size:45px;
}

.card .icon{
font-size:45px;
}

.multi{
font-size:40px;
}

.bet{
font-size:35px;
}

.chip{
width:65px;
height:65px;
font-size:25px;
}

button{
font-size:35px;
height:70px;
}

.result{
font-size:30px;
}

}

</style>
</head>

<body>

<div class="game">

<div class="balance" id="balance">$5000</div>

<div class="wheel-box">

<div class="pointer"></div>

<div id="wheel">

<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">7️⃣</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>
<div class="slice">🍉</div>
<div class="slice">🍎</div>

</div>

<div class="center" id="timer">5</div>

</div>

<div class="cards">

<div class="card" onclick="bet('watermelon')">
<div class="icon">🍉</div>
<div class="multi">x2</div>
<div class="bet" id="watermelonBet">0</div>
</div>

<div class="card" onclick="bet('seven')">
<div class="icon">7️⃣</div>
<div class="multi">x8</div>
<div class="bet" id="sevenBet">0</div>
</div>

<div class="card apple" onclick="bet('apple')">
<div class="icon">🍎</div>
<div class="multi">x2</div>
<div class="bet" id="appleBet">0</div>
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(100,this)">100</div>
<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip active" onclick="selectChip(10000,this)">10K</div>

</div>

<button onclick="spin()">SPIN</button>

<div class="result" id="result">
النتيجة :
</div>

</div>

<script>

let selectedChip=10000;

let balance=5000;

let bets={
watermelon:0,
apple:0,
seven:0
};

function updateBalance(){
document.getElementById("balance").innerHTML="$"+balance;
}

function selectChip(amount,el){

selectedChip=amount;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

el.classList.add("active");

}

function bet(type){

if(balance<selectedChip)return;

balance-=selectedChip;

bets[type]+=selectedChip;

document.getElementById(type+"Bet").innerHTML=bets[type];

updateBalance();

}

function spin(){

const wheel=document.getElementById("wheel");

const timer=document.getElementById("timer");

let count=5;

timer.innerHTML=count;

let deg=3600+Math.floor(Math.random()*360);

wheel.style.transform="rotate("+deg+"deg)";

let interval=setInterval(()=>{

count--;

timer.innerHTML=count;

if(count<=0){

clearInterval(interval);

finish();

}

},1000);

}

function finish(){

const results=["🍎","🍉","7️⃣"];

const result=results[Math.floor(Math.random()*results.length)];

document.getElementById("result").innerHTML="النتيجة : "+result;

if(result=="🍎"){
balance+=bets.apple*2;
}

if(result=="🍉"){
balance+=bets.watermelon*2;
}

if(result=="7️⃣"){
balance+=bets.seven*8;
}

bets.apple=0;
bets.watermelon=0;
bets.seven=0;

document.getElementById("appleBet").innerHTML=0;
document.getElementById("watermelonBet").innerHTML=0;
document.getElementById("sevenBet").innerHTML=0;

updateBalance();

}

</script>

</body>
</html>
