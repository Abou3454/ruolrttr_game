<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Casino</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#2b0000;
overflow:hidden;
height:100vh;
color:white;
}

.game{
width:100%;
height:100vh;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
}

.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

#balance{
font-size:30px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

#timer{
font-size:75px;
font-weight:bold;
color:#00ff55;
text-shadow:0 0 30px #00ff55;
}

.history{
display:flex;
gap:6px;
margin-bottom:8px;
}

.history div{
width:34px;
height:34px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:15px;
font-weight:bold;
}

.red{background:red;}
.black{background:black;}
.green{background:green;}

.wheelWrap{
position:relative;
width:280px;
height:280px;
display:flex;
justify-content:center;
align-items:center;
margin-top:5px;
}

.pointer{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-bottom:50px solid yellow;
z-index:100;
filter:drop-shadow(0 0 12px yellow);
}

#wheel{
width:280px;
height:280px;
border-radius:50%;
border:10px solid gold;
box-shadow:
0 0 20px gold,
0 0 50px orange;
position:relative;
overflow:hidden;
transition:transform 6s cubic-bezier(0.08,0.6,0.1,1);

background:
conic-gradient(
green 0deg 9.7deg,
red 9.7deg 19.4deg,
black 19.4deg 29.1deg,
red 29.1deg 38.8deg,
black 38.8deg 48.5deg,
red 48.5deg 58.2deg,
black 58.2deg 67.9deg,
red 67.9deg 77.6deg,
black 77.6deg 87.3deg,
red 87.3deg 97deg,
black 97deg 106.7deg,
red 106.7deg 116.4deg,
black 116.4deg 126.1deg,
red 126.1deg 135.8deg,
black 135.8deg 145.5deg,
red 145.5deg 155.2deg,
black 155.2deg 164.9deg,
red 164.9deg 174.6deg,
black 174.6deg 184.3deg,
red 184.3deg 194deg,
black 194deg 203.7deg,
red 203.7deg 213.4deg,
black 213.4deg 223.1deg,
red 223.1deg 232.8deg,
black 232.8deg 242.5deg,
red 242.5deg 252.2deg,
black 252.2deg 261.9deg,
red 261.9deg 271.6deg,
black 271.6deg 281.3deg,
red 281.3deg 291deg,
black 291deg 300.7deg,
red 300.7deg 310.4deg,
black 310.4deg 320.1deg,
red 320.1deg 329.8deg,
black 329.8deg 339.5deg,
red 339.5deg 349.2deg,
black 349.2deg 360deg
);

}

.number{
position:absolute;
left:50%;
top:50%;
transform-origin:0 -120px;
font-size:15px;
font-weight:bold;
color:white;
text-shadow:0 0 5px black;
}

.ball{
position:absolute;
width:16px;
height:16px;
background:white;
border-radius:50%;
top:50%;
left:50%;
margin-left:-8px;
margin-top:-8px;
box-shadow:
0 0 10px white,
0 0 25px white;
z-index:50;
transition:transform 6s cubic-bezier(0.08,0.6,0.1,1);
}

.bets{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.bet{
height:88px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
position:relative;
border:3px solid rgba(255,255,255,0.15);
}

.bet.active{
box-shadow:0 0 20px white;
transform:scale(1.02);
}

.bet span{
position:absolute;
top:5px;
left:5px;
background:black;
padding:2px 10px;
border-radius:12px;
font-size:18px;
color:yellow;
}

.blackbox{background:#111;}
.redbox{background:#ff0040;}
.greenbox{background:#00cc44;}
.darkbox{background:#941232;}

.chips{
display:flex;
justify-content:center;
gap:10px;
margin-top:14px;
}

.chip{
width:75px;
height:75px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:black;
border:5px solid #ddd;
}

.chip.active{
border:5px solid gold;
box-shadow:0 0 25px gold;
}

#currentBet{
margin-top:10px;
font-size:32px;
color:white;
}

#result{
margin-top:8px;
font-size:34px;
font-weight:bold;
color:gold;
text-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div class="game">

<div class="top">
<div id="balance">$5000</div>
<div id="timer">10</div>
</div>

<div class="history" id="history"></div>

<div class="wheelWrap">

<div class="pointer"></div>

<div class="ball" id="ball"></div>

<div id="wheel"></div>

</div>

<div class="bets">

<div class="bet blackbox" onclick="placeBet('black',this)">
<span id="blackAmount">0</span>
BLACK
</div>

<div class="bet redbox" onclick="placeBet('red',this)">
<span id="redAmount">0</span>
RED
</div>

<div class="bet darkbox" onclick="placeBet('even',this)">
<span id="evenAmount">0</span>
EVEN
</div>

<div class="bet greenbox" onclick="placeBet('zero',this)">
<span id="zeroAmount">0</span>
0
</div>

<div class="bet darkbox" onclick="placeBet('high',this)">
<span id="highAmount">0</span>
19-36
</div>

<div class="bet darkbox" onclick="placeBet('odd',this)">
<span id="oddAmount">0</span>
ODD
</div>

</div>

<div class="chips">

<div class="chip" onclick="selectChip(1000,this)">1K</div>
<div class="chip" onclick="selectChip(100,this)">100</div>
<div class="chip active" onclick="selectChip(50,this)">50</div>
<div class="chip" onclick="selectChip(10,this)">10</div>

</div>

<div id="currentBet">الرهان: $0</div>

<div id="result"></div>

</div>

<script>

let balance=5000;
let selectedChip=50;
let timer=10;
let spinning=false;

let bets={
red:0,
black:0,
even:0,
odd:0,
high:0,
zero:0
};

const numbers=[
0,32,15,19,4,21,2,25,17,34,6,27,13,36,
11,30,8,23,10,5,24,16,33,1,20,14,31,
9,22,18,29,7,28,12,35,3,26
];

const redNums=[
1,3,5,7,9,12,14,16,18,19,
21,23,25,27,30,32,34,36
];

function createNumbers(){

const wheel=document.getElementById("wheel");

for(let i=0;i<numbers.length;i++){

let div=document.createElement("div");

div.className="number";

div.innerHTML=numbers[i];

div.style.transform=
"rotate("+(i*9.73)+"deg) translateY(-120px) rotate(90deg)";

wheel.appendChild(div);

}

}

createNumbers();

function updateBalance(){

document.getElementById("balance").innerHTML="$"+balance;

}

function selectChip(value,el){

selectedChip=value;

document.querySelectorAll(".chip").forEach(c=>{
c.classList.remove("active");
});

el.classList.add("active");

}

function totalBet(){

return Object.values(bets).reduce((a,b)=>a+b,0);

}

function placeBet(type,el){

if(spinning)return;

if(balance<selectedChip)return;

balance-=selectedChip;

updateBalance();

bets[type]+=selectedChip;

document.getElementById(type+"Amount").innerHTML=bets[type];

document.getElementById("currentBet").innerHTML=
"الرهان: $"+totalBet();

el.classList.add("active");

}

function startRound(){

if(spinning)return;

spinning=true;

const wheel=document.getElementById("wheel");
const ball=document.getElementById("ball");

let result=numbers[Math.floor(Math.random()*numbers.length)];

let index=numbers.indexOf(result);

let degree=(360/numbers.length)*index;

let extraSpin=3600;

let finalRotate=
extraSpin-degree-(360/numbers.length/2);

wheel.style.transform=
"rotate("+finalRotate+"deg)";

let ballRotate=-(finalRotate*1.15);

ball.style.transform=
`rotate(${ballRotate}deg) translateY(-115px)`;

setTimeout(()=>{

finishRound(result);

},6000);

}

function finishRound(number){

let win=0;

if(redNums.includes(number))
win+=bets.red*2;

if(number!==0 && !redNums.includes(number))
win+=bets.black*2;

if(number%2===0 && number!==0)
win+=bets.even*2;

if(number%2===1)
win+=bets.odd*2;

if(number>=19)
win+=bets.high*2;

if(number===0)
win+=bets.zero*14;

balance+=win;

updateBalance();

let color="black";

if(number===0)color="green";
else if(redNums.includes(number))color="red";

let div=document.createElement("div");

div.className=color;

div.innerHTML=number;

document.getElementById("history").prepend(div);

if(document.getElementById("history").children.length>8){

document.getElementById("history").lastChild.remove();

}

document.getElementById("result").innerHTML=
(win>0 ? "WIN +$"+win : "LOSE")+" | "+number;

for(let key in bets){

bets[key]=0;

document.getElementById(key+"Amount").innerHTML="0";

}

document.querySelectorAll(".bet").forEach(b=>{
b.classList.remove("active");
});

document.getElementById("currentBet").innerHTML=
"الرهان: $0";

spinning=false;

timer=10;

}

setInterval(()=>{

if(spinning)return;

timer--;

document.getElementById("timer").innerHTML=timer;

if(timer<=0){

document.getElementById("timer").innerHTML="SPIN";

startRound();

}

},1000);

updateBalance();

</script>

</body>
</html>
